<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <link rel="icon" type="image/png" href="../../assets/images/favicon/favicon.ico" />
  <link rel="stylesheet" href="../../assets/css/lib/bootstrap-datepicker.standalone.css" />
  <link rel="stylesheet" href="../../assets/css/lib-style.css" />
  <link rel="stylesheet" href="../../assets/css/iframe-layout.css" />
  <link rel="stylesheet" href="../../assets/css/mobile-style.css" />
  <script src="../../assets/js/lib/jquery-3.6.0.min.js"></script>
  <script>
    if (typeof cldMsg_prevMonth === 'undefined') {
      window.cldMsg_prevMonth = '이전달';
      window.cldMsg_nextMonth = '다음달';
      window.cldMsg_prevYear = '이전년';
      window.cldMsg_nextYear = '다음년';
      window.cldMsg_prev = '이전';
      window.cldMsg_next = '다음';
    }
  </script>
  <script src="../../assets/js/lib/bootstrap-datepicker.js"></script>
  <script src="../../assets/js/lib/swiper-bundle.min.js"></script>
  
  <title>Guide | Weather Widget</title>
  <style>
    .weather-widget {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 8px 12px;
      background-color: var(--semantic-color-surface-secondary, #f5f5f5);
      border-radius: 8px;
      font-size: 10px;
      font-weight: 500;
      color: var(--semantic-color-text-primary, #202020);
      text-align: center;
      white-space: nowrap;
    }
    .weather-widget .weather-widget-icon { width: 28px; height: 28px; }
  </style>
</head>

<body style="overflow:hidden; margin:0;">
    <div class="general-container">
      <div class="general-area">
        <div class="general-top">
          <div class="general-label">Component</div>
          <div class="general-title">Weather Widget</div>
        </div>
        <div class="general-middle">
          <div class="component-block">
            <div class="component-preview" style="flex-wrap:wrap; gap:16px; align-items:flex-start;">
              <div style="display:flex;flex-direction:column;gap:6px;align-items:center;">
                <span style="font-size:11px;color:#9d9d9d;">맑음</span>
                <div class="weather-widget">
                  서울
                  <img class="weather-widget-icon" src="../../assets/images/ic_weather_clear.svg" alt="맑음" />
                  -6.4°
                </div>
              </div>
              <div style="display:flex;flex-direction:column;gap:6px;align-items:center;">
                <span style="font-size:11px;color:#9d9d9d;">구름조금</span>
                <div class="weather-widget">
                  청주
                  <img class="weather-widget-icon" src="../../assets/images/ic_weather_partly_cloudy.svg" alt="구름조금" />
                  -6.4°
                </div>
              </div>
              <div style="display:flex;flex-direction:column;gap:6px;align-items:center;">
                <span style="font-size:11px;color:#9d9d9d;">흐림</span>
                <div class="weather-widget">
                  천안
                  <img class="weather-widget-icon" src="../../assets/images/ic_weather_cloudy.svg" alt="흐림" />
                  -8.6°
                </div>
              </div>
              <div style="display:flex;flex-direction:column;gap:6px;align-items:center;">
                <span style="font-size:11px;color:#9d9d9d;">비</span>
                <div class="weather-widget">
                  부산
                  <img class="weather-widget-icon" src="../../assets/images/ic_weather_rain.svg" alt="비" />
                  -0.3°
                </div>
              </div>
              <div style="display:flex;flex-direction:column;gap:6px;align-items:center;">
                <span style="font-size:11px;color:#9d9d9d;">눈</span>
                <div class="weather-widget">
                  강릉
                  <img class="weather-widget-icon" src="../../assets/images/ic_weather_snow.svg" alt="눈" />
                  -8.0°
                </div>
              </div>
              <div style="display:flex;flex-direction:column;gap:6px;align-items:center;">
                <span style="font-size:11px;color:#9d9d9d;">비 또는 눈</span>
                <div class="weather-widget">
                  수원
                  <img class="weather-widget-icon" src="../../assets/images/ic_weather_rain_or_snow.svg" alt="비 또는 눈" />
                  -6.4°
                </div>
              </div>
              <div style="display:flex;flex-direction:column;gap:6px;align-items:center;">
                <span style="font-size:11px;color:#9d9d9d;">천둥번개</span>
                <div class="weather-widget">
                  포항
                  <img class="weather-widget-icon" src="../../assets/images/ic_weather_thunderstorm.svg" alt="천둥번개" />
                  -1.5°
                </div>
              </div>
              <div style="display:flex;flex-direction:column;gap:6px;align-items:center;">
                <span style="font-size:11px;color:#9d9d9d;">가끔 비</span>
                <div class="weather-widget">
                  울산
                  <img class="weather-widget-icon" src="../../assets/images/ic_weather_shower.svg" alt="가끔 비" />
                  3.2°
                </div>
              </div>
              <div style="display:flex;flex-direction:column;gap:6px;align-items:center;">
                <span style="font-size:11px;color:#9d9d9d;">가끔 눈</span>
                <div class="weather-widget">
                  인천
                  <img class="weather-widget-icon" src="../../assets/images/ic_weather_snow_shower.svg" alt="가끔 눈, 한때 눈" />
                  -5.3°
                </div>
              </div>
              <div style="display:flex;flex-direction:column;gap:6px;align-items:center;">
                <span style="font-size:11px;color:#9d9d9d;">가끔 비 또는 눈</span>
                <div class="weather-widget">
                  평택
                  <img class="weather-widget-icon" src="../../assets/images/ic_weather_rain_or_snow_shower.svg" alt="가끔 비 또는 눈, 한때 비 또는 눈" />
                  -0.3°
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
<script>document.addEventListener("wheel",function(e){window.parent.postMessage({type:"iframeWheel",deltaY:e.deltaY,deltaX:e.deltaX},"*");},{passive:true});function _sh(){var h=Math.max(document.body.scrollHeight,document.body.offsetHeight,document.documentElement.scrollHeight,document.documentElement.offsetHeight);window.parent.postMessage({type:"iframeHeight",height:h},"*");}window.addEventListener("load",_sh);if(window.ResizeObserver){new ResizeObserver(_sh).observe(document.body);}</script>
</body>

</html>
