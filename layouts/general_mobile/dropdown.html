<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <link rel="icon" type="image/png" href="../../assets/images/favicon/favicon.ico" />
  <link rel="icon" type="image/png" href="../../assets/images/favicon/favicon.ico" />
  <link rel="stylesheet" href="../../assets/css/lib/bootstrap-datepicker.standalone.css" />
  <link rel="stylesheet" href="../../assets/css/lib-style.css" />
  <link rel="stylesheet" href="../../assets/css/iframe-layout.css" />
  <link rel="stylesheet" href="../../assets/css/mobile-style.css" />
  <script src="../../assets/js/lib/jquery-3.6.0.min.js"></script>
  <script>
    // bootstrap-datepicker.js에서 사용하는 메시지 변수 정의 (bootstrap-datepicker.js보다 먼저 실행되어야 함)
    if (typeof cldMsg_prevMonth === 'undefined') {
      window.cldMsg_prevMonth = '이전달';
      window.cldMsg_nextMonth = '다음달';
      window.cldMsg_prevYear = '이전년';
      window.cldMsg_nextYear = '다음년';
      window.cldMsg_prev = '이전';
      window.cldMsg_next = '다음';
    }
  </script>
  <script src="../../assets/js/lib/bootstrap-datepicker.js"></script>
  <script src="../../assets/js/lib/swiper-bundle.min.js"></script>
  
  <script src="../../assets/js/datepicker.js"></script>
  <script src="../../assets/js/dropdown.js"></script>
  <script src="../../assets/js/file.js"></script>
  <script src="../../assets/js/input.js"></script>
  <script src="../../assets/js/modal.js"></script>
  <script src="../../assets/js/multi-dropdown.js"></script>
  <script src="../../assets/js/range-time-picker.js"></script>
  <script src="../../assets/js/route-accordion.js"></script>
  <script src="../../assets/js/tab.js"></script>
  <script src="../../assets/js/time-picker.js"></script>
  <title>Guide | Dropdown</title>
  <style>
    .field-dropdown {
      width: 180px;
      max-width: 180px;
      flex: none;
    }
  </style>
</head>

<body style="overflow:hidden; margin:0;">
    <div class="general-container">
      <div class="general-area">
        <div class="general-top">
          <div class="general-label">Component</div>
          <div class="general-title">Dropdown</div>
        </div>
        <div class="general-middle">
          <div class="component-block">
            <div class="component-preview">
              <div class="field field-dropdown">
                <div class="field-form">
                  <!-- 숨겨진 select 태그 -->
                  <select class="dropdown-select" style="display: none">
                    <option value="OPTION1" active>OPTION1</option>
                    <option value="OPTION2">OPTION2</option>
                    <option value="OPTION3">OPTION3</option>
                    <option value="OPTION4">OPTION4</option>
                  </select>
                  <button type="button" class="btn-dropdown" aria-haspopup="listbox" aria-expanded="false">
                    <span class="text">OPTION1</span>
                    <span class="placeholder" style="display: none">Placeholder</span>
                  </button>
                  <div class="dropdown-list-box" role="listbox">
                    <div class="dim"></div>
                    <div class="dropdown-list-wrap">
                      <div class="dropdown-list-header">
                        <div class="title-box"></div>
                        <button type="button" class="btn-close" aria-label="드롭다운 닫기"></button>
                      </div>
                      <div class="dropdown-list-body">
                        <div class="dropdown-list active">
                          <button type="button" class="btn-dropdown-list" data-value="OPTION1">
                            <span>OPTION1</span>
                          </button>
                        </div>
                        <div class="dropdown-list">
                          <button type="button" class="btn-dropdown-list" data-value="OPTION2">
                            <span>OPTION2</span>
                          </button>
                        </div>
                        <div class="dropdown-list">
                          <button type="button" class="btn-dropdown-list" data-value="OPTION3">
                            <span>OPTION3</span>
                          </button>
                        </div>
                        <div class="dropdown-list">
                          <button type="button" class="btn-dropdown-list" data-value="OPTION4">
                            <span>OPTION4</span>
                          </button>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
<script>document.addEventListener("wheel",function(e){window.parent.postMessage({type:"iframeWheel",deltaY:e.deltaY,deltaX:e.deltaX},"*");},{passive:true});function _sh(){var h=Math.max(document.body.scrollHeight,document.body.offsetHeight,document.documentElement.scrollHeight,document.documentElement.offsetHeight);window.parent.postMessage({type:"iframeHeight",height:h},"*");}window.addEventListener("load",_sh);if(window.ResizeObserver){new ResizeObserver(_sh).observe(document.body);}</script>
</body>

</html>
