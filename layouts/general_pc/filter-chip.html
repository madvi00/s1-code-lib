  <script>
    // Filter chip: toggle .selected on btn-dropdown when value is chosen.
    // The first option in each chip is treated as the "default" (no .selected);
    // any other choice marks the chip as actively selected.
    (function ($) {
      function isDefaultValue($field, value) {
        var $first = $field.find('.dropdown-select option').first();
        if (!$first.length) return false;
        return String($first.attr('value')) === String(value);
      }
      $(document).on('dropdown:change', '.field-dropdown.has-label, .field-dropdown.has-label-solid', function (e, data) {
        var $btn = $(this).find('> .field-form > .btn-dropdown');
        if (!$btn.length) return;
        if (data && isDefaultValue($(this), data.value)) {
          $btn.removeClass('selected');
        } else {
          $btn.addClass('selected');
        }
      });
    })(jQuery);
  </script>
