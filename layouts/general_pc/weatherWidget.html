<!doctype html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <link rel="stylesheet" href="../../assets/css/lib-style.css" />
  <link rel="stylesheet" href="../../assets/css/pc-style.css" />
  <link rel="stylesheet" href="../../assets/css/iframe-layout.css" />
  <script src="../../assets/js/jquery-3.6.0.min.js"></script>
  <script src="../../assets/js/publish.js"></script>
  
  <title>Guide | Weather Icon</title>
  <style>
    .general-content-item-text {
      display: block;
      margin-bottom: 12px;
      font-size: 14px;
      white-space: nowrap;
    }
  </style>
</head>

<body style="overflow:hidden; margin:0;">
  <div class="general-container">
    <div class="general-area">
      <div class="general-top">
        <div class="general-label">Component</div>
        <div class="general-title">Weather Icon</div>
      </div>
      <div class="general-middle">

        <div class="component-block">
          <div class="component-block-header">
            <div>
              <div class="component-block-title">widget weather marker</div>
            </div>
          </div>
          <div class="component-preview" style="flex-wrap:wrap; gap:50px 150px; align-items:flex-start; padding-top:50px;">
            <div class="general-content-item">
              <span class="general-content-item-text">맑음</span>
              <div class="weather-widget">
                서울
                <img class="weather-widget-icon" src="../../assets/images/ic_weather_clear.svg" alt="맑음" />
                -6.4°
              </div>
            </div>
            <div class="general-content-item">
              <span class="general-content-item-text">구름조금 (낮), 구름많음 (낮)</span>
              <div class="weather-widget">
                청주
                <img class="weather-widget-icon" src="../../assets/images/ic_weather_partly_cloudy.svg" alt="구름 조금 (낮)" />
                -6.4°
              </div>
            </div>
            <div class="general-content-item">
              <span class="general-content-item-text">흐림</span>
              <div class="weather-widget">
                천안
                <img class="weather-widget-icon" src="../../assets/images/ic_weather_cloudy.svg" alt="흐림" />
                -8.6°
              </div>
            </div>
            <div class="general-content-item">
              <span class="general-content-item-text">비</span>
              <div class="weather-widget">
                부산
                <img class="weather-widget-icon" src="../../assets/images/ic_weather_rain.svg" alt="비" />
                -0.3°
              </div>
            </div>
            <div class="general-content-item">
              <span class="general-content-item-text">눈</span>
              <div class="weather-widget">
                강릉
                <img class="weather-widget-icon" src="../../assets/images/ic_weather_snow.svg" alt="눈" />
                -8.0°
              </div>
            </div>
            <div class="general-content-item">
              <span class="general-content-item-text">비 또는 눈, 눈 또는 비</span>
              <div class="weather-widget">
                수원
                <img class="weather-widget-icon" src="../../assets/images/ic_weather_rain_or_snow.svg" alt="비 또는 눈, 눈 또는 비" />
                -6.4°
              </div>
            </div>
            <div class="general-content-item">
              <span class="general-content-item-text">천둥번개</span>
              <div class="weather-widget">
                포항
                <img class="weather-widget-icon" src="../../assets/images/ic_weather_thunderstorm.svg" alt="천둥번개" />
                -1.5°
              </div>
            </div>
            <div class="general-content-item">
              <span class="general-content-item-text">가끔 비, 한때 비</span>
              <div class="weather-widget">
                울산
                <img class="weather-widget-icon" src="../../assets/images/ic_weather_shower.svg" alt="가끔 비, 한때 비" />
                3.2°
              </div>
            </div>
            <div class="general-content-item">
              <span class="general-content-item-text">가끔 눈, 한때 눈</span>
              <div class="weather-widget">
                인천
                <img class="weather-widget-icon" src="../../assets/images/ic_weather_snow_shower.svg" alt="가끔 눈, 한때 눈" />
                -5.3°
              </div>
            </div>
            <div class="general-content-item">
              <span class="general-content-item-text">가끔 비 또는 눈, 한때 비 또는 눈 (가끔 눈 또는 비, 한때 눈 또는 비)</span>
              <div class="weather-widget">
                평택
                <img class="weather-widget-icon" src="../../assets/images/ic_weather_rain_or_snow_shower.svg" alt="가끔 비 또는 눈, 한때 비 또는 눈" />
                -0.3°
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
  <script>document.addEventListener("wheel",function(e){window.parent.postMessage({type:"iframeWheel",deltaY:e.deltaY,deltaX:e.deltaX},"*");},{passive:true});function _sh(){var h=Math.max(document.body.scrollHeight,document.body.offsetHeight,document.documentElement.scrollHeight,document.documentElement.offsetHeight);window.parent.postMessage({type:"iframeHeight",height:h},"*");}window.addEventListener("load",_sh);if(window.ResizeObserver){new ResizeObserver(_sh).observe(document.body);}</script>
</body>

</html>
