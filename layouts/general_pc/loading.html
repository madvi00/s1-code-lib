<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <link rel="stylesheet" href="../../assets/css/lib-style.css" />
  <link rel="stylesheet" href="../../assets/css/pc-style.css" />
  <link rel="stylesheet" href="../../assets/css/iframe-layout.css" />
  <script src="../../assets/js/lib/jquery-3.6.0.min.js"></script>
  <script src="../../assets/js/publish.js"></script>
  
  <title>Guide | Loading</title>
</head>

<body style="overflow:hidden; margin:0;">
  <div class="general-container">
    <div class="general-area">
      <div class="general-top">
        <div class="general-label">Component</div>
        <div class="general-title">Loading</div>
      </div>
      <div class="general-middle">

        <div class="component-block">
          <div class="component-preview">
            <button type="button" class="btn btn-blue btn-medium" id="btn-show-loading">
              <span>Show Loading</span>
            </button>
            <div class="loading-box" id="loading-preview" role="status" aria-live="polite" aria-label="로딩 중" style="display:none; position:static; background:rgba(0,0,0,0.35); border-radius:8px; width:100%; min-height:120px;">
              <img src="../../assets/images/loading_dots.gif" alt="로딩 중" />
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
  <script>
  if(window.self===window.top){document.body.style.overflow='auto';}
  document.addEventListener("wheel",function(e){window.parent.postMessage({type:"iframeWheel",deltaY:e.deltaY,deltaX:e.deltaX},"*");},{passive:true});
  function _sh(){var h=Math.max(document.body.scrollHeight,document.body.offsetHeight,document.documentElement.scrollHeight,document.documentElement.offsetHeight);window.parent.postMessage({type:"iframeHeight",height:h},"*");}
  window.addEventListener("load",_sh);
  if(window.ResizeObserver){new ResizeObserver(_sh).observe(document.body);}

  document.getElementById('btn-show-loading').addEventListener('click', function() {
    // cross-origin 안전 처리: 부모 document 접근이 막히면 자기 iframe에 fallback
    var pdoc = document;
    var imgSrc = '../../assets/images/loading_dots.gif';
    try {
      if (window.parent !== window) {
        void window.parent.document.body; // cross-origin이면 throw
        pdoc = window.parent.document;
        imgSrc = 'assets/images/loading_dots.gif';
      }
    } catch (e) {
      // file:// 등 cross-origin iframe — 자기 document에 표시
    }

    var prev = pdoc.getElementById('__iframe_loading__');
    if (prev) return;

    var box = pdoc.createElement('div');
    box.id = '__iframe_loading__';
    box.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;z-index:99999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.35);';

    var img = pdoc.createElement('img');
    img.src = imgSrc;
    img.alt = 'loading';
    img.style.cssText = 'width:150px;height:auto;';
    box.appendChild(img);
    pdoc.body.appendChild(box);

    // 2초 후 자동 제거
    setTimeout(function() {
      var el = pdoc.getElementById('__iframe_loading__');
      if (el) el.remove();
    }, 2000);
  });
  </script>
</body>

</html>
