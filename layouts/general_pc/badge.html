<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../../assets/css/lib-style.css" />
  <link rel="stylesheet" href="../../assets/css/pc-style.css" />
  <link rel="stylesheet" href="../../assets/css/iframe-layout.css" />
  <title>Guide | Badge</title>
</head>

<body style="overflow:hidden; margin:0;">
  <div class="general-container" style="background:none; padding:0;">
    <div class="general-area">
      <div class="general-top">
        <div class="general-label">Component</div>
        <div class="general-title">Badge</div>
      </div>
      <div class="general-middle">

        <div class="component-block">
          <div class="component-preview" style="flex-wrap:wrap; gap:8px;">
            <div class="badge-box"><span class="badge blue">Blue</span></div>
            <div class="badge-box"><span class="badge gray">Gray</span></div>
            <div class="badge-box"><span class="badge teal">Teal</span></div>
            <div class="badge-box"><span class="badge green">Green</span></div>
          </div>
        </div>

      </div>
    </div>
  </div>
  <script>document.addEventListener("wheel",function(e){window.parent.postMessage({type:"iframeWheel",deltaY:e.deltaY,deltaX:e.deltaX},"*");},{passive:true});function _sh(){var h=Math.max(document.body.scrollHeight,document.body.offsetHeight,document.documentElement.scrollHeight,document.documentElement.offsetHeight);window.parent.postMessage({type:"iframeHeight",height:h},"*");}window.addEventListener("load",_sh);if(window.ResizeObserver){new ResizeObserver(_sh).observe(document.body);}</script>
</body>

</html>
