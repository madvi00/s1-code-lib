  <script>
  // 모달을 부모 document에 주입해 전체 화면 기준으로 표시
  document.addEventListener('click', function(e) {
    var btn = e.target.closest('.btn-modal');
    if (!btn) return;
    e.stopImmediatePropagation();

    var modalId = btn.getAttribute('data-modal');
    var modal = document.getElementById(modalId);
    if (!modal) return;

    // 새 창(standalone) 모드: 현재 document에서 직접 표시
    if (window.parent === window) {
      modal.classList.add('show');
      document.body.style.overflow = 'hidden';

      function closeModal() {
        modal.classList.remove('show');
        document.body.style.overflow = '';
      }

      var dim = modal.querySelector('.dim');
      var btnClose = modal.querySelector('.btn-close');
      if (dim) dim.addEventListener('click', closeModal, { once: true });
      if (btnClose) btnClose.addEventListener('click', closeModal, { once: true });

      function onEsc(ev) {
        if (ev.key === 'Escape') { closeModal(); document.removeEventListener('keydown', onEsc); }
      }
      document.addEventListener('keydown', onEsc);
      return;
    }

    // iframe 모드: 부모 document에 모달 복사 후 삽입
    var pdoc = window.parent.document;

    // 기존 데모 모달 제거
    var prev = pdoc.getElementById('__iframe_modal__');
    if (prev) prev.remove();

    // 모달 복사 후 부모 body에 삽입
    var clone = modal.cloneNode(true);
    clone.id = '__iframe_modal__';
    clone.classList.add('show');
    pdoc.body.appendChild(clone);
    pdoc.body.style.overflow = 'hidden';

    function closeModalIframe() {
      var el = pdoc.getElementById('__iframe_modal__');
      if (el) el.remove();
      pdoc.body.style.overflow = '';
    }

    var dim = clone.querySelector('.dim');
    var btnClose = clone.querySelector('.btn-close');
    if (dim) dim.addEventListener('click', closeModalIframe);
    if (btnClose) btnClose.addEventListener('click', closeModalIframe);

    function onEsc(ev) {
      if (ev.key === 'Escape') { closeModalIframe(); pdoc.removeEventListener('keydown', onEsc); }
    }
    pdoc.addEventListener('keydown', onEsc);
  }, true);
  </script>
