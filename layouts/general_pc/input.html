<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <link rel="stylesheet" href="../../assets/css/lib/bootstrap-datepicker.standalone.css" />
  <link rel="stylesheet" href="../../assets/css/lib-style.css" />
  <link rel="stylesheet" href="../../assets/css/pc-style.css" />
  <link rel="stylesheet" href="../../assets/css/iframe-layout.css" />
  <script src="../../assets/js/lib/jquery-3.6.0.min.js"></script>
  <script src="../../assets/js/lib/jquery-ui.min.js"></script>
  <script src="../../assets/js/lib/bootstrap.min.js"></script>
  <script>
    if (typeof cldMsg_prevMonth === 'undefined') {
      window.cldMsg_prevMonth = '이전달';
      window.cldMsg_nextMonth = '다음달';
      window.cldMsg_prevYear = '이전년';
      window.cldMsg_nextYear = '다음년';
      window.cldMsg_prev = '이전';
      window.cldMsg_next = '다음';
    }
  </script>
  <script src="../../assets/js/lib/bootstrap-datepicker.js"></script>
  <script src="../../assets/js/lib/popper.min.js"></script>
  <script src="../../assets/js/s1-uvis-script.js"></script>
  <script src="../../assets/js/lib/jquery.cookie.js"></script>
  <script src="../../assets/js/lib/jquery.mask.min.js"></script>
  <script src="../../assets/js/jquery.uvis.common.js"></script>
  <script>
    jQuery.browser = {};
    (function() {
      jQuery.browser.msie = false;
      jQuery.browser.version = 0;
      if (navigator.userAgent.match(/MSIE ([0-9]+)\./)) {
        jQuery.browser.msie = true;
        jQuery.browser.version = RegExp.$1;
      }
    })();
  </script>
  <script src="../../assets/js/publish.js"></script>
  <script src="../../assets/js/amobe_input.js"></script>
  <title>Guide | Input</title>
  <style>
    .input-wrap { width: 320px; }
  </style>
</head>

<body style="overflow:hidden; margin:0;">
  <div class="general-container">
    <div class="general-area">
      <div class="general-top">
        <div class="general-label">Component</div>
        <div class="general-title">Input</div>
      </div>
      <div class="general-middle">

        <div class="component-block">
          <div class="component-block-header">
            <div>
              <div class="component-block-title">Type='text'</div>
            </div>
          </div>
          <div class="component-preview" style="flex-direction:column; gap:8px; align-items:flex-start;">
            <div class="input-wrap">
              <input id="search_searchName1" name="search_searchName1" class="input-medium" placeholder="내용" type="text" value="" aria-label="텍스트 입력 (Medium)" />
            </div>
            <div class="input-wrap">
              <input id="search_searchName2" name="search_searchName2" class="input-small" placeholder="내용" type="text" value="" aria-label="텍스트 입력 (Small)" />
            </div>
            <div class="input-wrap">
              <input id="search_searchName3" name="search_searchName3" class="input-xsmall" placeholder="내용" type="text" value="" aria-label="텍스트 입력 (XSmall)" />
            </div>
            <div class="input-wrap">
              <input id="search_searchName4" name="search_searchName4" class="input-medium input-search" placeholder="검색" type="search" value="" aria-label="검색어 입력 (Medium)" />
              <div class="search-button-box">
                <button type="button" class="btn-search" aria-label="검색"></button>
              </div>
            </div>
            <div class="input-wrap">
              <input id="search_searchName5" name="search_searchName5" class="input-small input-search" placeholder="검색" type="search" value="" aria-label="검색어 입력 (Small)" />
              <div class="search-button-box">
                <button type="button" class="btn-search" aria-label="검색"></button>
              </div>
            </div>
            <div class="input-wrap">
              <input id="search_searchName6" name="search_searchName6" class="input-xsmall input-search" placeholder="검색" type="search" value="" aria-label="검색어 입력 (XSmall)" />
              <div class="search-button-box">
                <button type="button" class="btn-search" aria-label="검색"></button>
              </div>
            </div>
          </div>
        </div>

        <div class="component-block">
          <div class="component-block-header">
            <div>
              <div class="component-block-title">Password</div>
            </div>
          </div>
          <div class="component-preview">
            <div class="input-wrap">
              <input id="search_searchPw1" name="search_searchPw1" class="input-medium" placeholder="" type="password" value="" aria-label="비밀번호 입력" />
              <div class="eye-button-box">
                <button type="button" class="btn-eye" aria-label="비밀번호 표시/숨기기" aria-pressed="false"></button>
              </div>
            </div>
          </div>
        </div>

        <div class="component-block">
          <div class="component-block-header">
            <div>
              <div class="component-block-title">Number</div>
            </div>
          </div>
          <div class="component-preview">
            <div class="input-wrap">
              <input id="input_number_1" name="input_number_1" class="input-xsmall" type="number" value="100" maxlength="3" max="100" min="0" step="5" aria-label="숫자 입력 (0~100, 5 단위)" />
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
  <script>document.addEventListener("wheel",function(e){window.parent.postMessage({type:"iframeWheel",deltaY:e.deltaY,deltaX:e.deltaX},"*");},{passive:true});function _sh(){var h=Math.max(document.body.scrollHeight,document.body.offsetHeight,document.documentElement.scrollHeight,document.documentElement.offsetHeight);window.parent.postMessage({type:"iframeHeight",height:h},"*");}window.addEventListener("load",_sh);if(window.ResizeObserver){new ResizeObserver(_sh).observe(document.body);}</script>
</body>

</html>
