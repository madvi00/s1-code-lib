      window.cldMsg_prevMonth = '이전달';

  <script>
    jQuery.browser = {};
    (function() {
      jQuery.browser.msie = false;
      jQuery.browser.version = 0;
      if (navigator.userAgent.match(/MSIE ([0-9]+)\./)) {
        jQuery.browser.msie = true;
        jQuery.browser.version = RegExp.$1;

  <title>Guide | Datepicker</title>
  <style>
    .input-wrap { width: 190px; }

</head>

<body style="overflow:hidden; margin:0;">
  <div class="general-container">
    <div class="general-area">
      <div class="general-top">
        <div class="general-label">Component</div>
        <div class="general-title">Datepicker</div>
      </div>
      <div class="general-middle">

        <div class="component-block">
          <div class="component-block-header">
            <div>
              <div class="component-block-title">Single - Medium</div>
            </div>
          </div>
          <div class="component-preview">
            <div class="input-wrap date">
              <input type="text" class="datepicker input-medium" id="time1" name="time1" placeholder="날짜를 선택하세요" value="" />
              <i class="icon icon-calendar"></i>
            </div>
          </div>
        </div>

        <div class="component-block">
          <div class="component-block-header">
            <div>
              <div class="component-block-title">Single - small</div>
            </div>
          </div>
          <div class="component-preview">
            <div class="input-wrap date">
              <input type="text" class="datepicker input-small" id="time2" name="time2" placeholder="날짜를 선택하세요" value="" />
              <i class="icon icon-calendar"></i>
            </div>
          </div>
        </div>

        <div class="component-block">
          <div class="component-block-header">
            <div>
              <div class="component-block-title">Range - Medium</div>
            </div>
          </div>
          <div class="component-preview">
            <div class="input-group input-daterange">
              <div class="input-wrap date">
                <input type="text" class="datepicker input-medium" id="startDate1" name="startDate1" placeholder="날짜를 선택하세요" value="" />
                <i class="icon icon-calendar"></i>
              </div>
              <span class="between">~</span>
              <div class="input-wrap date">
                <input type="text" class="datepicker input-medium" id="endDate1" name="endDate1" placeholder="날짜를 선택하세요" value="" />
                <i class="icon icon-calendar"></i>
              </div>
            </div>
          </div>
        </div>

        <div class="component-block">
          <div class="component-block-header">
            <div>
              <div class="component-block-title">Range - small</div>
            </div>
          </div>
          <div class="component-preview">
            <div class="input-group input-daterange">
              <div class="input-wrap date">
                <input type="text" class="datepicker input-small" id="startDate2" name="startDate2" placeholder="날짜를 선택하세요" value="" />
                <i class="icon icon-calendar"></i>
              </div>
              <span class="between">~</span>
              <div class="input-wrap date">
                <input type="text" class="datepicker input-small" id="endDate2" name="endDate2" placeholder="날짜를 선택하세요" value="" />
                <i class="icon icon-calendar"></i>
              </div>
            </div>
          </div>
        </div>

        <div class="component-block">
          <div class="component-block-header">
            <div>
              <div class="component-block-title">Range &amp; time</div>
            </div>
          </div>
          <div class="component-preview">
            <div class="input-group input-daterange">
              <div class="input-wrap date">
                <input type="text" class="datepicker input-small" id="startDate3" name="startDate3" placeholder="날짜를 선택하세요" value="" />
                <i class="icon icon-calendar"></i>
              </div>
              <div class="input-wrap time">
                <div class="timepicker-box timepicker-small">
                  <div class="timepicker-input">
                    <input type="text" name="time-startDate" id="time-startDate" class="time-input input-small" placeholder="00:00" readonly />
                  </div>
                  <div class="timepicker timepicker-dropdown">
                    <div class="timepicker-picker-container">
                      <div class="timepicker-picker-area">
                        <div class="timepicker-picker">
                          <div class="timepicker-top">
                            <div class="time">
                              <button type="button" class="list ampm">오전</button>
                              <button type="button" class="list ampm">오후</button>
                            </div>
                            <div class="separator"></div>
                            <div class="time">
                              <button type="button" class="list hour">00</button>
                              <button type="button" class="list hour">01</button>
                              <button type="button" class="list hour">02</button>
                              <button type="button" class="list hour">03</button>
                              <button type="button" class="list hour">04</button>
                              <button type="button" class="list hour">05</button>
                              <button type="button" class="list hour">06</button>
                              <button type="button" class="list hour">07</button>
                              <button type="button" class="list hour">08</button>
                              <button type="button" class="list hour">09</button>
                              <button type="button" class="list hour">10</button>
                              <button type="button" class="list hour">11</button>
                              <button type="button" class="list hour">12</button>
                            </div>
                            <div class="separator"></div>
                            <div class="time">
                              <button type="button" class="minute list">00</button>
                              <button type="button" class="minute list">05</button>
                              <button type="button" class="minute list">10</button>
                              <button type="button" class="minute list">15</button>
                              <button type="button" class="minute list">20</button>
                              <button type="button" class="minute list">25</button>
                              <button type="button" class="minute list">30</button>
                              <button type="button" class="minute list">35</button>
                              <button type="button" class="minute list">40</button>
                              <button type="button" class="minute list">45</button>
                              <button type="button" class="minute list">50</button>
                              <button type="button" class="minute list">55</button>
                            </div>
                          </div>
                          <div class="timepicker-bottom">
                            <button type="button" class="btn-confirm" disabled>확인</button>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <span class="between">~</span>
              <div class="input-wrap date">
                <input type="text" class="datepicker input-small" id="endDate3" name="endDate3" placeholder="날짜를 선택하세요" value="" />
                <i class="icon icon-calendar"></i>
              </div>
              <div class="input-wrap time">
                <div class="timepicker-box timepicker-small">
                  <div class="timepicker-input">
                    <input type="text" name="time-endDate" id="time-endDate" class="time-input input-small" placeholder="00:00" readonly />
                  </div>
                  <div class="timepicker timepicker-dropdown">
                    <div class="timepicker-picker-container">
                      <div class="timepicker-picker-area">
                        <div class="timepicker-picker">
                          <div class="timepicker-top">
                            <div class="time">
                              <button type="button" class="list ampm">오전</button>
                              <button type="button" class="list ampm">오후</button>
                            </div>
                            <div class="separator"></div>
                            <div class="time">
                              <button type="button" class="list hour">00</button>
                              <button type="button" class="list hour">01</button>
                              <button type="button" class="list hour">02</button>
                              <button type="button" class="list hour">03</button>
                              <button type="button" class="list hour">04</button>
                              <button type="button" class="list hour">05</button>
                              <button type="button" class="list hour">06</button>
                              <button type="button" class="list hour">07</button>
                              <button type="button" class="list hour">08</button>
                              <button type="button" class="list hour">09</button>
                              <button type="button" class="list hour">10</button>
                              <button type="button" class="list hour">11</button>
                              <button type="button" class="list hour">12</button>
                            </div>
                            <div class="separator"></div>
                            <div class="time">
                              <button type="button" class="minute list">00</button>
                              <button type="button" class="minute list">05</button>
                              <button type="button" class="minute list">10</button>
                              <button type="button" class="minute list">15</button>
                              <button type="button" class="minute list">20</button>
                              <button type="button" class="minute list">25</button>
                              <button type="button" class="minute list">30</button>
                              <button type="button" class="minute list">35</button>
                              <button type="button" class="minute list">40</button>
                              <button type="button" class="minute list">45</button>
                              <button type="button" class="minute list">50</button>
                              <button type="button" class="minute list">55</button>
                            </div>
                          </div>
                          <div class="timepicker-bottom">
                            <button type="button" class="btn-confirm" disabled>확인</button>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
  <script>document.addEventListener("wheel",function(e){window.parent.postMessage({type:"iframeWheel",deltaY:e.deltaY,deltaX:e.deltaX},"*");},{passive:true});function _sh(){var h=Math.max(document.body.scrollHeight,document.body.offsetHeight,document.documentElement.scrollHeight,document.documentElement.offsetHeight);window.parent.postMessage({type:"iframeHeight",height:h},"*");}window.addEventListener("load",_sh);if(window.ResizeObserver){new ResizeObserver(_sh).observe(document.body);}</script>
</body>

</html>
