        colNames: ['순번', '소속', '성명', '생년월일', '차량번호', '일시', '장소', '결과', '직급', '성명', '확인날짜'],
        colModel: [{
            name: 'rownum',
            index: 'rownum',
            width: 64,
            align: 'center',
            sortable: true
          },
          {
            name: 'affiliation',
            index: 'affiliation',
            width: 120,
            align: 'center',
            sortable: false
          },
          {
            name: 'driverName',
            index: 'driverName',
            width: 80,
            align: 'center',
            sortable: false
          },
          {
            name: 'birthDate',
            index: 'birthDate',
            width: 120,
            align: 'center',
            sortable: false
          },
          {
            name: 'vehicleNumber',
            index: 'vehicleNumber',
            width: 120,
            align: 'center',
            sortable: false
          },
          {
            name: 'measurementDateTime',
            index: 'measurementDateTime',
            width: 120,
            align: 'center',
            sortable: false
          },
          {
            name: 'measurementLocation',
            index: 'measurementLocation',
            width: 195,
            align: 'left',
            sortable: false
          },
          {
            name: 'result',
            index: 'result',
            width: 64,
            align: 'center',
            sortable: false
          },
          {
            name: 'confirmerPosition',
            index: 'confirmerPosition',
            width: 80,
            align: 'center',
            sortable: false
          },
          {
            name: 'confirmerName',
            index: 'confirmerName',
            width: 80,
            align: 'center',
            sortable: false
          },
          {
            name: 'confirmationDate',
            index: 'confirmationDate',
            width: 120,
            align: 'center',
            sortable: false
          },
        ],
        sortable: true,
        rowNum: 15,
        autowidth: true,
        scrollRows: true,
        scroll: true,
        loadonce: true,
        viewrecords: true,
        multiselect: true,
        multiselectWidth: 43,
        multiboxonly: false,
        height: initialHeight,
        scrollTimeout: 1,
        shrinkToFit: true,
        forceFit: true,
        scrollOffset: 0,
        beforeSelectRow: function(rowid, e) {
          var rowData = grid.jqGrid('getRowData', rowid);
          // 빈 행은 선택 불가능
          if (rowData.isEmpty === 'true' || (!rowData.rownum && !rowData.affiliation)) {
            return false;
          }
          return true;
        },
        loadComplete: function(data) {
          // 그리드 높이 재계산 (레이아웃 완료 후)
          setTimeout(function() {
            var recalculatedHeight = calculateJqGridHeight({
              containerSelector: '#div_list',
              headerSelector: '.data-list-table-header',
              footerSelector: '.data-list-table-footer',
              padding: 56,
            });
            grid.jqGrid('setGridHeight', recalculatedHeight);
          }, 0);
          // 그룹 헤더 설정
          grid.jqGrid('setGroupHeaders', {
            useColSpanStyle: true,
            groupHeaders: [{
                startColumnName: 'affiliation',
                numberOfColumns: 4,
                titleText: '운수종사자',
              },
              {
                startColumnName: 'measurementDateTime',
                numberOfColumns: 3,
                titleText: '측정 내용',
              },
              {
                startColumnName: 'confirmerPosition',
                numberOfColumns: 2,
                titleText: '확인자',
              },
            ],
          });
          // 그리드 너비 설정 (DOM 렌더링 완료 후 실행)
          setTimeout(function() {
            grid.setGridWidth($('#div_list').width(), true);
          }, 0);
          // 빈 행 처리
          var ids = grid.jqGrid('getDataIDs');
          for (var i = 0; i < ids.length; i++) {
            var rowData = grid.jqGrid('getRowData', ids[i]);
            if (rowData.isEmpty === 'true' || (!rowData.rownum && !rowData.affiliation)) {
              // 빈 행의 체크박스 비활성화 및 숨김
              var checkbox = grid.find('tr#' + ids[i] + ' input[type="checkbox"]');
              checkbox.prop('disabled', true).hide();
              // 빈 행에 클래스 추가
              grid.find('tr#' + ids[i]).addClass('empty-row');
              // 빈 행의 모든 셀 내용 제거
              grid
                .find('tr#' + ids[i] + ' td')
                .not(':first')
                .html('');
            }
          }
        },
      });
    }
  </script>
</head>
