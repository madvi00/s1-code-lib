  <script type="text/javascript">
    // jqGrid Local Data - 노선 정류장 정보
    const _JQ_GRID_DATA_ROUTE_STOP = [{
        number: '1',
        itemName: '순번',
      },
      {
        number: '2',
        itemName: '구분',
      },
      {
        number: '3',
        itemName: '운행일자',
      },
      {
        number: '4',
        itemName: '출발시간',
      },
      {
        number: '5',
        itemName: '노선명',
      },
      {
        number: '6',
        itemName: '정류장명',
      },
      {
        number: '7',
        itemName: '탑승자명',
      },
      {
        number: '8',
        itemName: '탑승시간',
      },
      {
        number: '9',
        itemName: '사번',
      },
      {
        number: '10',
        itemName: '회사명',
      },
      {
        number: '11',
        itemName: '운수사',
      },
      {
        number: '12',
        itemName: '차량번호',
      },
    ];
    $(document).ready(function() {
      // jqGrid 높이 계산 및 리사이즈 설정
      if (typeof setupJqGridResize === 'function') {
        setupJqGridResize();
      }
      // 모달이 열릴 때 jqGrid 다시 그리기
      var modalEl = $('#modal-download-check');
      if (modalEl.length) {
        // MutationObserver로 모달의 display 속성 변경 감지
        var observer = new MutationObserver(function(mutations) {
          mutations.forEach(function(mutation) {
            if (mutation.type === 'attributes' && mutation.attributeName === 'style') {
              var display = modalEl.css('display');
              if (display === 'block') {
                // 모달이 열렸을 때 그리드 resizing
                setTimeout(function() {
                  resizeGrid();
                }, 0);
              }
            }
          });
        });
        observer.observe(modalEl[0], {
          attributes: true,
          attributeFilter: ['style']
        });
      }
      initGrid();
      // $(window).on('resize', resizeGrid);
    });
    // 스크롤 여부 확인 후 .ui-jqgrid-bdiv 너비 조정
    function adjustBdivWidth(grid) {
      var $bdiv = grid.closest('.ui-jqgrid-bdiv');
      if ($bdiv.length && $bdiv[0]) {
        var hasScroll = $bdiv[0].scrollHeight > $bdiv[0].clientHeight;
        if (hasScroll) {
          $bdiv.css('width', 'calc(100% + 12px)');
        } else {
          $bdiv.css('width', '');
        }
      }
    }

    function resizeGrid() {
      const $wrap = $('#div_list');
      $('#list').jqGrid('setGridWidth', $wrap.width());
      adjustBdivWidth($('#list'));
    }

    function initGrid() {
      // jqGrid 리스트 초기화, 생성
      const $wrap = $('#div_list');
      var grid = jQuery('#list');
      if (grid.length === 0) return;
      if (grid.jqGrid) {
        try {
          grid.jqGrid('GridUnload');
        } catch (e) {
          // 그리드가 이미 언로드되었거나 존재하지 않는 경우 무시
        }
      }
      // 데이터 준비
      var displayData = _JQ_GRID_DATA_ROUTE_STOP ? [..._JQ_GRID_DATA_ROUTE_STOP] : [];
      var isEmptyData = displayData.length === 0;
      var emptyRow = {
        number: '',
        itemName: '',
        isEmpty: true,
      };
      while (displayData.length < 6) {
        // 보여질 행의 갯수 10
        displayData.push(Object.assign({}, emptyRow));
      }
      grid.jqGrid({
        datatype: 'local',
        data: displayData,
        colNames: ['순번', '항목명'],
        colModel: [{
            name: 'number',
            index: 'number',
            width: 63,
            align: 'center',
            sortable: false
          },
          {
            name: 'itemName',
            index: 'itemName',
            width: 285,
            align: 'center',
            sortable: false
          },
        ],
        sortable: false,
        rowNum: 10000, // 모든 행 표시
        autowidth: true,
        scrollRows: false,
        scroll: true,
        loadonce: true,
        viewrecords: true,
        // width: $wrap.width(),
        height: 204,
        scrollTimeout: 1,
        shrinkToFit: true,
        forceFit: true,
        scrollOffset: 0,
        multiselect: true,
        multiselectWidth: 43,
        multiboxonly: false,
        beforeSelectRow: function(rowid, e) {
          var rowData = grid.jqGrid('getRowData', rowid);
          // 빈 행은 선택 불가능
          if (rowData.isEmpty === 'true' || (!rowData.number && !rowData.itemName)) {
            return false;
          }
          return true;
        },
        onSelectRow: function(rowid, status, e) {
          var rowData = grid.jqGrid('getRowData', rowid);
          if (rowData.isEmpty !== 'true' && rowData.number) {
            // 선택된 행의 데이터로 하위 테이블 업데이트
            // 필요시 여기에 로직 추가
          }
        },
        loadComplete: function(data) {
          // 불필요한 wrapper div 제거
          var $bdiv = grid.closest('.ui-jqgrid-bdiv');
          if ($bdiv.length) {
            var $wrapper = $bdiv.find('> div[style*="position:relative"]');
            if ($wrapper.length) {
              var $emptyDiv = $wrapper.find('> div:empty');
              if ($emptyDiv.length) {
                $emptyDiv.remove();
              }
              // table을 직접 bdiv의 자식으로 이동
              var $table = $wrapper.find('table');
              if ($table.length) {
                $table.detach();
                $wrapper.replaceWith($table);
              }
            }
          }
          // 스크롤 여부 확인 후 .ui-jqgrid-bdiv 너비 조정
          setTimeout(function() {
            adjustBdivWidth(grid);
          }, 0);
          // 빈 행 처리
          var ids = grid.jqGrid('getDataIDs');
          for (var i = 0; i < ids.length; i++) {
            var rowData = grid.jqGrid('getRowData', ids[i]);
            if (rowData.isEmpty === 'true' || (!rowData.number && !rowData.itemName)) {
              // 빈 행의 체크박스 비활성화 및 숨김
              var checkbox = grid.find('tr#' + ids[i] + ' input[type="checkbox"]');
              checkbox.prop('disabled', true).hide();
              // 빈 행에 클래스 추가
              grid.find('tr#' + ids[i]).addClass('empty-row');
              // 빈 행의 모든 셀 내용 제거 (첫 번째 셀인 체크박스는 제외)
              grid
                .find('tr#' + ids[i] + ' td')
                .not(':first')
                .html('');
            }
          }
        },
      });
    }
  </script>
