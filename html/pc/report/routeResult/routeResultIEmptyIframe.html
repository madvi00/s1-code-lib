                // 빈 행의 모든 셀 내용 제거
                grid
                  .find('tr#' + ids[i] + ' td')
                  .not(':first')
                  .html('');
              }
            }
          }
        },
      });
    }

    function exportExcel() {
      if (jQuery('#gview_list').jqGrid('getGridParam', 'records') < 1) {
        alert('운행실적 데이터가 없습니다.');
        return false;
      }
      // 엑셀 다운로드 로직
      alert('엑셀 다운로드 기능을 구현해주세요.');
    }
  </script>
