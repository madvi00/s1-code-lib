    // jqGrid Local Data - 운행경로 정보
    const _JQ_GRID_DATA_ROUTE_INFO = [{
        rownum: '1',
        operationTime: '05:30:00',
        stopName: '16라인',
        speed: '30',
      },
      {
        rownum: '2',
        operationTime: '05:35:27',
        stopName: '17라인(H1방면)',
        speed: '28',
      },
      {
        rownum: '3',
        operationTime: '05:47:12',
        stopName: '15라인(H2방면)',
        speed: '24',
      },
      {
        rownum: '4',
        operationTime: '05:52:30',
        stopName: '고덕국제신도시파라노말엑티비티',
        speed: '56',
      },
      {
        rownum: '5',
        operationTime: '05:58:24',
        stopName: '리라고덕스타힐스아파트',
        speed: '70',
      },
      {
        rownum: '6',
        operationTime: '06:01:47',
        stopName: 'SR6',
        speed: '71',
      },
    ];
    $(document).ready(function() {
      // jqGrid 높이 계산 및 리사이즈 설정
      if (typeof setupJqGridResize === 'function') {
        setupJqGridResize({
          containerSelector: '#div_list',
          gridSelector: '#list',
        });
      }
      // 모달이 열릴 때 jqGrid 다시 그리기
      var modalEl = $('#modal-operation-info');
      if (modalEl.length) {
        // MutationObserver로 모달의 display 속성 변경 감지
        var observer = new MutationObserver(function(mutations) {
          mutations.forEach(function(mutation) {
            if (mutation.type === 'attributes' && mutation.attributeName === 'style') {
              var display = modalEl.css('display');
              if (display === 'block') {
                // 모달이 열렸을 때 그리드 resizing
                setTimeout(function() {
                  resizeGrid();
                }, 0);
              }
            }
          });
        });
        observer.observe(modalEl[0], {
          attributes: true,
          attributeFilter: ['style']
        });
      }
      // 초기 로드 시에도 그리드 초기화
      initRouteInfoGrid();
    });
    // 스크롤 여부 확인 후 .ui-jqgrid-bdiv 너비 조정
    function adjustBdivWidth(grid) {
      var $bdiv = grid.closest('.ui-jqgrid-bdiv');
      if ($bdiv.length && $bdiv[0]) {
        var hasScroll = $bdiv[0].scrollHeight > $bdiv[0].clientHeight;
        if (hasScroll) {
          $bdiv.css('width', 'calc(100% + 12px)');
        } else {
          $bdiv.css('width', '');
        }
      }
    }

    function resizeGrid() {
      const $wrap = $('#div_list');
      $('#list').jqGrid('setGridWidth', $wrap.width());
      adjustBdivWidth($('#list'));
    }

    function initRouteInfoGrid() {
      const $wrap = $('#div_list');
      var grid = jQuery('#list');
      if (grid.length === 0) return;
      // 기존 그리드가 있으면 언로드
      if (grid.jqGrid) {
        try {
          grid.jqGrid('GridUnload');
        } catch (e) {
          // 그리드가 이미 언로드되었거나 존재하지 않는 경우 무시
        }
      }
      // 데이터 준비
      var displayData = _JQ_GRID_DATA_ROUTE_INFO ? [..._JQ_GRID_DATA_ROUTE_INFO] : [];
      var initialHeight = calculateJqGridHeight({
        containerSelector: '#div_list',
        gridSelector: '#list',
        initialHeight: 170,
        maxHeight: 170,
        minHeight: 170,
      });
      grid.jqGrid({
        datatype: 'local',
        data: displayData,
        colNames: ['순번', '운행 시간', '정류장명', '속도(km/h)'],
        colModel: [{
            name: 'rownum',
            index: 'rownum',
            width: 63,
            align: 'center',
            sortable: false,
          },
          {
            name: 'operationTime',
            index: 'operationTime',
            width: 80,
            align: 'center',
            sortable: false,
          },
          {
            name: 'stopName',
            index: 'stopName',
            width: 258,
            align: 'left',
            sortable: false,
          },
          {
            name: 'speed',
            index: 'speed',
            width: 126,
            align: 'center',
            sortable: false,
          },
        ],
        sortable: false,
        rowNum: 10000,
        autowidth: true,
        scrollRows: false,
        scroll: true,
        loadonce: true,
        viewrecords: true,
        height: 204,
        scrollTimeout: 1,
        shrinkToFit: true,
        forceFit: true,
        scrollOffset: 0,
        loadui: 'disable',
        loadComplete: function(data) {
          // loading 요소 제거
          grid.closest('.ui-jqgrid').find('.loading').remove();
          grid.closest('.ui-jqgrid').find('.ui-jqgrid-load').remove();
          // 불필요한 wrapper div 제거
          var $bdiv = grid.closest('.ui-jqgrid-bdiv');
          if ($bdiv.length) {
            var $wrapper = $bdiv.find('> div[style*="position:relative"]');
            if ($wrapper.length) {
              var $emptyDiv = $wrapper.find('> div:empty');
              if ($emptyDiv.length) {
                $emptyDiv.remove();
              }
              // table을 직접 bdiv의 자식으로 이동
              var $table = $wrapper.find('table');
              if ($table.length) {
                $table.detach();
                $wrapper.replaceWith($table);
              }
            }
          }
          // 스크롤 여부 확인 후 .ui-jqgrid-bdiv 너비 조정
          setTimeout(function() {
            adjustBdivWidth(grid);
          }, 0);
          // 빈 행 처리
          var ids = grid.jqGrid('getDataIDs');
          for (var i = 0; i < ids.length; i++) {
            var rowData = grid.jqGrid('getRowData', ids[i]);
            if (rowData.isEmpty === 'true' || (!rowData.rownum && !rowData.stopName)) {
              // 빈 행에 클래스 추가
              grid.find('tr#' + ids[i]).addClass('empty-row');
              // 빈 행의 모든 셀 내용 제거
              grid
                .find('tr#' + ids[i] + ' td')
                .not(':first')
                .html('');
            }
          }
          // 데이터가 비어있을 때 empty 메시지 표시
          if (isEmptyData) {
            var emptyMsg = '<tr class="empty-message-row">' + '  <td colspan="4">' + '    <span>데이터가 없습니다.</span>' + '  </td>' + '</tr>';
            grid.find('tbody').append(emptyMsg);
          }
        },
      });
    }
  </script>

                            </button>
                          </div>
                        </div>
                        <div class="data-table" id="div_list">

                        </div>
                      </div>
                    </div>
                  </div>
                  <div class="data-form-map">
                    <div class="map-control-box">
                      <div class="control-left">
                        <div class="input-group">

                          <div class="input-wrap">
                            <div class="field field-dropdown field-x-small">
                              <div class="field-form">
                                <!-- 숨겨진 select 태그 -->
                                <select class="dropdown-select" style="display: none">
                                  >
                                  <option value="5" selected>5초</option>
                                  <option value="10" undefined>10초</option>
                                  <option value="30" undefined>30초</option>
                                  <option value="60" undefined>60초</option>
                                </select>
                                <button type="button" class="btn-dropdown" id="cycleDropdown">
                                  <span class="text">5초</span>
                                  <span class="placeholder" style="display: none">주기 선택</span>
                                </button>
                                <div class="dropdown-list-box">
                                  <div class="dropdown-list selected">
                                    <button type="button" class="btn-dropdown-list" data-value="5" undefined>
                                      <span>5초</span>
                                    </button>
                                  </div>
                                  <div class="dropdown-list undefined">
                                    <button type="button" class="btn-dropdown-list" data-value="10" undefined>
                                      <span>10초</span>
                                    </button>
                                  </div>
                                  <div class="dropdown-list undefined">
                                    <button type="button" class="btn-dropdown-list" data-value="30" undefined>
                                      <span>30초</span>
                                    </button>
                                  </div>
                                  <div class="dropdown-list undefined">
                                    <button type="button" class="btn-dropdown-list" data-value="60" undefined>
                                      <span>60초</span>
                                    </button>
                                  </div>
                                </div>
                              </div>
                            </div>
                          </div>
                          <button type="button" class="btn btn-white btn-xsmall btn-route-play" onclick="">
                            <span>경로보기</span>
                          </button>
                          <button type="button" class="btn btn-white btn-xsmall btn-route-pause" onclick="">
                            <span>보기중지</span>
                          </button>
                        </div>
                      </div>
                    </div>
                    <div class="map-view-box">
                      <!-- 맵 영역 -->
                      <div id="canvas">
                        <img style="width: 100%; height: 100%; object-fit: cover" src="../../../../assets/images/dummy/img_map_dummy.png" alt="map" />
                      </div>
                      <!-- //맵 영역 -->
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="modal-bottom">
          <div class="modal-button-box">
            <button type="button" class="btn btn-blue btn-small" onclick="">
              <span>확인</span>
            </button>
          </div>
        </div>
        <button type="button" class="btn-close" title="팝업창 닫기 버튼"></button>
      </div>
    </div>
  </div>
