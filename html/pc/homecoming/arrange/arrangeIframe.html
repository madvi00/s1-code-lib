    // 달력 datepicker 초기화
    function initCalendarDatePicker() {
      if (typeof $.fn.datepicker !== 'undefined') {
        var $datepicker = $('#calendarDatePicker');
        if ($datepicker.length && !$datepicker.data('datepicker')) {
          $datepicker.datepicker({
            language: 'ko',
            weekStart: 1,
            format: 'yyyy.mm.dd',
            todayBtn: false,
            todayHighlight: true,
            clearBtn: false,
            autoclose: false,
            maxViewMode: 2,
            templates: {
              leftArrow: '<i class="icon icon-arrow-left"></i>',
              rightArrow: '<i class="icon icon-arrow-right"></i>',
            },
            beforeShowDay: function(date) {
              // 주말 및 공휴일 처리
              var day = date.getDay();
              var isWeekend = day === 0 || day === 6; // 일요일(0) 또는 토요일(6)
              return {
                classes: isWeekend ? 'weekend' : '',
                tooltip: '',
                enabled: true,
              };
            },
          });
          // 날짜 선택 이벤트
          $datepicker.on('changeDate', function(e) {
            var selectedDate = e.date;
            // 선택된 날짜로 데이터 필터링 및 새로고침
            // listLoad(false, 1);
          });
        }
      } else {
        setTimeout(initCalendarDatePicker, 100);
      }
    }

    function listLoad(firstNoLoad, page) {

      $('#list').jqGrid('GridUnload');
      var grid = jQuery('#list');
      // 데이터가 없거나 부족할 때 빈 행 추가
      var displayData = _JQ_GRID_DATA || [];
      var emptyRow = {
        rownum: '',
        homecomingType: '',
        round: '',
        vehicleType: '',
        routeName: '',
        departureDate: '',
        departureTime: '',
        departurePoint: '',
        detailedRoute: '',
        vehicleNumber: '',
        operatingCompany: '',
        vehicleId: '',
        totalPassengers: '',
        adultPassengers: '',
        childPassengers: '',
        status: '',
        isEmpty: true,
      };

        displayData.push(Object.assign({}, emptyRow));

      // 초기 높이 계산 (공통 함수 사용)
      var initialHeight = calculateJqGridHeight({

        headerSelector: '.data-list-table-header',
        footerSelector: '.data-list-table-footer',

      });

        colModel: [{
            name: 'rownum',
            index: 'rownum',
            width: 64,
            align: 'center',
            sortable: false
          },
          {
            name: 'homecomingType',
            index: 'homecomingType',
            width: 72,
            align: 'center',
            sortable: false
          },
          {
            name: 'round',
            index: 'round',
            width: 48,
            align: 'center',
            sortable: false
          },

            name: 'vehicleType',

            name: 'departureDate',

            name: 'departureTime',

            name: 'vehicleNumber',

            align: 'center',
            sortable: false
          },

            name: 'operatingCompany',
            index: 'operatingCompany',

            sortable: false
          },

            index: 'totalPassengers',

            align: 'center',

            formatter: function(cellvalue, options, rowObject) {
              if (rowObject.adultPassengers !== undefined && rowObject.childPassengers !== undefined) {
                var adult = parseInt(rowObject.adultPassengers) || 0;
                var child = parseInt(rowObject.childPassengers) || 0;
                return adult + child;
              }
              return cellvalue || '';
            },
          },
          {
            name: 'adultPassengers',
            index: 'adultPassengers',
            width: 53,
            align: 'center',
            sortable: false,
            formatter: function(cellvalue) {
              return cellvalue || '0';
            },
          },
          {
            name: 'childPassengers',
            index: 'childPassengers',
            width: 53,
            align: 'center',
            sortable: false,
            formatter: function(cellvalue) {
              return cellvalue || '0';
            },
          },

            name: 'status',

            width: 80,
            align: 'center',

        multiboxonly: false,
        height: initialHeight,
        scrollTimeout: 1,
        shrinkToFit: true,
        forceFit: true,
        scrollOffset: 0,
        beforeSelectRow: function(rowid, e) {
          var rowData = grid.jqGrid('getRowData', rowid);
          // 빈 행은 선택 불가능
          if (rowData.isEmpty === 'true' || (!rowData.rownum && !rowData.routeName)) {
            return false;
          }
          return true;
        },
        loadComplete: function(data) {
          // 그리드 높이 재계산 (레이아웃 완료 후)
          setTimeout(function() {
            var recalculatedHeight = calculateJqGridHeight({
              containerSelector: '#div_list',
              headerSelector: '.data-list-table-header',
              footerSelector: '.data-list-table-footer',
              padding: 56,
            });
            grid.jqGrid('setGridHeight', recalculatedHeight);
          }, 0);
          // 그룹 헤더 설정
          grid.jqGrid('setGroupHeaders', {
            useColSpanStyle: true,
            groupHeaders: [{
              startColumnName: 'totalPassengers',
              numberOfColumns: 3,
              titleText: '총인원',
            }, ],
          });
          // 빈 행 처리
          var ids = grid.jqGrid('getDataIDs');
          for (var i = 0; i < ids.length; i++) {
            var rowData = grid.jqGrid('getRowData', ids[i]);
            if (rowData.isEmpty === 'true' || (!rowData.rownum && !rowData.routeName)) {
              // 빈 행의 체크박스 비활성화 및 숨김
              var checkbox = grid.find('tr#' + ids[i] + ' input[type="checkbox"]');
              checkbox.prop('disabled', true).hide();
              // 빈 행에 클래스 추가
              grid.find('tr#' + ids[i]).addClass('empty-row');
              // 빈 행의 모든 셀 내용 제거
              grid
                .find('tr#' + ids[i] + ' td')
                .not(':first')
                .html('');
            }
          }
          // 스크롤 여부 확인 후 .ui-jqgrid-bdiv 너비 조정
          setTimeout(function() {
            adjustBdivWidth(grid);
          }, 0);
        },
      });
    }
  </script>
