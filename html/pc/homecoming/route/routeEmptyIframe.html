  <title>차량운행관리 시스템 - 귀성 노선 관리</title>
  <script type="text/javascript">
    // jqGride Local Data
    const _JQ_GRID_DATA = [];
    // 정류장 정보 jqGrid 데이터
    const _STOP_GRID_DATA = [{
        stopSeq: 1,
        stopName: '기흥캠퍼스',
        adultFare: '10,000',
        childFare: '8,000',
      },
      {
        stopSeq: 2,
        stopName: '선택',
        adultFare: '',
        childFare: '8,000',
      },
      {
        stopSeq: 3,
        stopName: '군산고속버스터미널',
        adultFare: '10,000',
        childFare: '8,000',
      },
      {
        stopSeq: 4,
        stopName: '선택',
        adultFare: '',
        childFare: '',
      },
    ];
    // NOTE: 기존과 열 구조가 다름에 따라, colNames/colModel도 아래에서 맞춰줍니다.
    // 이하 기존 스크립트 유지, listLoad에서 컬럼명/모델만 맞춤
    $(document).ready(function() {
      setPageDefault();
      stopListLoad();
      // jqGrid 높이 계산 및 리사이즈 설정 (공통 함수 사용)
      setupJqGridResize({
        containerSelector: '#div_list',
        gridSelector: '#list',
      });
      // 초기 로딩 시 그리드 너비 설정
      $(window).resize(function() {
        $('#list').setGridWidth($('#div_list').width(), true);
      });
      // 초기 로딩 시 한 번 실행
      setTimeout(function() {
        $('#list').setGridWidth($('#div_list').width(), true);
      }, 100);
      // 필요시 나머지 이벤트 핸들러 추가 (생략)
    });

    function setPageDefault() {
      listLoad(false, 1);
    }

    function listLoad(firstNoLoad, page) {
      // jqGrid 리스트 초기화, 생성
      $('#list').jqGrid('GridUnload');
      var grid = jQuery('#list');
      var displayData = _JQ_GRID_DATA || [];
      var isEmptyData = displayData.length === 0;
      // 초기 높이 계산 (공통 함수 사용)
      var initialHeight = calculateJqGridHeight({
        containerSelector: '#div_list',
        headerSelector: '.data-list-table-header',
        footerSelector: '.data-list-table-footer',
        padding: 56,
      });
      grid.jqGrid({
        datatype: 'local',
        data: displayData,
        colNames: ['순번', '귀성 구분', '차량 구분', '지역', '노선명', '출발 정류장', '최종 정류장'],
        colModel: [{
            name: 'rownum',
            index: 'rownum',
            width: 80,
            align: 'center',
            sortable: true
          },
          {
            name: 'homecomingType',
            index: 'homecomingType',
            width: 100,
            align: 'center',
            sortable: true
          },
          {
            name: 'vehicleType',
            index: 'vehicleType',
            width: 100,
            align: 'center',
            sortable: true
          },
          {
            name: 'region',
            index: 'region',
            width: 100,
            align: 'center',
            sortable: true
          },
          {
            name: 'routeName',
            index: 'routeName',
            width: 200,
            align: 'left',
            sortable: true
          },
          {
            name: 'departureStop',
            index: 'departureStop',
            width: 150,
            align: 'center',
            sortable: true
          },
          {
            name: 'finalStop',
            index: 'finalStop',
            width: 200,
            align: 'center',
            sortable: false
          },
        ],
        sortable: false,
        rowNum: 15,
        autowidth: true,
        scrollRows: true,
        scroll: true,
        loadonce: true,
        viewrecords: true,
        multiselect: true,
        multiselectWidth: 55,
        multiboxonly: false,
        height: initialHeight,
        scrollTimeout: 1,
        shrinkToFit: true,
        forceFit: true,
        scrollOffset: 0,
        beforeSelectRow: function(rowid, e) {
          var rowData = grid.jqGrid('getRowData', rowid);
          // 빈 행은 선택 불가능
          if (rowData.isEmpty === 'true' || (!rowData.rownum && !rowData.routeName)) {
            return false;
          }
          return true;
        },
        loadComplete: function(data) {
          // 그리드 너비 설정 (DOM 렌더링 완료 후 실행)
          setTimeout(function() {
            grid.setGridWidth($('#div_list').width(), true);
          }, 0);
          // 불필요한 wrapper div 제거
          var $bdiv = grid.closest('.ui-jqgrid-bdiv');
          if ($bdiv.length) {
            var $wrapper = $bdiv.find('> div[style*="position:relative"]');
            if ($wrapper.length) {
              var $emptyDiv = $wrapper.find('> div:empty');
              if ($emptyDiv.length) {
                $emptyDiv.remove();
              }
              // table을 직접 bdiv의 자식으로 이동
              var $table = $wrapper.find('table');
              if ($table.length) {
                $table.detach();
                $wrapper.replaceWith($table);
              }
            }
          }
          // 데이터가 없을 때 메시지 표시
          if (isEmptyData) {
            var emptyMsg = '<tr class="empty-message-row">' + '<td colspan="18">' + '<span>등록된 노선이 없어요.</span>' + '  </td>' + '</tr>';
            grid.find('tbody tr').remove();
            grid.find('tbody').append(emptyMsg);
            return;
          }
          // 빈 행 처리
          var ids = grid.jqGrid('getDataIDs');
          for (var i = 0; i < ids.length; i++) {
            var rowData = grid.jqGrid('getRowData', ids[i]);
            if (rowData.isEmpty === 'true' || (!rowData.rownum && !rowData.routeName)) {
              // 빈 행의 체크박스 비활성화 및 숨김
              var checkbox = grid.find('tr#' + ids[i] + ' input[type="checkbox"]');
              checkbox.prop('disabled', true).hide();
              // 빈 행에 클래스 추가
              grid.find('tr#' + ids[i]).addClass('empty-row');
              // 빈 행의 모든 셀 내용 제거
              grid
                .find('tr#' + ids[i] + ' td')
                .not(':first')
                .html('');
            }
          }
          // 스크롤 여부 확인 후 .ui-jqgrid-bdiv 너비 조정
          setTimeout(function() {
            adjustBdivWidth(grid);
          }, 0);
        },
      });
    }
  </script>
