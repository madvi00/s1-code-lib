        height: initialHeight,

        shrinkToFit: true,
        forceFit: true,
        scrollOffset: 0,
        beforeSelectRow: function(rowid, e) {
          var rowData = grid.jqGrid('getRowData', rowid);
          // л№Ҳ н–үмқҖ м„ нғқ л¶Ҳк°ҖлҠҘ
          if (rowData.isEmpty === 'true' || (!rowData.rownum && !rowData.routeName)) {
            return false;
          }
          return true;
        },
        loadComplete: function(data) {
          // к·ёлҰ¬л“ң л„Ҳл№„ м„Өм • (DOM л ҢлҚ”л§Ғ мҷ„лЈҢ нӣ„ мӢӨн–ү)
          setTimeout(function() {
            grid.setGridWidth($('#div_list').width(), true);
          }, 0);
          // л¶Ҳн•„мҡ”н•ң wrapper div м ңкұ°
          var $bdiv = grid.closest('.ui-jqgrid-bdiv');
          if ($bdiv.length) {
            var $wrapper = $bdiv.find('> div[style*="position:relative"]');
            if ($wrapper.length) {
              var $emptyDiv = $wrapper.find('> div:empty');
              if ($emptyDiv.length) {
                $emptyDiv.remove();
              }
              // tableмқ„ м§Ғм ‘ bdivмқҳ мһҗмӢқмңјлЎң мқҙлҸҷ
              var $table = $wrapper.find('table');
              if ($table.length) {
                $table.detach();
                $wrapper.replaceWith($table);
              }
            }
          }
          // лҚ°мқҙн„°к°Җ м—Ҷмқ„ л•Ң л©”мӢңм§Җ н‘ңмӢң
          if (isEmptyData) {

            grid.find('tbody tr').remove();
            grid.find('tbody').append(emptyMsg);
            return;
          }
          // л№Ҳ н–ү мІҳлҰ¬
          var ids = grid.jqGrid('getDataIDs');
          for (var i = 0; i < ids.length; i++) {
            var rowData = grid.jqGrid('getRowData', ids[i]);
            if (rowData.isEmpty === 'true' || (!rowData.rownum && !rowData.routeName)) {
              // л№Ҳ н–үмқҳ мІҙнҒ¬л°•мҠӨ л№„нҷңм„ұнҷ” л°Ҹ мҲЁк№Җ
              var checkbox = grid.find('tr#' + ids[i] + ' input[type="checkbox"]');
              checkbox.prop('disabled', true).hide();
              // л№Ҳ н–үм—җ нҒҙлһҳмҠӨ м¶”к°Җ
              grid.find('tr#' + ids[i]).addClass('empty-row');
              // л№Ҳ н–үмқҳ лӘЁл“  м…Җ лӮҙмҡ© м ңкұ°
              grid
                .find('tr#' + ids[i] + ' td')
                .not(':first')
                .html('');
            }
          }
          // мҠӨнҒ¬лЎӨ м—¬л¶Җ нҷ•мқё нӣ„ .ui-jqgrid-bdiv л„Ҳл№„ мЎ°м •
          setTimeout(function() {
            adjustBdivWidth(grid);
          }, 0);
        },
      });
