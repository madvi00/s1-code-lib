          $datepicker.datepicker({
            language: 'ko',
            weekStart: 1,
            format: 'yyyy.mm.dd',
            todayBtn: false,
            todayHighlight: true,
            clearBtn: false,
            autoclose: false,
            maxViewMode: 2,
            templates: {
              leftArrow: '<i class="icon icon-arrow-left"></i>',
              rightArrow: '<i class="icon icon-arrow-right"></i>',
            },
            beforeShowDay: function(date) {
              // 주말 및 공휴일 처리
              var day = date.getDay();
              var isWeekend = day === 0 || day === 6; // 일요일(0) 또는 토요일(6)
              return {
                classes: isWeekend ? 'weekend' : '',
                tooltip: '',
                enabled: true,
              };
            },
          });

          $datepicker.on('changeDate', function(e) {

    function syncHeaderHeight() {
      var $leftHeaderRow = $('#list').closest('.ui-jqgrid').find('.ui-jqgrid-htable thead tr');

      if ($leftHeaderRow.length && $rightHeader.length) {
        var leftHeaderRowHeight = $leftHeaderRow.outerHeight() || parseInt($leftHeaderRow.css('height')) || 0;
        // 오른쪽 테이블의 thead 전체 높이 가져오기 (tr이 2개 있어서 56px)
        var rightHeaderHeight = $rightHeader.outerHeight() || parseInt($rightHeader.css('height')) || 0;
