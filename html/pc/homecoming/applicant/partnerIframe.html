      if (typeof $.fn.datepicker !== 'undefined') {

        if ($datepicker.length && !$datepicker.data('datepicker')) {
          $datepicker.datepicker({
            language: 'ko',
            weekStart: 1,
            format: 'yyyy.mm.dd',
            todayBtn: false,
            todayHighlight: true,
            clearBtn: false,
            autoclose: false,
            maxViewMode: 2,
            templates: {
              leftArrow: '<i class="icon icon-arrow-left"></i>',
              rightArrow: '<i class="icon icon-arrow-right"></i>',
            },
            beforeShowDay: function(date) {
              // 주말 및 공휴일 처리
              var day = date.getDay();
              var isWeekend = day === 0 || day === 6; // 일요일(0) 또는 토요일(6)
              return {
                classes: isWeekend ? 'weekend' : '',
                tooltip: '',
                enabled: true,
              };

    function listLoad(firstNoLoad, page) {
      // jqGrid 리스트 초기화, 생성

        rownum: '',
        companyName: '',
        applicantId: '',
        requestedSeats: '',
        numberOfApplications: '',
        totalAmount: '',
        depositStatus: '',

      };

        displayData.push(Object.assign({}, emptyRow));

        footerSelector: '.data-list-table-footer',

            name: 'rownum',
            index: 'rownum',

            align: 'center',
            sortable: false,
            fixed: true

            name: 'companyName',
            index: 'companyName',
            width: 'auto',
            align: 'center',
            sortable: false,
            fixed: true

            name: 'applicantId',
            index: 'applicantId',
            width: 'auto',
            align: 'center',
            sortable: false,

          },

            name: 'requestedSeats',
            index: 'requestedSeats',

            align: 'center',
            sortable: false,
            fixed: true
          },
          {
            name: 'numberOfApplications',
            index: 'numberOfApplications',
            width: 79,
            align: 'center',
            sortable: false,
            fixed: true
          },
          {
            name: 'totalAmount',
            index: 'totalAmount',
            width: 'auto',
            align: 'center',
            sortable: false
          },
          {
            name: 'depositStatus',
            index: 'depositStatus',
            width: 'auto',
            align: 'center',
            sortable: false
          },
        ],
        sortable: false,
        rowNum: 15,
        autowidth: true,
        scrollRows: true,
        scroll: true,
        loadonce: true,
        viewrecords: true,
        multiselect: true,
        multiselectWidth: 43,
        multiboxonly: false,
        height: initialHeight,
        scrollTimeout: 1,
        shrinkToFit: false,
        forceFit: true,
        scrollOffset: 0,
        beforeSelectRow: function(rowid, e) {
          var rowData = grid.jqGrid('getRowData', rowid);
          // 빈 행은 선택 불가능
          if (rowData.isEmpty === 'true' || (!rowData.rownum && !rowData.routeName && !rowData.applicantId && !rowData.companyName)) {
            return false;
          }
          return true;
        },
        loadComplete: function(data) {
          // 그리드 높이 재계산 (레이아웃 완료 후)
          setTimeout(function() {
            var recalculatedHeight = calculateJqGridHeight({
              containerSelector: '#div_list',
              headerSelector: '.data-list-table-header',
              footerSelector: '.data-list-table-footer',
              padding: 56,
            });
            grid.jqGrid('setGridHeight', recalculatedHeight);
          }, 0);
          // 데이터가 없을 때 메시지 표시
          if (isEmptyData) {
            var emptyMsg = '<tr class="empty-message-row">' + '<td colspan="8">' + '<span>신청 내역이 없어요.</span>' + '  </td>' + '</tr>';
            grid.find('tbody tr').remove();
            grid.find('tbody').append(emptyMsg);
            return;
          }
          // 빈 행 처리
          var ids = grid.jqGrid('getDataIDs');
          for (var i = 0; i < ids.length; i++) {
            var rowData = grid.jqGrid('getRowData', ids[i]);
            if (rowData.isEmpty === 'true' || (!rowData.rownum && !rowData.applicantId && !rowData.companyName)) {
              // 빈 행의 체크박스 비활성화 및 숨김
              var checkbox = grid.find('tr#' + ids[i] + ' input[type="checkbox"]');
              checkbox.prop('disabled', true).hide();
              // 빈 행에 클래스 추가
              grid.find('tr#' + ids[i]).addClass('empty-row');
              // 빈 행의 모든 셀 내용 제거
              grid
                .find('tr#' + ids[i] + ' td')
                .not(':first')
                .html('');
            }

          setTimeout(function() {
            adjustBdivWidth(grid);
          }, 0);
        },
      });
    }

            formatter: function(cellvalue, options, rowObject) {

            align: 'center',

          if (rowData.isEmpty === 'true' || !rowData.rownum) {
            return false;
          }
          return true;
        },
        loadComplete: function(data) {
          // 그룹 헤더 설정
          grid.jqGrid('setGroupHeaders', {

            groupHeaders: [{
              startColumnName: 'totalReservations',

            }, ],
          });
          // 빈 행 처리
          var ids = grid.jqGrid('getDataIDs');
          for (var i = 0; i < ids.length; i++) {
            var rowData = grid.jqGrid('getRowData', ids[i]);
            if (rowData.isEmpty === 'true' || !rowData.rownum) {
              grid.find('tr#' + ids[i]).addClass('empty-row');
              grid
                .find('tr#' + ids[i] + ' td')

                .html('');
            }
          }
          // 스크롤 여부 확인 후 .ui-jqgrid-bdiv 너비 조정
          setTimeout(function() {
            adjustBdivWidth(grid);
          }, 0);
        },
