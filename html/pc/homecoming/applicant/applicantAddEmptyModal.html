  <script type="text/javascript">
    // jqGrid Local Data
    const _JQ_GRID_DATA = [];
    $(document).ready(function() {
      // jqGrid 높이 계산 및 리사이즈 설정
      setupJqGridResize();
      // 모달이 열릴 때 jqGrid 다시 그리기
      var modalEl = $('#modal-applicant-add');
      if (modalEl.length) {
        // MutationObserver로 모달의 display 속성 변경 감지
        var observer = new MutationObserver(function(mutations) {
          mutations.forEach(function(mutation) {
            if (mutation.type === 'attributes' && mutation.attributeName === 'style') {
              var display = modalEl.css('display');
              if (display === 'block') {
                // 모달이 열렸을 때 그리드 resizing
                setTimeout(function() {
                  resizeGrid();
                }, 100);
              }
            }
          });
        });
        observer.observe(modalEl[0], {
          attributes: true,
          attributeFilter: ['style']
        });
      }
      listLoad();
      // 초기 로드 후 그리드 너비 조정
      setTimeout(function() {
        resizeGrid();
      }, 100);
    });
    // 스크롤 여부 확인 후 .ui-jqgrid-bdiv 너비 조정
    function adjustBdivWidth(grid) {
      var $bdiv = grid.closest('.ui-jqgrid-bdiv');
      if ($bdiv.length && $bdiv[0]) {
        var hasScroll = $bdiv[0].scrollHeight > $bdiv[0].clientHeight;
        if (hasScroll) {
          $bdiv.css('width', 'calc(100% + 12px)');
        } else {
          $bdiv.css('width', '');
        }
      }
    }

    function resizeGrid() {
      const $wrap = $('#div_list');
      $('#list').jqGrid('setGridWidth', $wrap.width());
      adjustBdivWidth($('#list'));
    }

    function setPageDefault() {
      listLoad(false, 1);
    }

    function listLoad(firstNoLoad, page) {
      // jqGrid 리스트 초기화, 생성
      $('#list').jqGrid('GridUnload');
      var grid = jQuery('#list');
      // 데이터가 없거나 부족할 때 빈 행 추가
      var displayData = _JQ_GRID_DATA ? [..._JQ_GRID_DATA] : [];
      var isEmptyData = displayData.length === 0;
      var emptyRow = {
        rownum: '',
        name: '',
        birthDate: '',
        phoneNumber: '',
        category: '',
        amount: '',
        isEmpty: true,
      };
      while (displayData.length < 5) {
        displayData.push(Object.assign({}, emptyRow));
      }
      // 초기 높이 계산
      var initialHeight = calculateJqGridHeight ? calculateJqGridHeight() : 'auto';
      grid.jqGrid({
        datatype: 'local',
        data: displayData,
        colNames: ['순번', '이름', '생년월일', '휴대폰번호', '대/소구분', '금액'],
        colModel: [{
            name: 'rownum',
            index: 'rownum',
            width: 64,
            align: 'center',
            sortable: false,
            formatter: function(cellvalue, options, rowObject) {
              // isEmpty가 true인 경우 빈 값 반환
              if (rowObject.isEmpty === true || rowObject.isEmpty === 'true') {
                return '';
              }
              return cellvalue || '';
            },
          },
          {
            name: 'name',
            index: 'name',
            width: 137,
            align: 'left',
            sortable: false,
            formatter: function(cellvalue, options, rowObject) {
              // isEmpty가 true인 경우에만 빈 행으로 처리 (input 표시하지 않음)
              if (rowObject.isEmpty === true || rowObject.isEmpty === 'true') {
                return '';
              }
              var value = (cellvalue || '').toString().replace(/"/g, '&quot;').replace(/'/g, '&#39;');
              var placeholder = '이름 입력';
              return '<div class="input-wrap"><input type="text" class="input-xsmall grid-input" value="' + value + '" placeholder="' + placeholder + '"/></div>';
            },
          },
          {
            name: 'birthDate',
            index: 'birthDate',
            width: 137,
            align: 'center',
            sortable: false,
            formatter: function(cellvalue, options, rowObject) {
              // isEmpty가 true인 경우에만 빈 행으로 처리 (input 표시하지 않음)
              if (rowObject.isEmpty === true || rowObject.isEmpty === 'true') {
                return '';
              }
              var value = (cellvalue || '').toString().replace(/"/g, '&quot;').replace(/'/g, '&#39;');
              var placeholder = '6자리 입력';
              return '<div class="input-wrap"><input type="text" class="input-xsmall grid-input" value="' + value + '" placeholder="' + placeholder + '"/></div>';
            },
          },
          {
            name: 'phoneNumber',
            index: 'phoneNumber',
            width: 137,
            align: 'center',
            sortable: false,
            formatter: function(cellvalue, options, rowObject) {
              // isEmpty가 true인 경우에만 빈 행으로 처리 (input 표시하지 않음)
              if (rowObject.isEmpty === true || rowObject.isEmpty === 'true') {
                return '';
              }
              var value = (cellvalue || '').toString().replace(/"/g, '&quot;').replace(/'/g, '&#39;');
              var placeholder = '휴대전화번호 입력';
              return '<div class="input-wrap"><input type="text" class="input-xsmall grid-input" value="' + value + '" placeholder="' + placeholder + '"/></div>';
            },
          },
          {
            name: 'category',
            index: 'category',
            width: 137,
            align: 'center',
            sortable: false,
            formatter: function(cellvalue, options, rowObject) {
              // isEmpty가 true인 경우에만 빈 행으로 처리 (빈 값 반환)
              if (rowObject.isEmpty === true || rowObject.isEmpty === 'true') {
                return '';
              }
              return cellvalue || '';
            },
          },
          {
            name: 'amount',
            index: 'amount',
            width: 137,
            align: 'right',
            sortable: false,
            formatter: function(cellvalue, options, rowObject) {
              // isEmpty가 true인 경우에만 빈 행으로 처리 (빈 값 반환)
              if (rowObject.isEmpty === true || rowObject.isEmpty === 'true') {
                return '';
              }
              return cellvalue || '';
            },
          },
        ],
        sortable: false,
        rowNum: 5,
        autowidth: false,
        scrollRows: false,
        scroll: false,
        loadonce: true,
        viewrecords: true,
        multiboxonly: false,
        height: 'auto',
        scrollTimeout: 1,
        shrinkToFit: true,
        forceFit: false,
        scrollOffset: 0,
        width: null,
        multiselect: false,
        multiselectWidth: 43,
        multiboxonly: false,
        beforeSelectRow: function(rowid, e) {
          var rowData = grid.jqGrid('getRowData', rowid);
          // isEmpty가 true인 경우에만 빈 행으로 처리 (선택 불가능)
          if (rowData.isEmpty === true || rowData.isEmpty === 'true') {
            return false;
          }
          return true;
        },
        onSelectRow: function(rowid, status, e) {
          var rowData = grid.jqGrid('getRowData', rowid);
          if (rowData.isEmpty !== 'true' && rowData.isEmpty !== true && rowData.name) {
            // 선택된 행의 데이터로 하위 테이블 업데이트
            // 필요시 여기에 로직 추가
          }
        },
        loadComplete: function(data) {
          // 그리드 너비를 부모 컨테이너에 맞춤
          var $wrap = $('#div_list');
          if ($wrap.length && $wrap.width() > 0) {
            grid.jqGrid('setGridWidth', $wrap.width());
          }
          // 데이터가 없을 때 메시지 표시
          if (isEmptyData) {
            // 컬럼 수 계산 (multiselect 포함)
            var colCount = grid.jqGrid('getGridParam', 'colModel').length;
            // 메시지 행 하나의 높이를 5개 행 높이(190px)로 설정
            var emptyMsg =
              '<tr class="empty-message-row">' + '<td colspan="' + colCount + '" style="height: 190px; vertical-align: middle;">' + '<span>노선을 먼저 선택해 주세요</span>' + '</td>' + '</tr>';
            grid.find('tbody tr').remove();
            grid.find('tbody').append(emptyMsg);
            // 그리드 높이를 5개 행 높이로 고정
            var $bdiv = grid.closest('.ui-jqgrid-bdiv');
            if ($bdiv.length) {
              // 각 행 높이 38px * 5개 행 = 190px (헤더 제외)
              $bdiv.css('min-height', '190px');
            }
            return;
          }
          // 빈 행 처리
          var ids = grid.jqGrid('getDataIDs');
          for (var i = 0; i < ids.length; i++) {
            var rowData = grid.jqGrid('getRowData', ids[i]);
            if (rowData.isEmpty === 'true' || (!rowData.name && !rowData.birthDate && !rowData.phoneNumber)) {
              // 빈 행의 체크박스 비활성화 및 숨김
              var checkbox = grid.find('tr#' + ids[i] + ' input[type="checkbox"]');
              checkbox.prop('disabled', true).hide();
              // 빈 행에 클래스 추가
              grid.find('tr#' + ids[i]).addClass('empty-row');
              // 빈 행의 input 필드는 유지하되, 값이 없는 경우 placeholder만 표시되도록 함
              // (formatter에서 이미 처리되므로 추가 작업 불필요)
            }
          }
          // input 값 변경 시 그리드 데이터 업데이트
          grid.find('.grid-input').on('change blur', function() {
            var $input = $(this);
            var $cell = $input.closest('td[role="gridcell"]');
            var rowId = $cell.closest('tr').attr('id');
            var colName = '';
            // 컬럼 인덱스 찾기
            var colIndex = $cell.index();
            var colModel = grid.jqGrid('getGridParam', 'colModel');
            if (colModel && colModel[colIndex]) {
              colName = colModel[colIndex].name;
              if (colName && (colName === 'name' || colName === 'birthDate' || colName === 'phoneNumber')) {
                grid.jqGrid('setCell', rowId, colName, $input.val());
              }
            }
          });
          // 불필요한 wrapper div 제거
          var $bdiv = grid.closest('.ui-jqgrid-bdiv');
          if ($bdiv.length) {
            var $wrapper = $bdiv.find('> div[style*="position:relative"]');
            if ($wrapper.length) {
              var $emptyDiv = $wrapper.find('> div:empty');
              if ($emptyDiv.length) {
                $emptyDiv.remove();
              }
              // table을 직접 bdiv의 자식으로 이동
              var $table = $wrapper.find('table');
              if ($table.length) {
                $table.detach();
                $wrapper.replaceWith($table);
              }
            }
          }
          // 스크롤 여부 확인 후 .ui-jqgrid-bdiv 너비 조정
          setTimeout(function() {
            adjustBdivWidth(grid);
          }, 0);
          // 빈 행 처리
          var ids = grid.jqGrid('getDataIDs');
          for (var i = 0; i < ids.length; i++) {
            var rowData = grid.jqGrid('getRowData', ids[i]);
            // isEmpty가 true인 경우에만 빈 행으로 판단
            var isEmpty = rowData.isEmpty === true || rowData.isEmpty === 'true';
            if (isEmpty) {
              // 빈 행의 체크박스 비활성화 및 숨김
              var checkbox = grid.find('tr#' + ids[i] + ' input[type="checkbox"]');
              checkbox.prop('disabled', true).hide();
              // 빈 행에 클래스 추가
              grid.find('tr#' + ids[i]).addClass('empty-row');
              // 빈 행의 순번 셀도 빈 값으로 표시
              var rownumCell = grid.find('tr#' + ids[i] + ' td[aria-describedby="list_rownum"]');
              if (rownumCell.length) {
                rownumCell.html('');
              }
            }
          }
        },
      });
    }
  </script>
</head>
