      if (typeof setupJqGridResize === 'function') {
        setupJqGridResize();
      }
      // 모달이 열릴 때 jqGrid 다시 그리기
      var modalEl = $('#modal-search-route');
      if (modalEl.length) {
        // MutationObserver로 모달의 display 속성 변경 감지
        var observer = new MutationObserver(function(mutations) {
          mutations.forEach(function(mutation) {
            if (mutation.type === 'attributes' && mutation.attributeName === 'style') {
              var display = modalEl.css('display');
              if (display === 'block') {
                // 모달이 열렸을 때 그리드 resizing
                setTimeout(function() {
                  resizeGrid();
                }, 0);
              }
            }
          });
        });
        observer.observe(modalEl[0], {
          attributes: true,
          attributeFilter: ['style']
        });
      }
      initRouteListGrid();
      // $(window).on('resize', resizeGrid);
    });
    // 스크롤 여부 확인 후 .ui-jqgrid-bdiv 너비 조정
    function adjustBdivWidth(grid) {
      var $bdiv = grid.closest('.ui-jqgrid-bdiv');
      if ($bdiv.length && $bdiv[0]) {
        var hasScroll = $bdiv[0].scrollHeight > $bdiv[0].clientHeight;
        if (hasScroll) {
          $bdiv.css('width', 'calc(100% + 12px)');
        } else {
          $bdiv.css('width', '');
        }
      }
    }

    function resizeGrid() {
      const $wrap1 = $('#div_list1');
      $('#list1').jqGrid('setGridWidth', $wrap1.width());
      adjustBdivWidth($('#list1'));
    }

    function initRouteListGrid() {
      // jqGrid 리스트 초기화, 생성
      const $wrap = $('#div_list1');
      var grid = jQuery('#list1');
      if (grid.length === 0) return;
      if (grid.jqGrid) {
        try {
          grid.jqGrid('GridUnload');
        } catch (e) {
          // 그리드가 이미 언로드되었거나 존재하지 않는 경우 무시
        }
      }
      // 데이터 준비
      var displayData = _JQ_GRID_DATA_ROUTE_LIST ? [..._JQ_GRID_DATA_ROUTE_LIST] : [];
      grid.jqGrid({
        datatype: 'local',
        data: displayData,
        colNames: ['순번', '구분', '노선명', '출발지', '도착지', '차량구분'],

            index: 'vehicleType',
            width: 90,

            sortable: false
          },

        rowNum: 15,
        autowidth: true,
        scrollRows: false,
        scroll: true,
        loadonce: true,
        viewrecords: true,
        pager: false,
        // width: $wrap.width(),
        height: 340,
        scrollTimeout: 1,
        shrinkToFit: true,
        forceFit: true,
        scrollOffset: 0,
        onSelectRow: function(rowid, status, e) {
          var rowData = grid.jqGrid('getRowData', rowid);
          if (rowData.isEmpty !== 'true' && (rowData.sequence || rowData.routeName)) {
            // 선택된 행의 데이터로 하위 테이블 업데이트
            // 필요시 여기에 로직 추가
          }
        },
        loadComplete: function(data) {
          // 불필요한 wrapper div 제거
          var $bdiv = grid.closest('.ui-jqgrid-bdiv');
          if ($bdiv.length) {
            var $wrapper = $bdiv.find('> div[style*="position:relative"]');
            if ($wrapper.length) {
              var $emptyDiv = $wrapper.find('> div:empty');
              if ($emptyDiv.length) {
                $emptyDiv.remove();
              }
              // table을 직접 bdiv의 자식으로 이동
              var $table = $wrapper.find('table');
              if ($table.length) {
                $table.detach();
                $wrapper.replaceWith($table);
              }
            }
          }
          // 스크롤 여부 확인 후 .ui-jqgrid-bdiv 너비 조정
          setTimeout(function() {
            adjustBdivWidth(grid);
          }, 0);
          // 빈 행 처리
          var ids = grid.jqGrid('getDataIDs');
          for (var i = 0; i < ids.length; i++) {
            var rowData = grid.jqGrid('getRowData', ids[i]);
            if (rowData.isEmpty === 'true' || (!rowData.sequence && !rowData.routeName)) {
              // 빈 행에 클래스 추가
              grid.find('tr#' + ids[i]).addClass('empty-row');
              // 빈 행의 모든 셀 내용 제거
              grid.find('tr#' + ids[i] + ' td').html('');

          }
        },
