      // in case we have more than one table on the page.
      var trHead = $('thead:first tr', grid.hdiv);
      var colModel = grid.getGridParam('colModel');
      for (var iCol = 0; iCol < colModel.length; iCol++) {
        var columnInfo = colModel[iCol];
        if (columnInfo.classes) {
          var headDiv = jQuery('th:eq(' + iCol + ')', trHead);
          headDiv.addClass(columnInfo.classes);
        }
      }
    }

        $('#epDeptnameForm').hide();

        $('#nomaskYnForm').html(userInfo.nomaskYn);
        if (userInfo.offNomaskYn == 'Y') {
          $("span[name='nomaskYnSpan']").parent('th').attr('style', 'background-color:#f6f6f6');
          $("span[name='nomaskYnSpan']").attr('style', 'visibility:');
          $("span[name='nomaskYnForm']").attr('style', 'visibility:');
        } else {
          $("span[name='nomaskYnSpan']").parent('th').attr('style', 'background-color:#FFFFFF');
          $("span[name='nomaskYnSpan']").attr('style', 'visibility:hidden');
          $("span[name='nomaskYnForm']").attr('style', 'visibility:hidden');
        }
        // 차량그룹표시
        var groupList = data.groupList;
        var str_groupList = '';
        for (var i = 0; i < groupList.length; i++) {
          var grpName = groupList[i].grpName;
          var grpLevel = groupList[i].grpLevel;
          var useYn = groupList[i].useYn;
          if (grpLevel == 1) {
            if ('1' == '2') {
              str_groupList += '|' + grpName + ' > ';
            } else {
              if (useYn == 'Y') {
                str_groupList += '|' + grpName + ' > ';
              }
            }
          } else {
            if (useYn == 'Y') {
              str_groupList += grpName + ', ';
            }
          }
        }
        var itm_groupList = '';
        var arr_groupList = str_groupList.split('|');
        if ('1' == '2') {
          for (var i = 0; i < arr_groupList.length; i++) {
            var row_grouList = arr_groupList[i];
            if (row_grouList.indexOf('>') > -1) {
              if (row_grouList.indexOf('>') + 2 < row_grouList.length) {
                if (row_grouList.substr(row_grouList.length - 2) == ', ') {
                  itm_groupList += row_grouList.substr(0, row_grouList.length - 2) + '<br/>';
                } else {
                  itm_groupList += row_grouList + '<br/>';
                }
              }
            }
          }
        } else {
          for (var i = 0; i < arr_groupList.length; i++) {
            var row_grouList = arr_groupList[i].replace('|', '').trim();
            if (row_grouList != '') {
              itm_groupList += row_grouList + '<br/>';
            }
          }
        }
        if (itm_groupList == '') {
          $('#groupList').hide();
        } else {
          $('#groupList').show();
        }
        $('#groupList').html(itm_groupList);
      }
    }

    function setPaging(page, pTotCnt) {
      var rows = $('#rows').val();
      pTotCnt = pTotCnt == undefined ? gTotCnt : pTotCnt;
      var totPageCnt = Math.ceil(pTotCnt / rows);
      $('.paging').paging({
        prevClass: 'btn-prev',
        nextClass: 'btn-next',
        firstClass: 'btn-first',
        lastClass: 'btn-last',
        length: 10,
        max: totPageCnt, // 전체 페이지
        current: page, // 현재 페이지
        onclick: function(e, pPage) {
          // 링크 클릭 이벤트 핸들러
          listLoad(true, pPage);
        },
      });
    }

    function setRows() {
