  <title>정류장 관리</title>
  <script type="text/javascript">
    // jqGrid Local Data
    const _JQ_GRID_DATA = [];
    $(document).ready(function() {
      setPageDefault();
      setupJqGridResize();
    });

    function setPageDefault() {
      listLoad(false, 1);
    }

    function listLoad(firstNoLoad, page) {
      $('#list').jqGrid('GridUnload');
      var grid = jQuery('#list');
      var displayData = _JQ_GRID_DATA || [];
      var isEmptyData = displayData.length === 0;
      var emptyRow = {
        rownum: '',
        stationName: '',
        category: '',
        region: '',
        operationStatus: '',
        isEmpty: true,
      };
      while (displayData.length < 15) {
        displayData.push(Object.assign({}, emptyRow));
      }
      var initialHeight = calculateJqGridHeight();
      grid.jqGrid({
        datatype: 'local',
        data: displayData,
        colNames: ['순번', '정류장명', '구분', '권역', '운영상태'],
        colModel: [{
            name: 'rownum',
            index: 'rownum',
            width: 64,
            align: 'center',
            sortable: false
          },
          {
            name: 'stationName',
            index: 'stationName',
            width: 221,
            align: 'left',
            sortable: false
          },
          {
            name: 'category',
            index: 'category',
            width: 72,
            align: 'center',
            sortable: false
          },
          {
            name: 'region',
            index: 'region',
            width: 96,
            align: 'center',
            sortable: false
          },
          {
            name: 'operationStatus',
            index: 'operationStatus',
            width: 80,
            align: 'center',
            sortable: false
          },
        ],
        sortable: false,
        rowNum: 15,
        autowidth: false,
        scrollRows: true,
        scroll: true,
        loadonce: true,
        viewrecords: true,
        multiselect: true,
        multiselectWidth: 43,
        multiboxonly: false,
        height: initialHeight,
        scrollTimeout: 1,
        shrinkToFit: true,
        forceFit: true,
        scrollOffset: 0,
        beforeSelectRow: function(rowid, e) {
          var rowData = grid.jqGrid('getRowData', rowid);
          if (rowData.isEmpty === 'true') {
            return false;
          }
          return true;
        },
        loadComplete: function(data) {
          // 데이터가 없을 때 메시지 표시
          if (isEmptyData) {
            var emptyMsg = '<tr class="empty-message-row">' + '  <td colspan="6">' + '    <span>등록된 노선이 없어요.</span>' + '  </td>' + '</tr>';
            grid.find('tbody tr').remove();
            grid.find('tbody').append(emptyMsg);
            return;
          }
          var ids = grid.jqGrid('getDataIDs');
          for (var i = 0; i < ids.length; i++) {
            var rowData = grid.jqGrid('getRowData', ids[i]);
            if (rowData.isEmpty === 'true') {
              var checkbox = grid.find('tr#' + ids[i] + ' input[type="checkbox"]');
              checkbox.prop('disabled', true).hide();
              grid.find('tr#' + ids[i]).addClass('empty-row');
              grid
                .find('tr#' + ids[i] + ' td')
                .not(':first')
                .html('');
            }
          }
        },
      });
    }
  </script>
