  <script type="text/javascript">
    // jqGrid Local Data - 리스트 설정 : 숨김 항목
    const _JQ_GRID_DATA_HIDDEN_ITEM = [];
    // jqGrid Local Data - 리스트 설정 : 표출 항목
    const _JQ_GRID_DATA_DISPLAY_ITEM = [{
        seq: '필수',
        listName: '운행일자, 출발 외 8개 항목',
      },
      {
        seq: '11',
        listName: '차량번호',
      },
      {
        seq: '12',
        listName: '담당운수사',
      },
      {
        seq: '13',
        listName: '운행운수사',
      },
      {
        seq: '14',
        listName: '청구금액',
      },
      {
        seq: '15',
        listName: '최종등록자',
      },
      {
        seq: '16',
        listName: '최종 등록 일시',
      },
      {
        seq: '17',
        listName: '운행현황',
      },
      {
        seq: '18',
        listName: '푸시알림',
      },
    ];
    $(document).ready(function() {
      // jqGrid 높이 계산 및 리사이즈 설정
      if (typeof setupJqGridResize === 'function') {
        setupJqGridResize();
      }
      // 모달이 열릴 때 jqGrid 다시 그리기
      var modalEl = $('#modal-list-setting');
      if (modalEl.length) {
        // MutationObserver로 모달의 display 속성 변경 감지
        var observer = new MutationObserver(function(mutations) {
          mutations.forEach(function(mutation) {
            if (mutation.type === 'attributes' && mutation.attributeName === 'style') {
              var display = modalEl.css('display');
              if (display === 'block') {
                // 모달이 열렸을 때 그리드 resizing
                setTimeout(function() {
                  resizeGrid();
                }, 0);
              }
            }
          });
        });
        observer.observe(modalEl[0], {
          attributes: true,
          attributeFilter: ['style']
        });
      }
      initRouteStopGrid();
      initSelectedStopGrid();
      // $(window).on('resize', resizeGrid);
    });
    // 스크롤 여부 확인 후 .ui-jqgrid-bdiv 너비 조정
    function adjustBdivWidth(grid) {
      var $bdiv = grid.closest('.ui-jqgrid-bdiv');
      if ($bdiv.length && $bdiv[0]) {
        var hasScroll = $bdiv[0].scrollHeight > $bdiv[0].clientHeight;
        if (hasScroll) {
          $bdiv.css('width', 'calc(100% + 12px)');
        } else {
          $bdiv.css('width', '');
        }
      }
    }

    function resizeGrid() {
      const $wrap2 = $('#div_list2');
      $('#list2').jqGrid('setGridWidth', $wrap2.width());
      adjustBdivWidth($('#list2'));
      const $wrap3 = $('#div_list3');
      $('#list3').jqGrid('setGridWidth', $wrap3.width());
      adjustBdivWidth($('#list3'));
    }

    function initRouteStopGrid() {
      // jqGrid 리스트 초기화, 생성
      const $wrap = $('#div_list2');
      var grid = jQuery('#list2');
      if (grid.length === 0) return;
      if (grid.jqGrid) {
        try {
          grid.jqGrid('GridUnload');
        } catch (e) {
          // 그리드가 이미 언로드되었거나 존재하지 않는 경우 무시
        }
      }
      // 데이터 준비
      var displayData = _JQ_GRID_DATA_HIDDEN_ITEM ? [..._JQ_GRID_DATA_HIDDEN_ITEM] : [];
      var isEmptyData = displayData.length === 0;
      var emptyRow = {
        listName: '',
        isEmpty: true,
      };
      while (displayData.length < 11) {
        // 보여질 행의 갯수 11
        displayData.push(Object.assign({}, emptyRow));
      }
      grid.jqGrid({
        datatype: 'local',
        data: displayData,
        colNames: ['항목명'],
        colModel: [{
          name: 'listName',
          index: 'listName',
          width: 264,
          align: 'center',
          sortable: false
        }],
        sortable: false,
        rowNum: 10000, // 모든 행 표시
        autowidth: true,
        scrollRows: false,
        scroll: true,
        loadonce: true,
        viewrecords: true,
        height: 374,
        scrollTimeout: 1,
        shrinkToFit: true,
        forceFit: true,
        scrollOffset: 0,
        multiselect: true,
        multiselectWidth: 43,
        multiboxonly: false,
        beforeSelectRow: function(rowid, e) {
          var rowData = grid.jqGrid('getRowData', rowid);
          // 빈 행은 선택 불가능
          if (rowData.isEmpty === 'true' || (!rowData.listName)) {
            return false;
          }
          return true;
        },
        onSelectRow: function(rowid, status, e) {
          var rowData = grid.jqGrid('getRowData', rowid);
          if (rowData.isEmpty !== 'true' && rowData.listName) {
            // 선택된 행의 데이터로 하위 테이블 업데이트
            // 필요시 여기에 로직 추가
          }
        },
        loadComplete: function(data) {
          // 데이터가 없을 때 메시지 표시
          if (isEmptyData) {
            // 컬럼 수 계산 (multiselect 포함)
            var colCount = grid.jqGrid('getGridParam', 'colModel').length;
            // 메시지 행 하나의 높이를 5개 행 높이(190px)로 설정
            var emptyMsg = '<tr class="empty-message-row">' + '<td colspan="' + colCount + '" style="height: 374px; vertical-align: middle;">' + '<span>숨김처리된 항목이 없어요.</span>' + '</td>' + '</tr>';
            grid.find('tbody tr').remove();
            grid.find('tbody').append(emptyMsg);
            // 그리드 높이를 5개 행 높이로 고정
            var $bdiv = grid.closest('.ui-jqgrid-bdiv');
            if ($bdiv.length) {
              // 각 행 높이 34px * 11개 행 = 374px (헤더 제외)
              $bdiv.css('min-height', '374px');
            }
            return;
          }
          // 불필요한 wrapper div 제거
          var $bdiv = grid.closest('.ui-jqgrid-bdiv');
          if ($bdiv.length) {
            var $wrapper = $bdiv.find('> div[style*="position:relative"]');
            if ($wrapper.length) {
              var $emptyDiv = $wrapper.find('> div:empty');
              if ($emptyDiv.length) {
                $emptyDiv.remove();
              }
              // table을 직접 bdiv의 자식으로 이동
              var $table = $wrapper.find('table');
              if ($table.length) {
                $table.detach();
                $wrapper.replaceWith($table);
              }
            }
          }
          // 스크롤 여부 확인 후 .ui-jqgrid-bdiv 너비 조정
          setTimeout(function() {
            adjustBdivWidth(grid);
          }, 0);
          // 빈 행 처리
          var ids = grid.jqGrid('getDataIDs');
          for (var i = 0; i < ids.length; i++) {
            var rowData = grid.jqGrid('getRowData', ids[i]);
            if (rowData.isEmpty === 'true' || (!rowData.listName)) {
              // 빈 행의 체크박스 비활성화 및 숨김
              var checkbox = grid.find('tr#' + ids[i] + ' input[type="checkbox"]');
              checkbox.prop('disabled', true).hide();
              // 빈 행에 클래스 추가
              grid.find('tr#' + ids[i]).addClass('empty-row');
              // 빈 행의 모든 셀 내용 제거 (첫 번째 셀인 체크박스는 제외)
              grid
                .find('tr#' + ids[i] + ' td')
                .not(':first')
                .html('');
            }
          }
        },
      });
    }

    function initSelectedStopGrid() {

        beforeSelectRow: function(rowid, e) {
          var rowData = grid.jqGrid('getRowData', rowid);
          // 빈 행은 선택 불가능
          if (rowData.isEmpty === 'true' || (!rowData.listName && !rowData.seq)) {
            return false;
          }
          // seq가 '필수'인 행은 선택 불가능 (체크박스 비활성화 대상)
          if (rowData.seq === '필수') {
            return false;
          }
          return true;
        },
        onSelectRow: function(rowid, status, e) {
          var rowData = grid.jqGrid('getRowData', rowid);
          if (rowData.isEmpty !== 'true' && rowData.listName) {
            // 선택된 행의 데이터로 하위 테이블 업데이트
            // 필요시 여기에 로직 추가
          }
        },
        loadComplete: function(data) {
          // 불필요한 wrapper div 제거
          var $bdiv = grid.closest('.ui-jqgrid-bdiv');
          if ($bdiv.length) {
            var $wrapper = $bdiv.find('> div[style*="position:relative"]');
            if ($wrapper.length) {
              var $emptyDiv = $wrapper.find('> div:empty');
              if ($emptyDiv.length) {
                $emptyDiv.remove();
              }
              // table을 직접 bdiv의 자식으로 이동
              var $table = $wrapper.find('table');
              if ($table.length) {
                $table.detach();
                $wrapper.replaceWith($table);
              }
            }
          }
          // 스크롤 여부 확인 후 .ui-jqgrid-bdiv 너비 조정
          setTimeout(function() {
            adjustBdivWidth(grid);
          }, 0);
          // 빈 행 처리 및 seq '필수' 행 체크박스 비활성화
          var ids = grid.jqGrid('getDataIDs');
          for (var i = 0; i < ids.length; i++) {
            var rowData = grid.jqGrid('getRowData', ids[i]);
            if (rowData.isEmpty === 'true' || (!rowData.listName && !rowData.seq)) {
              // 빈 행의 체크박스 비활성화 및 숨김
              var checkbox = grid.find('tr#' + ids[i] + ' input[type="checkbox"]');
              checkbox.prop('disabled', true).hide();
              // 빈 행에 클래스 추가
              grid.find('tr#' + ids[i]).addClass('empty-row');
              // 빈 행의 모든 셀 내용 제거 (첫 번째 셀인 체크박스는 제외)
              grid
                .find('tr#' + ids[i] + ' td')
                .not(':first')
                .html('');
            } else if (rowData.seq === '필수') {
              // seq가 '필수'인 행은 체크박스만 비활성화 (표시는 유지)
              var checkbox = grid.find('tr#' + ids[i] + ' input[type="checkbox"]');
              checkbox.prop('disabled', true);
            }
          }
        },
      });
    }
  </script>
</head>
