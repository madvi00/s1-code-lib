  <script type="text/javascript">
    // jqGrid Local Data - 운행 내역 리스트
    const _JQ_GRID_DATA_OPERATION_LIST = [{
        operationDate: '25.01.03',
        operationTime: '05:00',
        routeName: '건대_H2',
        vehicleNumber: '경기 72아 2727',

        operationTime: '05:10',
        routeName: '양재/강남/신사_K1(금요일)',
        vehicleNumber: '경기 70바 2739',
        transportCompany: '가자관광',
      },
      {
        operationDate: '25.01.03',
        operationTime: '05:30',
        routeName: '죽전/분당 A_H1',
        vehicleNumber: '경기 03가 2746',
        transportCompany: '가자관광',
      },
      {
        operationDate: '25.01.03',
        operationTime: '05:35',
        routeName: '본관_H1',
        vehicleNumber: '경기 33바 2758',
        transportCompany: '가자관광',
      },
      {
        operationDate: '25.01.03',
        operationTime: '06:05',
        routeName: '화성캠퍼스 H1',
        vehicleNumber: '경기 76아 2779',
        transportCompany: '가자관광',
      },
    ];
    $(document).ready(function() {
      if (typeof setupJqGridResize === 'function') {
        setupJqGridResize();
      }
      var modalEl = $('#modal-arrange-search-previous');
      if (modalEl.length) {
        var observer = new MutationObserver(function(mutations) {
          mutations.forEach(function(mutation) {
            if (mutation.type === 'attributes' && mutation.attributeName === 'style') {
              var display = modalEl.css('display');
              if (display === 'block') {
                setTimeout(function() {
                  resizeGrid();
                }, 0);
              }
            }
          });
        });
        observer.observe(modalEl[0], {
          attributes: true,
          attributeFilter: ['style']
        });
      }
      initOperationListGrid();
    });

    function adjustBdivWidth(grid) {
      var $bdiv = grid.closest('.ui-jqgrid-bdiv');
      if ($bdiv.length && $bdiv[0]) {
        var hasScroll = $bdiv[0].scrollHeight > $bdiv[0].clientHeight;
        if (hasScroll) {
          $bdiv.css('width', 'calc(100% + 12px)');
        } else {
          $bdiv.css('width', '');
        }
      }
    }

    function resizeGrid() {
      const $wrap1 = $('#div_operation_list');
      $('#operation_list').jqGrid('setGridWidth', $wrap1.width());
      adjustBdivWidth($('#operation_list'));
    }

    function initOperationListGrid() {
      const $wrap = $('#div_operation_list');
      var grid = jQuery('#operation_list');
      if (grid.length === 0) return;
      if (grid.jqGrid) {
        try {
          grid.jqGrid('GridUnload');
        } catch (e) {}
      }
      var displayData = _JQ_GRID_DATA_OPERATION_LIST ? [..._JQ_GRID_DATA_OPERATION_LIST] : [];
      grid.jqGrid({
        datatype: 'local',
        data: displayData,
        colNames: ['운행일자', '운행시간', '노선명', '차량번호', '운행운수사'],
        colModel: [{
            name: 'operationDate',
            index: 'operationDate',
            width: 90,
            align: 'center',
            sortable: false
          },
          {
            name: 'operationTime',
            index: 'operationTime',
            width: 80,
            align: 'center',
            sortable: false
          },
          {
            name: 'routeName',
            index: 'routeName',
            width: 200,
            align: 'left',
            sortable: false
          },
          {
            name: 'vehicleNumber',
            index: 'vehicleNumber',
            width: 120,
            align: 'center',
            sortable: false
          },
          {
            name: 'transportCompany',
            index: 'transportCompany',
            width: 100,
            align: 'center',
            sortable: false
          },
        ],
        sortable: false,
        rowNum: 5,
        autowidth: true,
        scrollRows: true,
        scroll: true,
        loadonce: true,
        viewrecords: true,
        pager: false,
        height: 170,
        scrollTimeout: 1,
        shrinkToFit: true,
        forceFit: true,
        scrollOffset: 0,
        onSelectRow: function(rowid, status, e) {
          var rowData = grid.jqGrid('getRowData', rowid);
          // 선택된 행으로 이전배차 적용 시 사용
        },
        loadComplete: function(data) {
          var $bdiv = grid.closest('.ui-jqgrid-bdiv');
          if ($bdiv.length) {
            var $wrapper = $bdiv.find('> div[style*="position:relative"]');
            if ($wrapper.length) {
              var $emptyDiv = $wrapper.find('> div:empty');
              if ($emptyDiv.length) {
                $emptyDiv.remove();
              }
              var $table = $wrapper.find('table');
              if ($table.length) {
                $table.detach();
                $wrapper.replaceWith($table);
              }
            }
          }
          setTimeout(function() {
            adjustBdivWidth(grid);
          }, 0);
          // 빈 행 처리
          var ids = grid.jqGrid('getDataIDs');
          for (var i = 0; i < ids.length; i++) {
            var rowData = grid.jqGrid('getRowData', ids[i]);
            if (rowData.isEmpty === 'true' || (!rowData.sequence && !rowData.routeName)) {
              // 빈 행에 클래스 추가
              grid.find('tr#' + ids[i]).addClass('empty-row');
              // 빈 행의 모든 셀 내용 제거
              grid.find('tr#' + ids[i] + ' td').html('');
            }
          }
        },
      });
    }

    function searchFormInit() {
      $('#arrangeSearchDate').val('');
      if (typeof $.fn.datepicker !== 'undefined') {
        var $dp = $('#arrangeSearchDate');
        if ($dp.data('datepicker')) {
          $dp.datepicker('setDate', null);
        }
      }
    }

    function searchOperationList() {
      // 검색 버튼 클릭 시 운행 내역 조회
      initOperationListGrid();
    }

    function applyPreviousArrange() {
      var grid = jQuery('#operation_list');
      var rowid = grid.jqGrid('getGridParam', 'selrow');
      if (!rowid) {
        alert('운행 내역을 선택해주세요.');
        return;
      }
      var rowData = grid.jqGrid('getRowData', rowid);
      // 이전배차 적용 로직 (부모 페이지 연동 등)
      console.log('이전배차 적용:', rowData);
    }
  </script>
