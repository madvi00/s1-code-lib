  <title>차량운행관리 시스템 - 지역코드관리</title>
  <script type="text/javascript">
    // jqGride Local Data
    const _JQ_GRID_DATA = [{
        rownum: 6,
        epDeptname: '삼성디스플레이',
        maskingName: 'A-1',
        rmk: '동탄',
      },
      {
        rownum: 5,
        epDeptname: '삼성디스플레이',
        maskingName: 'A-2',
        rmk: '영동/마포',
      },
      {
        rownum: 4,
        epDeptname: '삼성디스플레이',
        maskingName: 'A-3',
        rmk: '병점/화성/오산',
      },
      {
        rownum: 3,
        epDeptname: '삼성디스플레이',
        maskingName: 'B-1',
        rmk: '수원',
      },
      {
        rownum: 2,
        epDeptname: '삼성디스플레이',
        maskingName: 'B-2',
        rmk: '용일',
      },
      {
        rownum: 1,
        epDeptname: '삼성디스플레이',
        maskingName: 'C',
        rmk: '기타/경기',
      },
    ];
    // NOTE: 기존과 열 구조가 다름에 따라, colNames/colModel도 아래에서 맞춰줍니다.
    // 이하 기존 스크립트 유지, listLoad에서 컬럼명/모델만 맞춤
    $(document).ready(function() {
      setPageDefault();
      // jqGrid 높이 계산 및 리사이즈 설정
      setupJqGridResize();
      // 필요시 나머지 이벤트 핸들러 추가 (생략)
    });

    function setPageDefault() {
      listLoad(false, 1);
    }

    function listLoad(firstNoLoad, page) {
      // jqGrid 리스트 초기화, 생성
      $('#list').jqGrid('GridUnload');
      var grid = jQuery('#list');
      // 데이터가 없거나 부족할 때 빈 행 추가
      var displayData = _JQ_GRID_DATA || [];
      var emptyRow = {
        rownum: '',
        epDeptname: '',
        maskingName: '',
        rmk: '',
        isEmpty: true
      };
      while (displayData.length < 15) {
        displayData.push(Object.assign({}, emptyRow));
      }
      // 초기 높이 계산
      var initialHeight = calculateJqGridHeight();
      grid.jqGrid({
        datatype: 'local',
        data: displayData,
        colNames: ['순번', '업체명', '지역코드', '지역코드명'],
        colModel: [{
            name: 'rownum',
            index: 'rownum',
            width: 64,
            align: 'center',
            sortable: true
          },
          {
            name: 'epDeptname',
            index: 'epDeptname',
            width: 171,
            align: 'center',
            sortable: true
          },
          {
            name: 'maskingName',
            index: 'maskingName',
            width: 171,
            align: 'center',
            sortable: true
          },
          {
            name: 'rmk',
            index: 'rmk',
            width: 171,
            align: 'center',
            sortable: false
          },
        ],
        sortable: false,
        rowNum: 15,
        autowidth: true,
        scrollRows: true,
        scroll: true,
        loadonce: true,
        viewrecords: true,
        multiselect: true,
        multiselectWidth: 55,
        multiboxonly: false,
        height: initialHeight,
        scrollTimeout: 1,
        shrinkToFit: true,
        forceFit: true,
        scrollOffset: 0,
        beforeSelectRow: function(rowid, e) {
          var rowData = grid.jqGrid('getRowData', rowid);
          // 빈 행은 선택 불가능
          if (rowData.isEmpty === 'true' || (!rowData.epDeptname && !rowData.maskingName && !rowData.rmk)) {
            return false;
          }
          return true;
        },
        loadComplete: function(data) {
          // 빈 행 처리
          var ids = grid.jqGrid('getDataIDs');
          for (var i = 0; i < ids.length; i++) {
            var rowData = grid.jqGrid('getRowData', ids[i]);
            if (rowData.isEmpty === 'true' || (!rowData.epDeptname && !rowData.maskingName && !rowData.rmk)) {
              // 빈 행의 체크박스 비활성화 및 숨김
              var checkbox = grid.find('tr#' + ids[i] + ' input[type="checkbox"]');
              checkbox.prop('disabled', true).hide();
              // 빈 행에 클래스 추가
              grid.find('tr#' + ids[i]).addClass('empty-row');
              // 빈 행의 모든 셀 내용 제거
              grid
                .find('tr#' + ids[i] + ' td')
                .not(':first')
                .html('');
            }
          }
        },
      });
    }
  </script>
