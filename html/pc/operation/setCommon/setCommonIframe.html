            align: 'center',
            sortable: false,
            fixed: true,
            labelClasses: 'no-sort'
          },
          {
            name: 'nCodename',
            index: 'nCodename',
            width: 'auto',
            align: 'center',
            sortable: false,
            classes: 'link',
            labelClasses: 'no-sort'
          },
          {
            name: 'iUseYn',
            index: 'iUseYn',
            width: 103,
            align: 'center',
            sortable: true,
            fixed: true,
            labelClasses: 'is-sortable',
            sorttype: function(cellvalue, rowObject) {
              // 빈 행은 항상 맨 아래로 정렬되도록 큰 값 반환
              if (rowObject.isEmpty === true || (!rowObject.iRootname && !rowObject.nCodename && !rowObject.iUseYn)) {
                return '\uFFFF'; // 유니코드 최대값으로 빈 행을 항상 맨 아래로
              }
              return cellvalue || '';
            },
          },
        ],
        sortable: true,
        viewsortcols: [false, false, true],
        rowNum: 15,
        autowidth: true,
        scrollRows: true,
        scroll: true,
        loadonce: true,
        viewrecords: true,
        multiselect: true,
        multiselectWidth: 43,
        multiboxonly: false,
        height: initialHeight,
        scrollTimeout: 1,
        shrinkToFit: true,
        forceFit: true,
        scrollOffset: 0,
        beforeSelectRow: function(rowid, e) {
          var rowData = grid.jqGrid('getRowData', rowid);
          // 빈 행은 선택 불가능
          if (rowData.isEmpty === 'true' || (!rowData.iRootname && !rowData.nCodename && !rowData.iUseYn)) {
            return false;
          }
          return true;
        },
        loadComplete: function(data) {
          // 헤더에 클래스 추가 (colModel의 labelClasses 동적 적용)
          setTimeout(function() {
            var $headerRow = $('#gview_subCodeList').closest('.ui-jqgrid-view').find('thead tr.ui-jqgrid-labels');
            if ($headerRow.length > 0) {
              var $headerCells = $headerRow.find('th');
              var colModel = grid.jqGrid('getGridParam', 'colModel');
              var gridId = 'gview_subCodeList';
              $headerCells.each(function() {
                var $th = $(this);
                var thId = $th.attr('id');
                // multiselect 체크박스 컬럼은 건너뛰기
                if ($th.hasClass('cbox') || $th.find('input[type="checkbox"]').length > 0 || !thId) {
                  return true;
                }
                // 헤더 셀의 id에서 컬럼 이름 추출 (예: gview_subCodeList_iRootname -> iRootname)
                var columnName = thId.replace(gridId + '_', '');
                // colModel에서 해당 name을 가진 컬럼 찾기
                if (colModel) {
                  for (var i = 0; i < colModel.length; i++) {
                    if (colModel[i].name === columnName && colModel[i].labelClasses) {
                      var labelClasses = colModel[i].labelClasses;
                      // 기존 클래스 제거 후 새 클래스 추가 (동적 업데이트를 위해)
                      $th.removeClass('no-sort is-sortable');
                      if (labelClasses) {
                        $th.addClass(labelClasses);
                      }
                      break;
                    }
                  }
                }
              });
            }
          }, 0);
          // 빈 행 처리
          var ids = grid.jqGrid('getDataIDs');
          for (var i = 0; i < ids.length; i++) {
            var rowData = grid.jqGrid('getRowData', ids[i]);
            if (rowData.isEmpty === 'true' || (!rowData.iRootname && !rowData.nCodename && !rowData.iUseYn)) {
              // 빈 행의 체크박스 비활성화 및 숨김
              var checkbox = grid.find('tr#' + ids[i] + ' input[type="checkbox"]');
              checkbox.prop('disabled', true).hide();
              // 빈 행에 클래스 추가
              grid.find('tr#' + ids[i]).addClass('empty-row');
              // 빈 행의 모든 셀 내용 제거
              grid
                .find('tr#' + ids[i] + ' td')
                .not(':first')
                .html('');
            }
          }
          // 스크롤 여부 확인 후 .ui-jqgrid-bdiv 너비 조정
          setTimeout(function() {
            adjustBdivWidth(grid);
          }, 0);
        },
        gridComplete: function() {
          // 헤더에 클래스 추가 (gridComplete에서도 실행, colModel의 labelClasses 동적 적용)
          var $headerRow = $('#gview_subCodeList').closest('.ui-jqgrid-view').find('thead tr.ui-jqgrid-labels');
          if ($headerRow.length > 0) {
            var $headerCells = $headerRow.find('th');
            var colModel = grid.jqGrid('getGridParam', 'colModel');
            var gridId = 'gview_subCodeList';
            $headerCells.each(function() {
              var $th = $(this);
              var thId = $th.attr('id');
              // multiselect 체크박스 컬럼은 건너뛰기
              if ($th.hasClass('cbox') || $th.find('input[type="checkbox"]').length > 0 || !thId) {
                return true;
              }
              // 헤더 셀의 id에서 컬럼 이름 추출 (예: gview_subCodeList_iRootname -> iRootname)
              var columnName = thId.replace(gridId + '_', '');
              // colModel에서 해당 name을 가진 컬럼 찾기
              if (colModel) {
                for (var i = 0; i < colModel.length; i++) {
                  if (colModel[i].name === columnName && colModel[i].labelClasses) {
                    var labelClasses = colModel[i].labelClasses;
                    // 기존 클래스 제거 후 새 클래스 추가 (동적 업데이트를 위해)
                    $th.removeClass('no-sort is-sortable');
                    if (labelClasses) {
                      $th.addClass(labelClasses);
                    }
                    break;
                  }
                }
              }
            });
          }
        },
      });
    }
  </script>
</head>
