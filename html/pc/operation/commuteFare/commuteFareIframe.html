          var rowData = grid.jqGrid('getRowData', rowid);

          if (rowData.isEmpty === 'true' || (!rowData.routeCode && !rowData.routeName && !rowData.boardCount)) {
            return false;
          }
          return true;
        },
        loadComplete: function(data) {
          // 빈 행 처리
          var ids = grid.jqGrid('getDataIDs');
          for (var i = 0; i < ids.length; i++) {
            var rowData = grid.jqGrid('getRowData', ids[i]);
            if (rowData.isEmpty === 'true' || (!rowData.routeCode && !rowData.routeName && !rowData.boardCount)) {
              // 빈 행의 체크박스 비활성화 및 숨김
              var checkbox = grid.find('tr#' + ids[i] + ' input[type="checkbox"]');

              // 빈 행에 클래스 추가
              grid.find('tr#' + ids[i]).addClass('empty-row');
              // 빈 행의 모든 셀 내용 제거
              grid
                .find('tr#' + ids[i] + ' td')
                .not(':first')
                .html('');
            }
          }
        },

      // ---------- 2번째 테이블: DATA_2 적용 ----------
      $('#list2').jqGrid('GridUnload');

        add5: '',
        add6: '',

        add8: '',

      };
      while (displayData2.length < 15) {
        // 2테이블은 1행만 보여주고 싶을 수 있으나, 15행 고정이면 length<15로 바꿔도 됨
        displayData2.push(Object.assign({}, emptyRow2));

            name: 'baseAmount',

            align: 'center',
            sortable: false
          },
          {
            name: 'noneDevice',
            width: 90,
            align: 'center',

          },

          {

            sortable: false

            align: 'center',
            sortable: false
          },
          {
            name: 'add8',
            width: 90,
            align: 'center',
            sortable: false
          },

        height: initialHeight2,

          $bdiv2.off('scroll.sync');
          $bdiv1.off('scroll.sync');
          // div_list2의 스크롤 → div_list 동기화
          $bdiv2.on('scroll.sync', function() {
            if (!isScrolling) {
              isScrolling = true;
              var scrollTop = $(this).scrollTop();
              $bdiv1.scrollTop(scrollTop);
              setTimeout(function() {
                isScrolling = false;
              }, 10);
            }
          });
          // div_list의 스크롤 → div_list2 동기화
          $bdiv1.on('scroll.sync', function() {
            if (!isScrolling) {
              isScrolling = true;
              var scrollTop = $(this).scrollTop();
              $bdiv2.scrollTop(scrollTop);
              setTimeout(function() {
                isScrolling = false;
              }, 10);
            }
          });
