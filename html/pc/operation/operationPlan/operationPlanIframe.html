    // 달력 datepicker 초기화
    function initCalendarDatePicker() {
      if (typeof $.fn.datepicker !== 'undefined') {
        var $datepicker = $('#calendarDatePicker');
        if ($datepicker.length && !$datepicker.data('datepicker')) {
          $datepicker.datepicker({
            language: 'ko',
            weekStart: 1,
            format: 'yyyy.mm.dd',
            todayBtn: false,
            todayHighlight: true,
            clearBtn: false,
            autoclose: false,
            maxViewMode: 2,
            templates: {
              leftArrow: '<i class="icon icon-arrow-left"></i>',
              rightArrow: '<i class="icon icon-arrow-right"></i>',
            },
            beforeShowDay: function(date) {
              // 주말 및 공휴일 처리
              var day = date.getDay();
              var isWeekend = day === 0 || day === 6; // 일요일(0) 또는 토요일(6)
              // 1월 15일에 has-value 클래스 추가
              var isJan15 = date.getMonth() === 0 && date.getDate() === 15; // 0 = 1월
              var classes = [];
              if (isWeekend) classes.push('weekend');
              if (isJan15) classes.push('has-value');
              return {
                classes: classes.join(' '),
                tooltip: '',
                enabled: true,
              };
            },
          });
          // 날짜 선택 이벤트
          $datepicker.on('changeDate', function(e) {
            var selectedDate = e.date;

            // listLoad(false, 1);

        }
      } else {
        setTimeout(initCalendarDatePicker, 100);
      }

      }
      // 초기 높이 계산 (공통 함수 사용)
      var initialHeight = calculateJqGridHeight({
        containerSelector: '#div_list',
        headerSelector: '.data-list-table-header',
        footerSelector: '.data-list-table-footer',
        padding: 56,
      });

      function updateOperationPlanSelectionHeader() {
        var grid = jQuery('#list');
        if (!grid.length || typeof grid.jqGrid !== 'function') return;
        var sel = grid.jqGrid('getGridParam', 'selarrrow') || [];
        var count = sel.length;
        var $header = grid.closest('.dispatch-table-area').find('.data-list-table-header .header-left');
        var $infoBox = $header.find('.info-box');
        var $subtitle = $header.find('.subtitle.selection-count');
        if (count > 0) {
          $infoBox.hide();
          $subtitle.text(count + '개 선택').show();
        } else {
          $infoBox.show();
          $subtitle.hide();
        }
      }
      grid.jqGrid({
        datatype: 'local',
        data: displayData,
        colNames: ['순번', '운행일자', '출발', '도착', '운행구분', '노선명', '경유', '요청대수', '상태', '일시'],
        colModel: [{
            name: 'rownum',
            index: 'rownum',
            width: 64,
            align: 'center',
            sortable: true,
            sorttype: 'integer'
          },
          {
            name: 'operationDate',
            index: 'operationDate',
            width: 100,
            align: 'center',
            sortable: true
          },
          {
            name: 'departureTime',
            index: 'departureTime',
            width: 80,
            align: 'center',
            sortable: true
          },
          {
            name: 'arrivalTime',
            index: 'arrivalTime',
            width: 80,
            align: 'center',
            sortable: true
          },
          {
            name: 'operationType',
            index: 'operationType',
            width: 100,
            align: 'center',
            sortable: true
          },
          {
            name: 'routeName',
            index: 'routeName',
            width: 250,
            align: 'left',
            sortable: true,
            classes: 'link',
          },
          {
            name: 'via',
            index: 'via',
            width: 300,
            align: 'left',
            sortable: false,
          },
          {
            name: 'requestedVehicles',
            index: 'requestedVehicles',
            width: 80,
            align: 'center',
            sortable: true
          },
          {
            name: 'status',
            index: 'status',
            width: 80,
            align: 'center',
            sortable: true,
          },
          {
            name: 'approvalDateTime',
            index: 'approvalDateTime',
            width: 140,
            align: 'center',
            sortable: false,
            formatter: function(cellvalue) {
              return cellvalue || '';
            },
          },
        ],
        sortable: true,
        sortname: 'rownum',
        sortorder: 'desc',
        rowNum: 15,
        autowidth: true,
        scrollRows: true,
        scroll: true,
        loadonce: true,
        viewrecords: true,
        multiselect: true,
        multiselectWidth: 43,
        multiboxonly: false,
        height: initialHeight,
        scrollTimeout: 1,
        shrinkToFit: true,
        forceFit: true,
        scrollOffset: 0,
        beforeSelectRow: function(rowid, e) {
          var rowData = grid.jqGrid('getRowData', rowid);
          // 빈 행은 선택 불가능
          if (rowData.isEmpty === 'true' || (!rowData.rownum && !rowData.operationDate && !rowData.routeName)) {
            return false;
          }
          return true;
        },
        onSelectRow: function() {
          updateOperationPlanSelectionHeader();
        },
        onSelectAll: function() {
          updateOperationPlanSelectionHeader();
        },
        loadComplete: function(data) {
          // 그리드 높이 재계산 (레이아웃 완료 후)
          setTimeout(function() {
            var recalculatedHeight = calculateJqGridHeight({
              containerSelector: '#div_list',
              headerSelector: '.data-list-table-header',
              footerSelector: '.data-list-table-footer',
              padding: 56,
            });
            grid.jqGrid('setGridHeight', recalculatedHeight);
          }, 0);
          // 실제 데이터가 있는지 확인
          var actualData =
            data && data.rows ?
            data.rows.filter(function(row) {
              return row.rownum && (row.operationDate || row.routeName);
            }) : [];
          var isEmptyData = actualData.length === 0;
          // 데이터가 없을 때 메시지 표시
          if (isEmptyData) {
            var emptyMsg = '<tr class="empty-message-row">' + '  <td colspan="10">' + '    <span>수립된 운행계획이 없어요.</span>' + '  </td>' + '</tr>';
            grid.find('tbody tr').remove();
            grid.find('tbody').append(emptyMsg);
            return;
          }
          // 빈 행 처리
          var ids = grid.jqGrid('getDataIDs');
          for (var i = 0; i < ids.length; i++) {
            var rowData = grid.jqGrid('getRowData', ids[i]);
            if (rowData.isEmpty === 'true' || (!rowData.rownum && !rowData.operationDate && !rowData.routeName)) {
              // 빈 행의 체크박스 비활성화 및 숨김
              var checkbox = grid.find('tr#' + ids[i] + ' input[type="checkbox"]');
              checkbox.prop('disabled', true).hide();
              // 빈 행에 클래스 추가
              grid.find('tr#' + ids[i]).addClass('empty-row');
              // 빈 행의 모든 셀 내용 제거
              grid
                .find('tr#' + ids[i] + ' td')
                .not(':first')
                .html('');
            }
          }
          updateOperationPlanSelectionHeader();
        },
      });
    }
  </script>
</head>
