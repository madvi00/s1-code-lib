  <script type="text/javascript">
    // jqGrid Local Data - 요청 대수 (순번, 담당운수사, 차량번호, 대차)
    const _JQ_GRID_DATA_REQUEST_COUNT = [{
        seq: '1',
        carrier: '동안관광여행사',
        vehicleNo: '경기 76아 2056',
        replacement: '자차'
      },
      {
        seq: '2',
        carrier: '동안관광여행사',
        vehicleNo: '경기 70아 2254',
        replacement: '자차'
      },
      {
        seq: '3',
        carrier: '동안관광여행사',
        vehicleNo: '경기 24자 8850',
        replacement: '자차'
      },
      {
        seq: '4',
        carrier: '동안관광여행사',
        vehicleNo: '경기 97구 2145',
        replacement: '자차'
      },
    ];
    $(document).ready(function() {
      if (typeof setupJqGridResize === 'function') {
        setupJqGridResize({
          containerSelector: '#div_list',
          gridSelector: '#list'
        });
      }
      var modalEl = $('#modal-operation-plan-detail-info');
      if (modalEl.length) {
        var observer = new MutationObserver(function(mutations) {
          mutations.forEach(function(mutation) {
            if (mutation.type === 'attributes' && mutation.attributeName === 'style') {
              var display = modalEl.css('display');
              if (display === 'block') {
                setTimeout(function() {
                  resizeRequestCountGrid();
                }, 0);
              }
            }
          });
        });
        observer.observe(modalEl[0], {
          attributes: true,
          attributeFilter: ['style']
        });
      }
      initRequestCountGrid();
    });

    function adjustBdivWidth(grid) {
      var $bdiv = grid.closest('.ui-jqgrid-bdiv');
      if ($bdiv.length && $bdiv[0]) {
        var hasScroll = $bdiv[0].scrollHeight > $bdiv[0].clientHeight;
        if (hasScroll) {
          $bdiv.css('width', 'calc(100% + 12px)');
        } else {
          $bdiv.css('width', '');
        }
      }
    }

    function resizeRequestCountGrid() {
      var $wrap = $('#div_list');
      if ($('#list').length && $('#list').jqGrid) {
        $('#list').jqGrid('setGridWidth', $wrap.width());
        adjustBdivWidth($('#list'));
      }
    }

    function initRequestCountGrid() {
      var grid = jQuery('#list');
      if (grid.length === 0) return;
      if (grid.jqGrid) {
        try {
          grid.jqGrid('GridUnload');
        } catch (e) {}
      }
      var displayData = _JQ_GRID_DATA_REQUEST_COUNT ? [..._JQ_GRID_DATA_REQUEST_COUNT] : [];
      var emptyRow = {
        seq: '',
        carrier: '',
        vehicleNo: '',
        replacement: ''
      };
      while (displayData.length < 5) {
        displayData.push(Object.assign({}, emptyRow));
      }
      // 담당운수사 드롭다운 옵션 (필요시 확장)
      var carrierOptions = [{
          value: '동안관광여행사',
          text: '동안관광여행사'
        },
        {
          value: '현대관광',
          text: '현대관광'
        },
      ];
      grid.jqGrid({
        datatype: 'local',
        data: displayData,
        colNames: ['순번', '담당운수사', '차량번호', '대차'],
        colModel: [{
            name: 'seq',
            index: 'seq',
            width: 64,
            align: 'center',
            sortable: false
          },
          {
            name: 'carrier',
            index: 'carrier',
            width: 184,
            align: 'center',
            sortable: false,
            formatter: function(cellvalue, options, rowObject) {
              var isEmptyRow = !(rowObject.seq || rowObject.carrier || rowObject.vehicleNo || rowObject.replacement);
              if (isEmptyRow) return '';
              var val = cellvalue || '';
              var esc = function(s) {
                return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
              };
              var selectOpts = carrierOptions.map(function(opt) {
                var selected = opt.value === val ? ' selected' : '';
                return '<option value="' + esc(opt.value) + '"' + selected + '>' + esc(opt.text) + '</option>';
              }).join('');
              var listItems = carrierOptions.map(function(opt) {
                var active = opt.value === val ? ' active' : '';
                return (
                  '<div class="dropdown-list' + active + '">' +
                  '<button type="button" class="btn-dropdown-list" data-value="' + esc(opt.value) + '">' +
                  '<span>' + esc(opt.text) + '</span>' +
                  '</button>' +
                  '</div>'
                );
              }).join('');
              var hasValue = val !== '';
              var textDisplay = hasValue ? '' : ' style="display: none"';
              var placeholderDisplay = hasValue ? ' style="display: none"' : '';
              return (
                '<div class="field field-dropdown field-x-small normal">' +
                '<div class="field-form">' +
                '<select class="dropdown-select" style="display: none">' +
                selectOpts +
                '</select>' +
                '<button type="button" class="btn-dropdown" style="max-width: none; padding: 0 32px 0 8px;">' +
                '<span class="text"' + textDisplay + '>' + esc(val) + '</span>' +
                '<span class="placeholder"' + placeholderDisplay + '>선택</span>' +
                '</button>' +
                '<div class="dropdown-list-box">' +
                listItems +
                '</div>' +
                '</div>' +
                '</div>'
              );
            },
          },
          {
            name: 'vehicleNo',
            index: 'vehicleNo',
            width: 184,
            align: 'center',
            sortable: false
          },
          {
            name: 'replacement',
            index: 'replacement',
            width: 184,
            align: 'center',
            sortable: false
          },
        ],
        sortable: false,
        rowNum: 10000,
        autowidth: true,
        scrollRows: false,
        scroll: true,
        loadonce: true,
        viewrecords: true,
        height: 170,
        scrollTimeout: 1,
        shrinkToFit: true,
        forceFit: true,
        scrollOffset: 0,
        multiselect: true,
        multiselectWidth: 43,
        multiboxonly: false,
        beforeSelectRow: function(rowid) {
          var rowData = grid.jqGrid('getRowData', rowid);
          var isEmpty = !(rowData.seq || rowData.carrier || rowData.vehicleNo || rowData.replacement);
          if (isEmpty) return false;
          return true;
        },
        loadComplete: function() {
          // 빈 행 체크박스 숨김
          var ids = grid.jqGrid('getDataIDs');
          for (var i = 0; i < ids.length; i++) {
            var rowData = grid.jqGrid('getRowData', ids[i]);
            var isEmpty = !(rowData.seq || rowData.carrier || rowData.vehicleNo || rowData.replacement);
            if (isEmpty) {
              var checkbox = grid.find('tr#' + ids[i] + ' input[type="checkbox"]');
              checkbox.prop('disabled', true).hide();
              grid.find('tr#' + ids[i]).addClass('empty-row');
            }
          }
          var $bdiv = grid.closest('.ui-jqgrid-bdiv');
          if ($bdiv.length) {
            var $wrapper = $bdiv.find('> div[style*="position:relative"]');
            if ($wrapper.length) {
              var $table = $wrapper.find('table');
              if ($table.length) {
                $table.detach();
                $wrapper.replaceWith($table);
              }
            }
          }
          // 그리드 셀 내 드롭다운 컴포넌트 초기화
          grid.find('.field-dropdown').each(function() {
            var $dropdown = $(this);
            if (!$dropdown.data('dropdown-instance')) {
              $dropdown.dropdown();
            }
          });
          setTimeout(function() {
            adjustBdivWidth(grid);
          }, 0);
        },
      });
    }
  </script>
