        rownum: '54',
        routeName: '기흥 → 경주',
        departure: '기흥캠퍼스',
        arrival: '경주시외버스터미널',
        vehicleType: '우등',
      },
    ];
    $(document).ready(function() {
      // jqGrid 높이 계산 및 리사이즈 설정
      setupJqGridResize();
      // 모달이 열릴 때 jqGrid 다시 그리기
      var modalEl = $('#modal-dispatch');
      if (modalEl.length) {
        // MutationObserver로 모달의 display 속성 변경 감지
        var observer = new MutationObserver(function(mutations) {
          mutations.forEach(function(mutation) {
            if (mutation.type === 'attributes' && mutation.attributeName === 'style') {
              var display = modalEl.css('display');
              if (display === 'block') {
                // 모달이 열렸을 때 그리드 다시 그리기
                setTimeout(function() {
                  listLoad(false, 1);
                }, 50);
              }
            }
          });
        });
        observer.observe(modalEl[0], {
          attributes: true,
          attributeFilter: ['style']
        });
      }
    });

    function setPageDefault() {
      listLoad(false, 1);
    }

    function listLoad(firstNoLoad, page) {
      // jqGrid 리스트 초기화, 생성
      $('#list').jqGrid('GridUnload');
      var grid = jQuery('#list');
      // 데이터가 없거나 부족할 때 빈 행 추가
      var displayData = _JQ_GRID_DATA ? [..._JQ_GRID_DATA] : [];
      var emptyRow = {
        rownum: '',
        routeName: '',
        departure: '',
        arrival: '',
        vehicleType: '',
        isEmpty: true
      };
      while (displayData.length < 6) {
        // 해당 테이블은 6개의 행만 보여짐
        displayData.push(Object.assign({}, emptyRow));
      }
      // 초기 높이 계산
      var initialHeight = calculateJqGridHeight ? calculateJqGridHeight() : 'auto';
      grid.jqGrid({
        datatype: 'local',
        data: displayData,
        colNames: ['순번', '노선명', '출발지', '도착지', '차량 구분'],
        colModel: [{
            name: 'rownum',
            index: 'rownum',
            width: 60,
            align: 'center',
            sortable: false
          },
          {
            name: 'routeName',
            index: 'routeName',
            width: 242,
            align: 'left',
            sortable: false
          },
          {
            name: 'departure',
            index: 'departure',
            width: 128,
            align: 'center',
            sortable: false
          },
          {
            name: 'arrival',
            index: 'arrival',
            width: 128,
            align: 'center',
            sortable: false
          },
          {
            name: 'vehicleType',
            index: 'vehicleType',
            width: 90,
            align: 'center',
            sortable: false
          },
        ],
        sortable: false,
        rowNum: 6, // 한 번에 로드될 행의 수
        autowidth: true,
        scrollRows: true,
        scroll: true,
        loadonce: true,
        viewrecords: true,
        multiselect: true,
        multiselectWidth: 42,
        multiboxonly: false,
        height: 204,
        scrollTimeout: 1,
        shrinkToFit: true,
        forceFit: true,
        scrollOffset: 0,
        beforeSelectRow: function(rowid, e) {
          var rowData = grid.jqGrid('getRowData', rowid);
          // 빈 행은 선택 불가능
          if (rowData.isEmpty === 'true' || (!rowData.rownum && !rowData.routeName && !rowData.departure && !rowData.arrival && !rowData.vehicleType)) {
            return false;
          }
          return true;
        },
        loadComplete: function(data) {
          // 빈 행 처리
          var ids = grid.jqGrid('getDataIDs');
          for (var i = 0; i < ids.length; i++) {
            var rowData = grid.jqGrid('getRowData', ids[i]);
            if (rowData.isEmpty === 'true' || (!rowData.rownum && !rowData.routeName && !rowData.departure && !rowData.arrival && !rowData.vehicleType)) {
              // 빈 행의 체크박스 비활성화 및 숨김
              var checkbox = grid.find('tr#' + ids[i] + ' input[type="checkbox"]');
              checkbox.prop('disabled', true).hide();
              // 빈 행에 클래스 추가
              grid.find('tr#' + ids[i]).addClass('empty-row');
              // 빈 행의 모든 셀 내용 제거
              grid
                .find('tr#' + ids[i] + ' td')
                .not(':first')
                .html('');
            }
          }
        },
      });
    }
  </script>
