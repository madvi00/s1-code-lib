    function listLoad(firstNoLoad, page) {
      $('#list').jqGrid('GridUnload');
      var grid = jQuery('#list');
      var displayData = _JQ_GRID_DATA || [];
      var emptyRow = {
        sequence: '',
        operationType: '',
        status: '',
        routeName: '',
        path: '',

      while (displayData.length < 15) {

      var initialHeight = calculateJqGridHeight();
      grid.jqGrid({
        datatype: 'local',
        data: displayData,

            align: 'center',
            sortable: true
          },

            sortable: true
          },

            name: 'path',
            index: 'path',
            width: 64,
            align: 'center',
            sortable: true
          },

        autowidth: true,
        scrollRows: true,
        scroll: true,
        loadonce: true,
        viewrecords: true,
        height: initialHeight,
        scrollTimeout: 1,
        shrinkToFit: true,
        forceFit: true,
        scrollOffset: 0,
        multiselect: true,
        multiselectWidth: 43,
        multiboxonly: false,

          var rowData = grid.jqGrid('getRowData', rowid);
          // 빈 행은 선택 불가능
          if (rowData.isEmpty === 'true' || (!rowData.sequence && !rowData.operationType && !rowData.status && !rowData.routeName && !rowData.path)) {
            return false;
          }
          return true;
        },
        onSelectRow: function(rowid, status, e) {
          var rowData = grid.jqGrid('getRowData', rowid);
          if (rowData.isEmpty !== 'true' && rowData.sequence) {
            // 선택된 행의 데이터로 상세 정보 업데이트
            // 필요시 여기에 로직 추가
          }
        },
        loadComplete: function(data) {
          // 빈 행 처리
          var ids = grid.jqGrid('getDataIDs');
          for (var i = 0; i < ids.length; i++) {
            var rowData = grid.jqGrid('getRowData', ids[i]);
            if (rowData.isEmpty === 'true' || (!rowData.sequence && !rowData.operationType && !rowData.status && !rowData.routeName && !rowData.path)) {
              // 빈 행의 체크박스 비활성화 및 숨김
              var checkbox = grid.find('tr#' + ids[i] + ' input[type="checkbox"]');
              checkbox.prop('disabled', true).hide();
              // 빈 행에 클래스 추가
              grid.find('tr#' + ids[i]).addClass('empty-row');
              // 빈 행의 모든 셀 내용 제거 (첫 번째 셀인 체크박스는 제외)
              grid
                .find('tr#' + ids[i] + ' td')
                .not(':first')
                .html('');
            }
          }

          setTimeout(function() {
            adjustBdivWidth(grid);
          }, 0);
        },
      });
    }

      if (grid.length === 0) return;
      if (grid.jqGrid) {
        try {
          grid.jqGrid('GridUnload');
        } catch (e) {
          // 그리드가 이미 언로드되었거나 존재하지 않는 경우 무시
        }
      }
      // 데이터 준비
      var displayData = _JQ_GRID_DATA_ROUTE_INFO ? [..._JQ_GRID_DATA_ROUTE_INFO] : [];
      // 그리드 너비 설정
      var gridWidth = $wrap.width();
      if (gridWidth <= 0) {
        // 너비가 0이면 기본값 사용
        gridWidth = 500;
      }
      grid.jqGrid({
        datatype: 'local',
        data: displayData,
        colNames: ['순번', '정류장명', '소요시간', '메모'],
        colModel: [{
            name: 'sequence',
            index: 'sequence',
            width: 48,
            align: 'center',
            sortable: false
          },
          {
            name: 'stopName',
            index: 'stopName',
            width: 191,
            align: 'left',
            sortable: false
          },
          {
            name: 'travelTime',
            index: 'travelTime',
            width: 80,
            align: 'center',
            sortable: false
          },
          {
            name: 'memo',
            index: 'memo',
            width: 200,
            align: 'center',
            sortable: false
          },
        ],
        sortable: false,
        rowNum: 10000, // 모든 행 표시
        autowidth: true,
        scrollRows: false,
        scroll: true,
        loadonce: true,
        viewrecords: false,
        width: gridWidth,
        height: 227,
        scrollTimeout: 1,
        shrinkToFit: true,
        forceFit: true,
        scrollOffset: 0,
        loadComplete: function(data) {
          // 불필요한 wrapper div 제거
          var $bdiv = grid.closest('.ui-jqgrid-bdiv');
          if ($bdiv.length) {
            var $wrapper = $bdiv.find('> div[style*="position:relative"]');
            if ($wrapper.length) {
              var $emptyDiv = $wrapper.find('> div:empty');
              if ($emptyDiv.length) {
                $emptyDiv.remove();
              }
              // table을 직접 bdiv의 자식으로 이동
              var $table = $wrapper.find('table');
              if ($table.length) {
                $table.detach();
                $wrapper.replaceWith($table);
              }
            }
          }
          // 스크롤 여부 확인 후 .ui-jqgrid-bdiv 너비 조정
          setTimeout(function() {
            adjustBdivWidth(grid);
          }, 0);
        },
      });
    }
  </script>
</head>
