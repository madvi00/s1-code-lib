  <script type="text/javascript">
    // jqGrid Local Data - 운행 정보 조회
    const _JQ_GRID_DATA_OPERATION_INFO = [{
        vehicleNumber: '경기70사7724',
        startTime: '06:55',
        endTime: '07:19',
        operationDistance: '9',
      },
      {
        vehicleNumber: '경기79가8820',
        startTime: '07:55',
        endTime: '08:19',
        operationDistance: '5',
      },
    ];
    $(document).ready(function() {
      // jqGrid 높이 계산 및 리사이즈 설정
      if (typeof setupJqGridResize === 'function') {
        setupJqGridResize({
          containerSelector: '#div_list',
          gridSelector: '#list',
        });
      }
      // 모달이 열릴 때 jqGrid 다시 그리기
      var modalEl = $('#modal-add-new-route');
      if (modalEl.length) {
        // MutationObserver로 모달의 display 속성 변경 감지
        var observer = new MutationObserver(function(mutations) {
          mutations.forEach(function(mutation) {
            if (mutation.type === 'attributes' && mutation.attributeName === 'style') {
              var display = modalEl.css('display');
              if (display === 'block') {
                // 모달이 열렸을 때 그리드 resizing
                setTimeout(function() {
                  resizeGrid();
                }, 0);
              }
            }
          });
        });
        observer.observe(modalEl[0], {
          attributes: true,
          attributeFilter: ['style']
        });
      }
      // 모달이 열릴 때 jqGrid 및 datepicker 초기화
      $('#modal-add-new-route').on('modal:open', function() {
        initOperationInfoGrid();
        // datepicker 초기화
        if (typeof DatePicker !== 'undefined') {
          DatePicker.initSingle($('#operationDate'));
        } else if (typeof $.fn.datepicker !== 'undefined') {
          $('#operationDate').datepicker({
            language: 'ko',
            format: 'yy.mm.dd',
            todayBtn: false,
            todayHighlight: true,
            clearBtn: false,
            autoclose: true,
            maxViewMode: 2,
            templates: {
              leftArrow: '<i class="icon icon-arrow-left"></i>',
              rightArrow: '<i class="icon icon-arrow-right"></i>',
            },
          });
        }
      });
      // 초기 로드 시에도 그리드 초기화
      initOperationInfoGrid();
    });
    // 스크롤 여부 확인 후 .ui-jqgrid-bdiv 너비 조정
    function adjustBdivWidth(grid) {
      var $bdiv = grid.closest('.ui-jqgrid-bdiv');
      if ($bdiv.length && $bdiv[0]) {
        var hasScroll = $bdiv[0].scrollHeight > $bdiv[0].clientHeight;
        if (hasScroll) {
          $bdiv.css('width', 'calc(100% + 12px)');
        } else {
          $bdiv.css('width', '');
        }
      }
    }

    function resizeGrid() {
      const $wrap = $('#div_list');
      $('#list').jqGrid('setGridWidth', $wrap.width());
      adjustBdivWidth($('#list'));
    }

    function initOperationInfoGrid() {
      const $wrap = $('#div_list');
      var grid = jQuery('#list');
      if (grid.length === 0) return;
      // 기존 그리드가 있으면 언로드
      if (grid.jqGrid) {
        try {
          grid.jqGrid('GridUnload');
        } catch (e) {
          // 그리드가 이미 언로드되었거나 존재하지 않는 경우 무시
        }
      }
      // 데이터 준비
      var displayData = _JQ_GRID_DATA_OPERATION_INFO ? [..._JQ_GRID_DATA_OPERATION_INFO] : [];
      var isEmptyData = displayData.length === 0;
      var emptyRow = {
        vehicleNumber: '',
        startTime: '',
        endTime: '',
        operationDistance: '',
        isEmpty: true,
      };
      while (displayData.length < 10) {
        // 보여질 행의 갯수 10
        displayData.push(Object.assign({}, emptyRow));
      }
      var initialHeight = calculateJqGridHeight({
        containerSelector: '#div_list',
        gridSelector: '#list',
        initialHeight: 170,
        maxHeight: 170,
        minHeight: 170,
      });
      grid.jqGrid({
        datatype: 'local',
        data: displayData,
        colNames: ['차량번호', '시작', '종료', '실운행(km)', '지정노선 등록'],
        colModel: [{
            name: 'vehicleNumber',
            index: 'vehicleNumber',
            width: 103,
            align: 'left',
            sortable: false,
            classes: 'link',
          },
          {
            name: 'startTime',
            index: 'startTime',
            width: 74,
            align: 'center',
            sortable: false,
            formatter: function(cellvalue, options, rowObject) {
              if (rowObject.isEmpty === 'true') {
                return '';
              }
              return '<div class="input-wrap time-input"><input type="text" class="input-xsmall time-picker" value="' + (cellvalue || '') + '" placeholder="00:00" readonly /></div>';
            },
          },
          {
            name: 'endTime',
            index: 'endTime',
            width: 74,
            align: 'center',
            sortable: false,
            formatter: function(cellvalue, options, rowObject) {
              if (rowObject.isEmpty === 'true') {
                return '';
              }
              return '<div class="input-wrap time-input"><input type="text" class="input-xsmall time-picker" value="' + (cellvalue || '') + '" placeholder="00:00" readonly /></div>';
            },
          },
          {
            name: 'operationDistance',
            index: 'operationDistance',
            width: 86,
            align: 'center',
            sortable: false,
            formatter: function(cellvalue) {
              return cellvalue || '';
            },
          },
          {
            name: 'registerRoute',
            index: 'registerRoute',
            width: 111,
            align: 'center',
            sortable: false,
            formatter: function(cellvalue, options, rowObject) {
              if (rowObject.isEmpty === 'true') {
                return '';
              }
              return '<button type="button" class="btn btn-white btn-xsmall btn-register-route" data-rowid="' + options.rowId + '">등록</button>';
            },
          },
        ],
        sortable: false,
        rowNum: 10000, // 모든 행 표시
        autowidth: true,
        scrollRows: false,
        scroll: true,
        loadonce: true,
        viewrecords: true,
        height: initialHeight,
        scrollTimeout: 1,
        shrinkToFit: true,
        forceFit: true,
        scrollOffset: 0,
        loadComplete: function(data) {
          // 불필요한 wrapper div 제거
          var $bdiv = grid.closest('.ui-jqgrid-bdiv');
          if ($bdiv.length) {
            var $wrapper = $bdiv.find('> div[style*="position:relative"]');
            if ($wrapper.length) {
              var $emptyDiv = $wrapper.find('> div:empty');
              if ($emptyDiv.length) {
                $emptyDiv.remove();
              }
              // table을 직접 bdiv의 자식으로 이동
              var $table = $wrapper.find('table');
              if ($table.length) {
                $table.detach();
                $wrapper.replaceWith($table);
              }
            }
          }
          // 스크롤 여부 확인 후 .ui-jqgrid-bdiv 너비 조정
          setTimeout(function() {
            adjustBdivWidth(grid);
          }, 0);
          // 차량번호 컬럼 인덱스 찾기
          var colModel = grid.jqGrid('getGridParam', 'colModel');
          var vehicleNumberColIndex = -1;
          for (var colIdx = 0; colIdx < colModel.length; colIdx++) {
            if (colModel[colIdx].name === 'vehicleNumber') {
              vehicleNumberColIndex = colIdx;
              break;
            }
          }
          // 빈 행 처리 및 차량번호 td에 link 클래스 추가
          var ids = grid.jqGrid('getDataIDs');
          for (var i = 0; i < ids.length; i++) {
            var rowData = grid.jqGrid('getRowData', ids[i]);
            if (rowData.isEmpty === 'true' || (!rowData.vehicleNumber && !rowData.startTime && !rowData.endTime && !rowData.operationDistance)) {
              // 빈 행에 클래스 추가
              grid.find('tr#' + ids[i]).addClass('empty-row');
              // 빈 행의 모든 셀 내용 제거
              grid
                .find('tr#' + ids[i] + ' td')
                .not(':first')
                .html('');
            }
          }
          // 차량번호 td 클릭 이벤트
          grid
            .find('td.link')
            .off('click.vehicle')
            .on('click.vehicle', function() {
              var vehicleNumber = $(this).attr('data-vehicle') || $(this).text();
              // 차량번호 클릭 처리 로직 추가
              console.log('차량번호 클릭:', vehicleNumber);
            });
          // 등록 버튼 클릭 이벤트
          grid.find('.btn-register-route').on('click', function() {
            var rowId = $(this).data('rowid');
            var rowData = grid.jqGrid('getRowData', rowId);
            // 지정노선 등록 처리 로직 추가
            console.log('지정노선 등록:', rowData);
          });
        },
      });
    }
  </script>
