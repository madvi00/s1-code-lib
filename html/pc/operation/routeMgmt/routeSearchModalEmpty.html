  <script type="text/javascript">
    // jqGrid Local Data - 노선 정류장 정보
    const _JQ_GRID_DATA_ROUTE_STOP = [];
    // jqGrid Local Data - 선택 정류장 정보
    const _JQ_GRID_DATA_SELECTED_STOP = [];
    $(document).ready(function() {
      // jqGrid 높이 계산 및 리사이즈 설정
      if (typeof setupJqGridResize === 'function') {
        setupJqGridResize();
      }
      // 모달이 열릴 때 jqGrid 다시 그리기
      var modalEl = $('#modal-route-mgmt-search');
      if (modalEl.length) {
        // MutationObserver로 모달의 display 속성 변경 감지
        var observer = new MutationObserver(function(mutations) {
          mutations.forEach(function(mutation) {
            if (mutation.type === 'attributes' && mutation.attributeName === 'style') {
              var display = modalEl.css('display');
              if (display === 'block') {
                // 모달이 열렸을 때 그리드 resizing
                setTimeout(function() {
                  resizeGrid();
                }, 0);
              }
            }
          });
        });
        observer.observe(modalEl[0], {
          attributes: true,
          attributeFilter: ['style']
        });
      }
      initRouteStopGrid();
      initSelectedStopGrid();
      // $(window).on('resize', resizeGrid);
    });
    // 스크롤 여부 확인 후 .ui-jqgrid-bdiv 너비 조정
    function adjustBdivWidth(grid) {
      var $bdiv = grid.closest('.ui-jqgrid-bdiv');
      if ($bdiv.length && $bdiv[0]) {
        var hasScroll = $bdiv[0].scrollHeight > $bdiv[0].clientHeight;
        if (hasScroll) {
          $bdiv.css('width', 'calc(100% + 12px)');
        } else {
          $bdiv.css('width', '');
        }
      }
    }

    function resizeGrid() {
      const $wrap2 = $('#div_list2');
      $('#list2').jqGrid('setGridWidth', $wrap2.width());
      adjustBdivWidth($('#list2'));
      const $wrap3 = $('#div_list3');
      $('#list3').jqGrid('setGridWidth', $wrap3.width());
      adjustBdivWidth($('#list3'));
    }

    function initRouteStopGrid() {
      // jqGrid 리스트 초기화, 생성
      const $wrap = $('#div_list2');
      var grid = jQuery('#list2');
      if (grid.length === 0) return;
      if (grid.jqGrid) {
        try {
          grid.jqGrid('GridUnload');
        } catch (e) {
          // 그리드가 이미 언로드되었거나 존재하지 않는 경우 무시
        }
      }
      // 데이터 준비
      var displayData = _JQ_GRID_DATA_ROUTE_STOP ? [..._JQ_GRID_DATA_ROUTE_STOP] : [];
      var isEmptyData = displayData.length === 0;
      grid.jqGrid({
        datatype: 'local',
        data: displayData,
        colNames: ['정류장명', '메모'],
        colModel: [{
            name: 'stopName',
            index: 'stopName',
            width: 159,
            align: 'left',
            sortable: false
          },
          {
            name: 'memo',
            index: 'memo',
            width: 159,
            align: 'left',
            sortable: false
          },
        ],
        sortable: false,
        rowNum: 10000, // 모든 행 표시
        autowidth: true,
        scrollRows: false,
        scroll: true,
        loadonce: true,
        viewrecords: true,
        // width: $wrap.width(),
        height: 341,
        scrollTimeout: 1,
        shrinkToFit: true,
        forceFit: true,
        scrollOffset: 0,
        multiselect: true,
        multiselectWidth: 43,
        multiboxonly: false,
        beforeSelectRow: function(rowid, e) {
          // empty-message-row는 선택 불가능
          var $row = grid.find('tr#' + rowid);
          if ($row.hasClass('empty-message-row')) {
            return false;
          }
          var rowData = grid.jqGrid('getRowData', rowid);
          // 빈 행은 선택 불가능
          if (rowData.isEmpty === 'true' || (!rowData.stopName && !rowData.memo)) {
            return false;
          }
          return true;
        },
        onSelectRow: function(rowid, status, e) {
          var $row = grid.find('tr#' + rowid);
          if ($row.hasClass('empty-message-row')) {
            return;
          }
          var rowData = grid.jqGrid('getRowData', rowid);
          if (rowData.isEmpty !== 'true' && rowData.stopName) {
            // 선택된 행의 데이터로 하위 테이블 업데이트
            // 필요시 여기에 로직 추가
          }
        },
        loadComplete: function(data) {
          // 불필요한 wrapper div 제거
          var $bdiv = grid.closest('.ui-jqgrid-bdiv');
          if ($bdiv.length) {
            var $wrapper = $bdiv.find('> div[style*="position:relative"]');
            if ($wrapper.length) {
              var $emptyDiv = $wrapper.find('> div:empty');
              if ($emptyDiv.length) {
                $emptyDiv.remove();
              }
              // table을 직접 bdiv의 자식으로 이동
              var $table = $wrapper.find('table');
              if ($table.length) {
                $table.detach();
                $wrapper.replaceWith($table);
              }
            }
          }
          // 스크롤 여부 확인 후 .ui-jqgrid-bdiv 너비 조정
          setTimeout(function() {
            adjustBdivWidth(grid);
          }, 0);
          // 데이터가 비어있을 때 empty 메시지 표시
          if (isEmptyData) {
            var emptyMsg = '<tr class="empty-message-row">' + '  <td colspan="3">' + '    <span>정류장명을 검색해 주세요.</span>' + '  </td>' + '</tr>';
            grid.find('tbody').append(emptyMsg);
          }
        },
      });
    }
