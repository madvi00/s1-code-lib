  <script type="text/javascript">
    // jqGrid Local Data
    const _JQ_GRID_DATA = [];
    $(document).ready(function() {
      setPageDefault();
      setupJqGridResize();
    });

    function setPageDefault() {
      listLoad(false, 1);
    }

    function listLoad(firstNoLoad, page) {
      $('#list').jqGrid('GridUnload');
      var grid = jQuery('#list');
      var displayData = _JQ_GRID_DATA || [];
      var isEmptyData = displayData.length === 0;
      var emptyRow = {
        rownum: '',
        userId: '',
        userName: '',
        userPermission: '',
        email: '',
        registrationDate: '',
        isEmpty: true,
      };
      while (displayData.length < 15) {
        displayData.push(Object.assign({}, emptyRow));
      }
      var initialHeight = calculateJqGridHeight({
        containerSelector: '#div_list',
        headerSelector: '.data-list-table-header',
        footerSelector: '.data-list-table-footer',
        padding: 56,
      });
      grid.jqGrid({
        datatype: 'local',
        data: displayData,
        colNames: ['순번', '사용자 ID', '이름', '사용권한', '회사명', '이메일', '등록일'],
        colModel: [{
            name: 'rownum',
            index: 'rownum',
            width: 64,
            align: 'center',
            sortable: true
          },
          {
            name: 'userId',
            index: 'userId',
            width: 210,
            align: 'center',
            sortable: true
          },
          {
            name: 'userName',
            index: 'userName',
            width: 210,
            align: 'center',
            sortable: true
          },
          {
            name: 'userPermission',
            index: 'userPermission',
            width: 210,
            align: 'center',
            sortable: true
          },
          {
            name: 'companyName',
            index: 'companyName',
            width: 210,
            align: 'center',
            sortable: true
          },
          {
            name: 'email',
            index: 'email',
            width: 210,
            align: 'center',
            sortable: true
          },
          {
            name: 'registrationDate',
            index: 'registrationDate',
            width: 210,
            align: 'center',
            sortable: true
          },
        ],
        sortable: false,
        rowNum: 15,
        autowidth: true,
        scrollRows: true,
        scroll: true,
        loadonce: true,
        viewrecords: true,
        multiselect: true,
        multiselectWidth: 43,
        multiboxonly: false,
        height: initialHeight,
        scrollTimeout: 1,
        shrinkToFit: true,
        forceFit: true,
        scrollOffset: 0,
        beforeSelectRow: function(rowid, e) {
          var rowData = grid.jqGrid('getRowData', rowid);
          if (rowData.isEmpty === 'true' || !rowData.userId) {
            return false;
          }
          return true;
        },
        onSelectRow: function(rowid, status, e) {
          var rowData = grid.jqGrid('getRowData', rowid);
          if (rowData.isEmpty !== 'true' && rowData.userId) {
            loadDetailData(rowData);
          }
        },
        loadComplete: function(data) {
          // 데이터가 없을 때 메시지 표시
          if (isEmptyData) {
            var emptyMsg = '<tr class="empty-message-row">' + '  <td colspan="8">' + '<span>등록된 계정이 없어요.</span>' + '  </td>' + '</tr>';
            grid.find('tbody tr').remove();
            grid.find('tbody').append(emptyMsg);
            return;
          }
          var ids = grid.jqGrid('getDataIDs');
          for (var i = 0; i < ids.length; i++) {
            var rowData = grid.jqGrid('getRowData', ids[i]);
            if (rowData.isEmpty === 'true' || !rowData.userId) {
              var checkbox = grid.find('tr#' + ids[i] + ' input[type="checkbox"]');
              checkbox.prop('disabled', true).hide();
              grid.find('tr#' + ids[i]).addClass('empty-row');
              grid
                .find('tr#' + ids[i] + ' td')
                .not(':first')
                .html('');
            }
          }
          // 스크롤 여부 확인 후 .ui-jqgrid-bdiv 너비 조정
          setTimeout(function() {
            adjustBdivWidth(grid);
          }, 0);
        },
      });
    }
    var selectedRowData = null;

    function loadDetailData(rowData) {
      selectedRowData = rowData;
      // 상세 정보 로드 로직
      $('.empty-content-box').hide();
      $('#toggle_cancel').prop('disabled', true);
      $('#toggle_save').prop('disabled', true);
      // 선택된 행의 데이터를 폼에 채우기
      $('#userId').val(rowData.userId || '');
      $('#userName').val(rowData.userName ? rowData.userName.replace(/\*/g, '') : '');
      // 사용권한 드롭다운 설정은 실제 데이터에 따라 조정 필요
    }
