  <title>사용 권한 관리</title>
  <script type="text/javascript">
    // jqGride Local Data
    const _JQ_GRID_DATA = [{
        rownum: 1,
        permissionCode: '001',
        permissionName: '전체 관리자',
        registrationDate: '25.12.12',
      },
      {
        rownum: 2,
        permissionCode: '002',
        permissionName: '운수사 관리자',
        registrationDate: '25.12.12',
      },
      {
        rownum: 3,
        permissionCode: '003',
        permissionName: '총무/총괄',
        registrationDate: '25.12.12',
      },
      {
        rownum: 4,
        permissionCode: '004',
        permissionName: '감사',
        registrationDate: '25.12.12',
      },
    ];
    $(document).ready(function() {
      setPageDefault();
      // jqGrid 높이 계산 및 리사이즈 설정
      setupJqGridResize();
      // 초기 로딩 시 그리드 너비 설정
      $(window).resize(function() {
        $('#list').setGridWidth($('#div_list').width(), true);
      });
      // 초기 로딩 시 한 번 실행
      setTimeout(function() {
        $('#list').setGridWidth($('#div_list').width(), true);
      }, 100);
    });

    function setPageDefault() {
      listLoad(false, 1);
    }

    function listLoad(firstNoLoad, page) {
      // jqGrid 리스트 초기화, 생성
      $('#list').jqGrid('GridUnload');
      var grid = jQuery('#list');
      // 데이터가 없거나 부족할 때 빈 행 추가
      var displayData = _JQ_GRID_DATA || [];
      var emptyRow = {
        rownum: '',
        permissionCode: '',
        permissionName: '',
        registrationDate: '',
        isEmpty: true,
      };
      while (displayData.length < 15) {
        displayData.push(Object.assign({}, emptyRow));
      }
      // 초기 높이 계산
      var initialHeight = calculateJqGridHeight();
      grid.jqGrid({
        datatype: 'local',
        data: displayData,
        colNames: ['순번', '권한코드', '권한명', '등록일자'],
        colModel: [{
            name: 'rownum',
            index: 'rownum',
            width: 64,
            align: 'center',
            sortable: false
          },
          {
            name: 'permissionCode',
            index: 'permissionCode',
            width: 104,
            align: 'center',
            sortable: false
          },
          {
            name: 'permissionName',
            index: 'permissionName',
            width: 104,
            align: 'center',
            sortable: false
          },
          {
            name: 'registrationDate',
            index: 'registrationDate',
            width: 104,
            align: 'center',
            sortable: false
          },
        ],
        sortable: false,
        rowNum: 15,
        autowidth: true,
        scrollRows: true,
        scroll: true,
        loadonce: true,
        viewrecords: true,
        multiselect: true,
        multiselectWidth: 43,
        height: initialHeight,
        scrollTimeout: 1,
        shrinkToFit: true,
        forceFit: true,
        scrollOffset: 0,
        beforeSelectRow: function(rowid, e) {
          var rowData = grid.jqGrid('getRowData', rowid);
          // 빈 행은 선택 불가능
          if (rowData.isEmpty === 'true' || (!rowData.rownum && !rowData.permissionCode)) {
            return false;
          }
          return true;
        },
        loadComplete: function(data) {
          // 그리드 너비 설정 (DOM 렌더링 완료 후 실행)
          setTimeout(function() {
            grid.setGridWidth($('#div_list').width(), true);
          }, 0);
          // 빈 행 처리
          var ids = grid.jqGrid('getDataIDs');
          for (var i = 0; i < ids.length; i++) {
            var rowData = grid.jqGrid('getRowData', ids[i]);
            if (rowData.isEmpty === 'true' || (!rowData.rownum && !rowData.permissionCode)) {
              // 빈 행의 체크박스 비활성화 및 숨김
              var checkbox = grid.find('tr#' + ids[i] + ' input[type="checkbox"]');
              checkbox.prop('disabled', true).hide();
              // 빈 행에 클래스 추가
              grid.find('tr#' + ids[i]).addClass('empty-row');
              // 빈 행의 모든 셀 내용 제거
              grid
                .find('tr#' + ids[i] + ' td')
                .not(':first')
                .html('');
            }
          }
        },
      });
    }
  </script>
