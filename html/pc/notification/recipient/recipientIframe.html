      setTimeout(function() {
        $('#list').jqGrid('setSelection', '2');
      }, 500);
    });

    function setPageDefault() {
      listLoad(false, 1);
    }

    function listLoad(firstNoLoad, page) {
      $('#list').jqGrid('GridUnload');
      var grid = jQuery('#list');
      var displayData = _JQ_GRID_DATA || [];
      var emptyRow = {
        rownum: '',
        companyName: '',
        sendingGroup: '',
        name: '',
        contact: '',
        email: '',
        memo: '',
        receptionSetting: '',
        lastModifiedDate: '',
        isEmpty: true,
      };
      while (displayData.length < 15) {
        displayData.push(Object.assign({}, emptyRow));
      }
      var initialHeight = calculateJqGridHeight();
      grid.jqGrid({
        datatype: 'local',
        data: displayData,
        colNames: ['순번', '업체명', '발송그룹', '이름', '연락처', '이메일', '메모', '수신설정', '최종수정일'],

          {

            index: 'lastModifiedDate',
            width: 100,
            align: 'center',
            sortable: true
          },
        ],
        sortable: false,
        rowNum: 15,
        autowidth: true,
        scrollRows: true,
        scroll: true,
        loadonce: true,
        viewrecords: true,
        multiselect: false,
        height: initialHeight,
        scrollTimeout: 1,
        shrinkToFit: true,
        forceFit: true,
        scrollOffset: 0,
        beforeSelectRow: function(rowid, e) {
          var rowData = grid.jqGrid('getRowData', rowid);
          if (rowData.isEmpty === 'true' || (!rowData.companyName && !rowData.name)) {
            return false;
          }
          return true;
        },
        loadComplete: function(data) {
          var ids = grid.jqGrid('getDataIDs');
          for (var i = 0; i < ids.length; i++) {
            var rowData = grid.jqGrid('getRowData', ids[i]);
            if (rowData.isEmpty === 'true' || (!rowData.companyName && !rowData.name)) {
              var checkbox = grid.find('tr#' + ids[i] + ' input[type="checkbox"]');
              checkbox.prop('disabled', true).hide();
              grid.find('tr#' + ids[i]).addClass('empty-row');
              grid
                .find('tr#' + ids[i] + ' td')
                .not(':first')
                .html('');
            }
          }
