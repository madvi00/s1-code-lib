            index: 'applicant',
            width: 72,
            align: 'center',
            sortable: false
          },
          {
            name: 'applicantId',
            index: 'applicantId',
            width: 100,
            align: 'center',
            sortable: false
          },
          {
            name: 'totalReservations',
            index: 'totalReservations',
            width: 40,
            align: 'center',
            sortable: false,
            formatter: function(cellvalue, options, rowObject) {
              if (rowObject.adultReservations !== undefined && rowObject.childReservations !== undefined) {
                var adult = parseInt(rowObject.adultReservations) || 0;
                var child = parseInt(rowObject.childReservations) || 0;
                return adult + child;
              }
              return '';
            },
          },
          {
            name: 'adultReservations',
            index: 'adultReservations',
            width: 40,
            align: 'center',
            sortable: false,
            formatter: function(cellvalue) {
              return cellvalue || '';
            },
          },
          {
            name: 'childReservations',
            index: 'childReservations',
            width: 40,
            align: 'center',
            sortable: false,
            formatter: function(cellvalue) {
              return cellvalue || '';
            },
          },
          {
            name: 'carNumber',
            index: 'carNumber',
            width: 50,
            align: 'center',
            sortable: false
          },
          {
            name: 'contactNumber',
            index: 'contactNumber',
            width: 120,
            align: 'center',
            sortable: false
          },
          {
            name: 'appliedFee',
            index: 'appliedFee',
            width: 80,
            align: 'center',
            sortable: false
          },
          {
            name: 'paymentMethod',
            index: 'paymentMethod',
            width: 100,
            align: 'center',
            sortable: false
          },
        ],
        sortable: false,
        rowNum: 999, // 최대 행 수
        autowidth: true,
        scrollRows: true,
        scroll: true,
        loadonce: true,
        viewrecords: true,
        // multiselect: true,
        // multiselectWidth: 43,
        // multiboxonly: false,
        // height: initialHeight,
        height: 170, //행 5개의 높이
        scrollTimeout: 1,
        shrinkToFit: true,
        forceFit: false,
        scrollOffset: 0,
        beforeSelectRow: function(rowid, e) {
          var rowData = grid.jqGrid('getRowData', rowid);
          // 빈 행은 선택 불가능
          if (rowData.isEmpty === 'true' || !rowData.rownum) {
            return false;
          }
          return true;
        },
        loadComplete: function(data) {
          // 그리드 높이 재계산 (레이아웃 완료 후)
          setTimeout(function() {
            // var recalculatedHeight = calculateJqGridHeight({
            //   containerSelector: '#div_list',
            //   headerSelector: '.data-list-table-header',
            //   footerSelector: '.data-list-table-footer',
            //   padding: 56,
            // });
            var recalculatedHeight = 170; // 행 5개의 높이
            grid.jqGrid('setGridHeight', recalculatedHeight);
          }, 0);
          // 그룹 헤더 설정
          grid.jqGrid('setGroupHeaders', {
            useColSpanStyle: true,
            groupHeaders: [{
              startColumnName: 'totalReservations',
              numberOfColumns: 3,
              titleText: '예약수',
            }, ],
          });
          // 빈 행 처리
          var ids = grid.jqGrid('getDataIDs');
          for (var i = 0; i < ids.length; i++) {
            var rowData = grid.jqGrid('getRowData', ids[i]);
            if (rowData.isEmpty === 'true' || !rowData.rownum) {
              // 빈 행의 체크박스 비활성화 및 숨김
              var checkbox = grid.find('tr#' + ids[i] + ' input[type="checkbox"]');
              checkbox.prop('disabled', true).hide();
              // 빈 행에 클래스 추가
              grid.find('tr#' + ids[i]).addClass('empty-row');
              // 빈 행의 모든 셀 내용 제거
              grid
                .find('tr#' + ids[i] + ' td')
                .not(':first')
                .html('');
            }
          }
          // 스크롤 여부 확인 후 .ui-jqgrid-bdiv 너비 조정
          setTimeout(function() {
            adjustBdivWidth(grid);
          }, 0);
        },
      });
    }
  </script>
</head>

<body>

                                </div>
                              </td>
                              <th><span>신청자 ID</span></th>
                              <td class="size-md">

                                </div>
                              </td>
                            </tr>
                            <tr>
                              <th><span>신청좌석수</span></th>
                              <td class="size-md">
                                <div class="input-wrap">
                                  <input id="totalReservations" name="totalReservations" class="clearable input-xsmall complete" placeholder="" type="text" value="25" disabled readonly />
                                </div>
                              </td>
                              <th><span>신청건수</span></th>
                              <td class="size-md">

                                  <input id="applicationCount" name="applicationCount" class="clearable input-xsmall complete" placeholder="" type="text" value="10" disabled readonly />
                                </div>
                              </td>
                            </tr>
                            <tr>

                              <td class="size-md">

                                  <input id="totalAmount" name="totalAmount" class="clearable input-xsmall complete" placeholder="" type="text" value="605,000" disabled readonly />
                                </div>
                              </td>
                              <th><span>입금 확인 여부</span></th>
                              <td>
                                <div class="radio-group">
                                  <label for="checkStatus_check">
                                    <input type="radio" id="checkStatus_check" name="checkStatus" value="check" checked="" />

                                  </label>
                                  <label for="checkStatus_notCheck">
                                    <input type="radio" id="checkStatus_notCheck" name="checkStatus" value="notCheck" />
                                    <span>미확인</span>
                                  </label>
                                </div>
                              </td>
                            </tr>
                          </tbody>
                        </table>
                      </div>
                    </div>
                    <div class="table-box">
                      <div class="data-list-table">
                        <div class="data-table" id="div_list">
                          <table id="list"></table>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="modal-bottom">
          <div class="modal-button-box">
            <button type="button" class="btn btn-white btn-small" onclick="">
              <span>취소</span>
            </button>
            <button type="button" class="btn btn-blue btn-small" onclick="">
              <span>확인</span>
            </button>
          </div>
        </div>
        <button type="button" class="btn-close" title="팝업창 닫기 버튼"></button>
      </div>
    </div>
  </div>
</body>
