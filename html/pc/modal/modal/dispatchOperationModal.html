          // 그룹 헤더 설정
          grid.jqGrid('setGroupHeaders', {
            useColSpanStyle: true,
            groupHeaders: [{
              startColumnName: 'totalReservations',
              numberOfColumns: 3,
              titleText: '총금액',

          });
          // 빈 행 처리
          var ids = grid.jqGrid('getDataIDs');
          for (var i = 0; i < ids.length; i++) {
            var rowData = grid.jqGrid('getRowData', ids[i]);
            if (rowData.isEmpty === 'true' || !rowData.rownum) {
              // 빈 행의 체크박스 비활성화 및 숨김
              var checkbox = grid.find('tr#' + ids[i] + ' input[type="checkbox"]');

                .find('tr#' + ids[i] + ' td')
                .not(':first')
                .html('');
            }
          }
          // 스크롤 여부 확인 후 .ui-jqgrid-bdiv 너비 조정
          setTimeout(function() {
            adjustBdivWidth(grid);
          }, 0);
        },
      });
    }

    /**
     * 동적 테이블 행 추가/삭제 로직
     * table-box-dynamic-vehicle 클래스를 가진 테이블에 적용
     * 각 tr에는 최대 2개의 th,td 쌍이 들어갈 수 있음
     */
    (function() {
      'use strict';
      /**
       * 호차 번호 추출 (예: "1호차" -> 1)
       * 첫 번째 th의 텍스트에서 숫자를 추출
       */
      function getVehicleNumber(thElement) {
        if (!thElement) return 0;
        var text = '';
        var span = thElement.querySelector('span');
        if (span) {
          text = span.textContent.trim();
        } else {
          text = thElement.textContent.trim();
        }
        // 숫자 추출 (예: "1호차", "1", "차량1" 등)
        var match = text.match(/(\d+)/);
        return match ? parseInt(match[1], 10) : 0;
      }
      /**
       * 다음 호차 번호 계산
       */
      function getNextVehicleNumber(tableBox) {
        var tbody = tableBox.querySelector('table tbody');
        var allThs = tbody.querySelectorAll('th');
        var maxNumber = 0;
        for (var i = 0; i < allThs.length; i++) {
          var num = getVehicleNumber(allThs[i]);
          if (num > maxNumber) {
            maxNumber = num;
          }
        }
        return maxNumber + 1;
      }
      /**
       * 첫 번째 th, td 쌍 찾기 (템플릿으로 사용)
       */
      function getFirstPairTemplate(tableBox) {
        console.log('getFirstPairTemplate 호출, tableBox:', tableBox);
        var table = tableBox.querySelector('table');
        if (!table) {
          console.error('table을 찾을 수 없습니다.');
          return null;
        }
        var tbody = table.querySelector('tbody');
        if (!tbody) {
          console.error('tbody를 찾을 수 없습니다. table:', table);
          return null;
        }
        var rows = tbody.querySelectorAll('tr');
        if (rows.length === 0) {
          console.error('tr이 없습니다. tbody:', tbody);
          return null;
        }
        var firstRow = rows[0];
        console.log('첫 번째 tr 찾음:', firstRow);
        var ths = firstRow.querySelectorAll('th');
        var tds = firstRow.querySelectorAll('td');
        if (ths.length === 0) {
          console.error('th가 없습니다. firstRow:', firstRow);
          return null;
        }
        if (tds.length === 0) {
          console.error('td가 없습니다. firstRow:', firstRow);
          return null;
        }
        var firstTh = ths[0];
        var firstTd = tds[0];
        console.log('템플릿 찾기 성공:', {
          th: firstTh,
          td: firstTd
        });
        return {
          th: firstTh,
          td: firstTd
        };
      }
      /**
       * ID 패턴 추출 (예: "vehicle1" -> {prefix: "vehicle", number: 1})
       */
      function extractIdPattern(id) {
        if (!id) return null;
        // 숫자로 끝나는 ID 패턴 찾기 (예: "vehicle1", "company2", "item3")
        var match = id.match(/^(.+?)(\d+)$/);
        if (match) {
          return {
            prefix: match[1],
            number: parseInt(match[2], 10),
          };
        }
        return null;
      }
      /**
       * ID 업데이트 (재귀적으로 모든 하위 요소의 ID 업데이트)
       */
      function updateIds(element, oldId, newId) {
        if (!element || !oldId || !newId) return;
        // 요소 자체의 ID 업데이트
        if (element.id === oldId) {
          element.id = newId;
        }
        // name 속성 업데이트
        if (element.name === oldId) {
          element.name = newId;
        }
        // for 속성 업데이트 (label 등)
        if (element.getAttribute('for') === oldId) {
          element.setAttribute('for', newId);
        }
        // 하위 요소들도 재귀적으로 처리
        var allElements = element.querySelectorAll('*');
        for (var i = 0; i < allElements.length; i++) {
          var el = allElements[i];
          if (el.id === oldId) {
            el.id = newId;
          }
          if (el.name === oldId) {
            el.name = newId;
          }
          if (el.getAttribute('for') === oldId) {
            el.setAttribute('for', newId);
          }
        }
      }
      /**
       * th, td 쌍 생성 (첫 번째 쌍을 템플릿으로 사용)
       */
      function createVehiclePair(vehicleNumber, tableBox) {
        // 첫 번째 th, td 쌍을 템플릿으로 가져오기
        var template = getFirstPairTemplate(tableBox);
        if (!template) {
          console.error('템플릿을 찾을 수 없습니다. 첫 번째 th, td 쌍이 필요합니다.');
          return null;
        }
        // th 복제
        var thClone = template.th.cloneNode(true);
        // td 복제
        var tdClone = template.td.cloneNode(true);
        // th 내부 텍스트 업데이트 (호차 번호)
        var thSpan = thClone.querySelector('span');
        if (thSpan) {
          // 기존 텍스트에서 숫자 부분만 추출하여 교체
          var currentText = thSpan.textContent.trim();
          // 숫자 패턴 찾기 (예: "1호차", "1", "차량1" 등)
          var numberMatch = currentText.match(/(\d+)/);
          if (numberMatch) {
            // 숫자 부분만 새 번호로 교체
            thSpan.textContent = currentText.replace(/\d+/, vehicleNumber);
          } else {
            // 숫자가 없으면 템플릿의 원본 텍스트 유지 (다른 형식일 수 있음)
            // 필요시 여기서 추가 처리 가능
          }
        } else {
          // span이 없으면 th의 직접 텍스트 업데이트
          var currentText = thClone.textContent.trim();
          var numberMatch = currentText.match(/(\d+)/);
          if (numberMatch) {
            thClone.textContent = currentText.replace(/\d+/, vehicleNumber);
          }
        }
        // td 내부의 모든 ID 업데이트
        // 첫 번째 td에서 ID 패턴을 찾아서 동일한 패턴으로 업데이트
        var templateTd = template.td;
        var templateIds = templateTd.querySelectorAll('[id]');
        var idPatternMap = {}; // oldId -> newId 매핑
        // 템플릿에서 ID 패턴 추출
        for (var i = 0; i < templateIds.length; i++) {
          var templateId = templateIds[i].id;
          var pattern = extractIdPattern(templateId);
          if (pattern) {
            // 새 ID 생성 (예: vehicle1 -> vehicle5)
            var newId = pattern.prefix + vehicleNumber;
            idPatternMap[templateId] = newId;
          }
        }
        // 복제된 td의 모든 ID 업데이트
        var allIds = tdClone.querySelectorAll('[id]');
        for (var j = 0; j < allIds.length; j++) {
          var element = allIds[j];
          var oldId = element.id;
          if (oldId && idPatternMap[oldId]) {
            updateIds(tdClone, oldId, idPatternMap[oldId]);
          } else if (oldId) {
            // 직접 매핑이 없으면 패턴으로 찾기
            var pattern = extractIdPattern(oldId);
            if (pattern) {
              var newId = pattern.prefix + vehicleNumber;
              updateIds(tdClone, oldId, newId);
            }
          }
        }
        // name 속성도 업데이트 (동일한 패턴 적용)
        var templateNames = templateTd.querySelectorAll('[name]');
        var namePatternMap = {};
        for (var k = 0; k < templateNames.length; k++) {
          var templateName = templateNames[k].name;
          var pattern = extractIdPattern(templateName);
          if (pattern) {
            var newName = pattern.prefix + vehicleNumber;
            namePatternMap[templateName] = newName;
          }
        }
        var allNames = tdClone.querySelectorAll('[name]');
        for (var l = 0; l < allNames.length; l++) {
          var nameEl = allNames[l];
          var oldName = nameEl.name;
          if (oldName && namePatternMap[oldName]) {
            nameEl.name = namePatternMap[oldName];
          } else if (oldName) {
            var pattern = extractIdPattern(oldName);
            if (pattern) {
              nameEl.name = pattern.prefix + vehicleNumber;
            }
          }
        }
        // jQuery 드롭다운 인스턴스 데이터 제거
        if (typeof jQuery !== 'undefined' && typeof jQuery.fn.removeData === 'function') {
          jQuery(tdClone)
            .find('.field-dropdown')
            .each(function() {
              jQuery(this).removeData('dropdown-instance');
            });
        }
        // show 클래스 제거 (드롭다운이 열려있을 수 있음)
        var dropdowns = tdClone.querySelectorAll('.field-dropdown');
        for (var k = 0; k < dropdowns.length; k++) {
          dropdowns[k].classList.remove('show', 'reverse');
        }
        return {
          th: thClone,
          td: tdClone
        };
      }
      /**
       * Plus 버튼 클릭 핸들러
       */
      function handlePlusClick(tableBox) {
        console.log('handlePlusClick 호출됨', tableBox);
        if (!tableBox) {
          console.error('table-box-dynamic-vehicle을 찾을 수 없습니다.');
          return;
        }
        var tbody = tableBox.querySelector('table tbody');
        if (!tbody) {
          console.error('tbody를 찾을 수 없습니다.');
          return;
        }
        var rows = tbody.querySelectorAll('tr');
        console.log('현재 행 개수:', rows.length);
        var addedVehicleNumber;
        if (rows.length === 0) {
          // 첫 번째 행 생성
          console.log('첫 번째 행 생성');
          var newRow = document.createElement('tr');
          addedVehicleNumber = getNextVehicleNumber(tableBox);
          console.log('다음 호차 번호:', addedVehicleNumber);
          var pair = createVehiclePair(addedVehicleNumber, tableBox);
          if (!pair) {
            console.error('th, td 쌍 생성에 실패했습니다.');
            return;
          }
          console.log('th, td 쌍 생성 성공', pair);
          newRow.appendChild(pair.th);
          newRow.appendChild(pair.td);
          tbody.appendChild(newRow);
          console.log('행 추가 완료');
        } else {
          // 마지막 행 확인
          var lastRow = rows[rows.length - 1];
          var thsInLastRow = lastRow.querySelectorAll('th');
          var tdsInLastRow = lastRow.querySelectorAll('td');
          if (thsInLastRow.length < 2) {
            // 마지막 행에 추가
            addedVehicleNumber = getNextVehicleNumber(tableBox);
            var pair = createVehiclePair(addedVehicleNumber, tableBox);
            if (!pair) {
              console.error('th, td 쌍 생성에 실패했습니다.');
              return;
            }
            lastRow.appendChild(pair.th);
            lastRow.appendChild(pair.td);
          } else {
            // 새 행 생성
            var newRow = document.createElement('tr');
            addedVehicleNumber = getNextVehicleNumber(tableBox);
            var pair = createVehiclePair(addedVehicleNumber, tableBox);
            if (!pair) {
              console.error('th, td 쌍 생성에 실패했습니다.');
              return;
            }
            newRow.appendChild(pair.th);
            newRow.appendChild(pair.td);
            tbody.appendChild(newRow);
          }
        }
        // 드롭다운 초기화 (jQuery 플러그인 사용)
        if (typeof jQuery !== 'undefined' && typeof jQuery.fn.dropdown === 'function') {
          // 약간의 지연을 두어 DOM이 완전히 추가된 후 초기화
          setTimeout(function() {
            // 새로 추가된 행에서 드롭다운 찾기
            var tbody = tableBox.querySelector('table tbody');
            var newRow = tbody.querySelector('tr:last-child');
            if (newRow) {
              var $newDropdowns = jQuery(newRow).find('.field-dropdown');
              $newDropdowns.each(function() {
                var $dropdown = jQuery(this);
                // 기존 인스턴스 데이터 제거 (복제 시 함께 복제된 데이터 제거)
                $dropdown.removeData('dropdown-instance');
                // show 클래스 제거 (열려있을 수 있음)
                $dropdown.removeClass('show reverse');
                // 드롭다운 초기화
                $dropdown.dropdown();
              });
            }
          }, 10);
        }
      }
      /**
       * Minus 버튼 클릭 핸들러
       */
      function handleMinusClick(tableBox) {
        if (!tableBox) return;
        var tbody = tableBox.querySelector('table tbody');
        var rows = tbody.querySelectorAll('tr');
        if (rows.length === 0) return;
        // 전체 th, td 쌍 개수 확인
        var totalPairs = 0;
        for (var i = 0; i < rows.length; i++) {
          totalPairs += rows[i].querySelectorAll('th').length;
        }
        // 최소 1개는 유지
        if (totalPairs <= 1) {
          alert('최소 하나의 행은 유지되어야 합니다.');
          return;
        }
        // 마지막 행에서 제거
        var lastRow = rows[rows.length - 1];
        var thsInLastRow = lastRow.querySelectorAll('th');
        var tdsInLastRow = lastRow.querySelectorAll('td');
        if (thsInLastRow.length > 0 && tdsInLastRow.length > 0) {
          // 마지막 th, td 제거
          lastRow.removeChild(thsInLastRow[thsInLastRow.length - 1]);
          lastRow.removeChild(tdsInLastRow[tdsInLastRow.length - 1]);
          // 행이 비어있으면 행 자체 제거
          if (lastRow.querySelectorAll('th').length === 0) {
            tbody.removeChild(lastRow);
          }
        }
      }
      /**
       * 초기화
       */
      function init() {
        console.log('동적 테이블 초기화 시작');
        // 이벤트 위임을 사용하여 동적으로 추가된 버튼도 처리 가능하도록
        document.addEventListener('click', function(e) {
          // 모든 클릭 이벤트 로그 (디버깅용)
          // console.log('클릭 이벤트:', e.target, e.target.className, e.target.classList);
          // Plus 버튼 클릭 - 더 넓은 범위로 검색
          var clickedElement = e.target;
          var isPlus =
            clickedElement.classList.contains('btn-plus') ||
            clickedElement.classList.contains('icon-plus') ||
            clickedElement.closest('.btn-plus') ||
            (clickedElement.tagName === 'BUTTON' && clickedElement.querySelector('.icon-plus'));
          if (isPlus) {
            var btn = clickedElement.closest('.btn-plus') || (clickedElement.classList.contains('icon-plus') ? clickedElement.closest('button') : clickedElement);
            if (btn) {
              var tableBox = btn.closest('.table-box-dynamic-vehicle');
              if (tableBox) {
                e.preventDefault();
                e.stopPropagation();
                console.log('Plus 버튼 클릭됨', tableBox);
                handlePlusClick(tableBox);
                return;
              } else {
                console.log('table-box-dynamic-vehicle을 찾을 수 없음', btn);
              }
            }
          }
          // Minus 버튼 클릭
          var isMinus =
            clickedElement.classList.contains('btn-minus') ||
            clickedElement.classList.contains('icon-minus') ||
            clickedElement.closest('.btn-minus') ||
            (clickedElement.tagName === 'BUTTON' && clickedElement.querySelector('.icon-minus'));
          if (isMinus) {
            var btn = clickedElement.closest('.btn-minus') || (clickedElement.classList.contains('icon-minus') ? clickedElement.closest('button') : clickedElement);
            if (btn) {
              var tableBox = btn.closest('.table-box-dynamic-vehicle');
              if (tableBox) {
                e.preventDefault();
                e.stopPropagation();
                console.log('Minus 버튼 클릭됨', tableBox);
                handleMinusClick(tableBox);
                return;
              } else {
                console.log('table-box-dynamic-vehicle을 찾을 수 없음', btn);
              }
            }
          }
        });
        // 직접 버튼에 이벤트 바인딩 (백업)
        setTimeout(function() {
          var plusButtons = document.querySelectorAll('.table-box-dynamic-vehicle .btn-plus');
          var minusButtons = document.querySelectorAll('.table-box-dynamic-vehicle .btn-minus');
          console.log('직접 바인딩 시도 - Plus 버튼:', plusButtons.length, 'Minus 버튼:', minusButtons.length);
          for (var i = 0; i < plusButtons.length; i++) {
            plusButtons[i].addEventListener('click', function(e) {
              e.preventDefault();
              e.stopPropagation();
              var tableBox = this.closest('.table-box-dynamic-vehicle');
              if (tableBox) {
                console.log('직접 바인딩된 Plus 버튼 클릭됨');
                handlePlusClick(tableBox);
              }
            });
          }
          for (var j = 0; j < minusButtons.length; j++) {
            minusButtons[j].addEventListener('click', function(e) {
              e.preventDefault();
              e.stopPropagation();
              var tableBox = this.closest('.table-box-dynamic-vehicle');
              if (tableBox) {
                console.log('직접 바인딩된 Minus 버튼 클릭됨');
                handleMinusClick(tableBox);
              }
            });
          }
        }, 100);
      }
      // DOM 로드 완료 후 초기화
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
      // 모달이 열릴 때도 초기화 (모달이 동적으로 로드되는 경우 대비)
      var modalElement = document.getElementById('modal-dispatch');
      if (modalElement) {
        // MutationObserver로 모달의 display 속성 변경 감지
        var observer = new MutationObserver(function(mutations) {
          mutations.forEach(function(mutation) {
            if (mutation.type === 'attributes' && mutation.attributeName === 'style') {
              var display = window.getComputedStyle(modalElement).display;
              if (display === 'block' || display !== 'none') {
                // 모달이 열렸을 때 이벤트가 제대로 바인딩되었는지 확인
                console.log('모달이 열림, 이벤트 바인딩 확인');
              }
            }
          });
        });
        observer.observe(modalElement, {
          attributes: true,
          attributeFilter: ['style']
        });
      }
    })();
  </script>
