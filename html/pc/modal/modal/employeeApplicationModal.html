  <title>귀성 신청자 관리 - 임직원 신청 정보 팝업</title>
  <script type="text/javascript">
    // jqGride Local Data
    const _JQ_GRID_DATA = [{
        round: '1',
        totalReservations: '6',
        availableCapacity: '24',
        changeVehicleBtn: false,
      },
      {
        round: '2',
        totalReservations: '20',
        availableCapacity: '10',
        changeVehicleBtn: true,
      },
      {
        round: '3',
        totalReservations: '26',
        availableCapacity: '4',
        changeVehicleBtn: false,
      },
      {
        round: '4',
        totalReservations: '30',
        availableCapacity: '0',
        changeVehicleBtn: false,
      },
    ];
    $(document).ready(function() {
      setPageDefault();
      initCalendarDatePicker();
      // jqGrid 높이 계산 및 리사이즈 설정 (공통 함수 사용)
      setupJqGridResize({
        containerSelector: '#div_list',
        gridSelector: '#list',
      });
      // 초기 로딩 시 그리드 너비 설정
      $(window).resize(function() {
        $('#list').setGridWidth($('#div_list').width(), true);
        // resize 시 높이 고정 (행 10개의 높이)
        $('#list').jqGrid('setGridHeight', 170);
      });
      // 초기 로딩 시 한 번 실행
      setTimeout(function() {
        $('#list').setGridWidth($('#div_list').width(), true);
      }, 100);
      // 모달이 열릴 때 jqGrid 다시 그리기
      var modalEl = $('#modal-employee-application');
      if (modalEl.length) {
        // MutationObserver로 모달의 display 속성 변경 감지
        var observer = new MutationObserver(function(mutations) {
          mutations.forEach(function(mutation) {
            if (mutation.type === 'attributes' && mutation.attributeName === 'style') {
              var display = modalEl.css('display');
              if (display === 'block') {
                // 모달이 열렸을 때 그리드 다시 그리기
                setTimeout(function() {
                  listLoad(false, 1);
                  // 모달이 열릴 때 높이 재설정
                  $('#list').jqGrid('setGridHeight', 170);
                }, 50);
              }
            }
          });
        });
        observer.observe(modalEl[0], {
          attributes: true,
          attributeFilter: ['style']
        });
      }
    });

    function setPageDefault() {
      listLoad(false, 1);
    }
    // 달력 datepicker 초기화
    function initCalendarDatePicker() {
      if (typeof $.fn.datepicker !== 'undefined') {
        var $datepicker = $('#calendarDatePicker');
        if ($datepicker.length && !$datepicker.data('datepicker')) {
          $datepicker.datepicker({
            language: 'ko',
            format: 'yyyy.mm.dd',
            todayBtn: false,
            todayHighlight: true,
            clearBtn: false,
            autoclose: false,
            maxViewMode: 2,
            templates: {
              leftArrow: '<i class="icon icon-arrow-left"></i>',
              rightArrow: '<i class="icon icon-arrow-right"></i>',
            },
            beforeShowDay: function(date) {
              // 주말 및 공휴일 처리
              var day = date.getDay();
              var isWeekend = day === 0 || day === 6; // 일요일(0) 또는 토요일(6)
              return {
                classes: isWeekend ? 'weekend' : '',
                tooltip: '',
                enabled: true,
              };
            },
          });
          // 날짜 선택 이벤트
          $datepicker.on('changeDate', function(e) {
            var selectedDate = e.date;
            // 선택된 날짜로 데이터 필터링 및 새로고침
            // listLoad(false, 1);
          });
        }
      } else {
        setTimeout(initCalendarDatePicker, 100);
      }
    }

    function listLoad(firstNoLoad, page) {
      // jqGrid 리스트 초기화, 생성
      $('#list').jqGrid('GridUnload');
      var grid = jQuery('#list');
      // 데이터가 없거나 부족할 때 빈 행 추가
      var displayData = _JQ_GRID_DATA || [];
      var emptyRow = {
        round: '',
        totalReservations: '',
        availableCapacity: '',
        changeVehicleBtn: false,
        isEmpty: true,
      };
      while (displayData.length < 5) {
        // 보여질 최대 행 수
        displayData.push(Object.assign({}, emptyRow));
      }
      // 초기 높이 계산 (공통 함수 사용)
      var initialHeight = calculateJqGridHeight({
        containerSelector: '#div_list',
        headerSelector: '.data-list-table-header',
        footerSelector: '.data-list-table-footer',
        padding: 56,
      });
      grid.jqGrid({
        datatype: 'local',
        data: displayData,
        colNames: ['호차', '총 예약수', '가능 인원 수', '탑승 차량 변경'],
        colModel: [{
            name: 'round',
            index: 'round',
            width: 55,
            align: 'center',
            sortable: false
          },
          {
            name: 'totalReservations',
            index: 'totalReservations',
            width: 247,
            align: 'center',
            sortable: false
          },
          {
            name: 'availableCapacity',
            index: 'availableCapacity',
            width: 248,
            align: 'center',
            sortable: false
          },
          {
            name: 'changeVehicleBtn',
            index: 'changeVehicleBtn',
            width: 140,
            align: 'center',
            sortable: false,
            formatter: changeVehicleBtnFormatter
          },
        ],
        sortable: false,
        rowNum: 999, // 최대 행 수
        autowidth: true,
        scrollRows: true,
        scroll: true,
        loadonce: true,
        viewrecords: true,
        // multiselect: true,
        // multiselectWidth: 43,
        // multiboxonly: false,
        // height: initialHeight,
        height: 170, //행 5개의 높이
        scrollTimeout: 1,
        shrinkToFit: true,
        forceFit: false,
        scrollOffset: 0,
        beforeSelectRow: function(rowid, e) {
          var rowData = grid.jqGrid('getRowData', rowid);
          // 빈 행은 선택 불가능
          if (rowData.isEmpty === 'true' || !rowData.round) {
            return false;
          }
          return true;
        },
        loadComplete: function(data) {
          // 그리드 높이 재계산 (레이아웃 완료 후)
          setTimeout(function() {
            // var recalculatedHeight = calculateJqGridHeight({
            //   containerSelector: '#div_list',
            //   headerSelector: '.data-list-table-header',
            //   footerSelector: '.data-list-table-footer',
            //   padding: 56,
            // });
            var recalculatedHeight = 170; // 행 10개의 높이
            grid.jqGrid('setGridHeight', recalculatedHeight);
          }, 0);
          // 빈 행 처리
          var ids = grid.jqGrid('getDataIDs');
          for (var i = 0; i < ids.length; i++) {
            var rowData = grid.jqGrid('getRowData', ids[i]);
            if (rowData.isEmpty === 'true' || !rowData.round) {
              // 빈 행의 체크박스 비활성화 및 숨김
              var checkbox = grid.find('tr#' + ids[i] + ' input[type="checkbox"]');
              checkbox.prop('disabled', true).hide();
              // 빈 행에 클래스 추가
              grid.find('tr#' + ids[i]).addClass('empty-row');
              // 빈 행의 모든 셀 내용 제거
              grid
                .find('tr#' + ids[i] + ' td')
                .not(':first')
                .html('');
            }
          }
          // 스크롤 여부 확인 후 .ui-jqgrid-bdiv 너비 조정
          setTimeout(function() {
            adjustBdivWidth(grid);
          }, 0);
        },
      });
    }

    function changeVehicleBtnFormatter(cellvalue, options, rowObject) {
      if (rowObject.changeVehicleBtn === true || rowObject.changeVehicleBtn === 'true') {
        return `<button type="button" class="btn btn-white btn-small" onclick="">
              <span>선택</span>
            </button>`;
      }
      return `<button type="button" class="btn btn-white btn-small" onclick="" disabled>
              <span>선택</span>
            </button>`;
    }
  </script>
</head>
