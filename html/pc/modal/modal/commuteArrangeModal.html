      $(window).resize(function() {
        $('#list').setGridWidth($('#div_list').width(), true);

        $('#list').jqGrid('setGridHeight', 136);

          $('#list2').setGridWidth($('#div_list2').width(), true);

        }
      });
      // 초기 로딩 시 한 번 실행
      setTimeout(function() {
        $('#list').setGridWidth($('#div_list').width(), true);
      }, 100);
      // 모달이 열릴 때 jqGrid 다시 그리기
      var modalEl = $('#modal-commute-arrange');
      var isModalOpen = false; // 모달 열림 상태 추적
      if (modalEl.length) {
        // MutationObserver로 모달의 display 속성 변경 감지
        var observer = new MutationObserver(function(mutations) {
          mutations.forEach(function(mutation) {
            if (mutation.type === 'attributes' && mutation.attributeName === 'style') {
              var display = modalEl.css('display');
              var wasOpen = isModalOpen;
              isModalOpen = display === 'block';
              // 모달이 닫혔다가 열릴 때만 처리 (중복 호출 방지)
              if (isModalOpen && !wasOpen) {
                // 모달이 열렸을 때 그리드 다시 그리기
                setTimeout(function() {
                  listLoad(false, 1);
                  // 모달이 열릴 때 높이 재설정
                  $('#list').jqGrid('setGridHeight', 136);
                  // #list2 그리드 초기화 (모달이 열렸을 때만, 한 번만)
                  initDispatchHistoryGrid();
                  // 그리드 너비 설정
                  if ($('#list2').length) {
                    $('#list2').setGridWidth($('#div_list2').width(), true);
                    adjustBdivWidth($('#list2'));
                  }
                }, 100);
              }
            }
          });
        });
        observer.observe(modalEl[0], {
          attributes: true,
          attributeFilter: ['style']
        });
      }
    });

    function setPageDefault() {
      listLoad(false, 1);
    }
    // 스크롤 여부 확인 후 .ui-jqgrid-bdiv 너비 조정
    function adjustBdivWidth(grid) {
      var $bdiv = grid.closest('.ui-jqgrid-bdiv');
      if ($bdiv.length && $bdiv[0]) {
        var hasScroll = $bdiv[0].scrollHeight > $bdiv[0].clientHeight;
        if (hasScroll) {
          $bdiv.css('width', 'calc(100% + 12px)');
        } else {
          $bdiv.css('width', '');
        }
      }
    }
    // 달력 datepicker 초기화
    function initCalendarDatePicker() {
      if (typeof $.fn.datepicker !== 'undefined') {
        var $datepicker = $('#calendarDatePicker');
        if ($datepicker.length && !$datepicker.data('datepicker')) {
          $datepicker.datepicker({
            language: 'ko',
            format: 'yyyy.mm.dd',
            todayBtn: false,
            todayHighlight: true,
            clearBtn: false,
            autoclose: false,
            maxViewMode: 2,
            templates: {
              leftArrow: '<i class="icon icon-arrow-left"></i>',
              rightArrow: '<i class="icon icon-arrow-right"></i>',
            },
            beforeShowDay: function(date) {
              // 주말 및 공휴일 처리
              var day = date.getDay();
              var isWeekend = day === 0 || day === 6; // 일요일(0) 또는 토요일(6)
              return {
                classes: isWeekend ? 'weekend' : '',
                tooltip: '',
                enabled: true,
              };
            },
          });
          // 날짜 선택 이벤트

    function listLoad(firstNoLoad, page) {
      // jqGrid 리스트 초기화, 생성
      $('#list').jqGrid('GridUnload');

      // 데이터가 없거나 부족할 때 빈 행 추가
      var displayData = _JQ_GRID_DATA || [];
      var emptyRow = {
        company: '',
        vehicleNumber: '',
        terminalId: '',
        driverName: '',
        contact: '',
        vehicleYear: '',
        capacity: '',
        isEmpty: true,
      };
      while (displayData.length < 10) {
        // 보여질 최대 행 수
        displayData.push(Object.assign({}, emptyRow));
      }
      // 초기 높이 계산 (공통 함수 사용)
      var initialHeight = calculateJqGridHeight({
        containerSelector: '#div_list',
        headerSelector: '.data-list-table-header',
        footerSelector: '.data-list-table-footer',
        padding: 56,
      });
      grid.jqGrid({
        datatype: 'local',
        data: displayData,
        colNames: ['운수사', '차량번호', '단말기 ID', '운전자명', '연락처', '차량연식', '인승', '배차선택'],
        colModel: [{
            name: 'company',
            index: 'company',
            width: 90,
            align: 'center',
            sortable: false
          },
          {
            name: 'vehicleNumber',
            index: 'vehicleNumber',
            width: 104,
            align: 'center',
            sortable: false
          },
          {
            name: 'terminalId',
            index: 'terminalId',
            width: 91,
            align: 'center',
            sortable: false
          },
          {
            name: 'driverName',
            index: 'driverName',
            width: 72,
            align: 'center',
            sortable: false
          },
          {
            name: 'contact',
            index: 'contact',
            width: 112,
            align: 'center',
            sortable: false
          },
          {
            name: 'vehicleYear',
            index: 'vehicleYear',
            width: 91,
            align: 'center',
            sortable: false
          },
          {
            name: 'capacity',
            index: 'capacity',
            width: 64,
            align: 'center',
            sortable: false
          },
          {
            name: 'dispatchBtn',
            index: 'dispatchBtn',
            width: 91,
            align: 'center',
            sortable: false,
            formatter: dispatchBtnFormatter
          },
        ],
        sortable: false,
        rowNum: 999, // 최대 행 수
        autowidth: true,
        scrollRows: true,
        scroll: true,
        loadonce: true,
        viewrecords: true,
        // multiselect: true,
        // multiselectWidth: 43,
        // multiboxonly: false,
        // height: initialHeight,
        height: 204, //행 6개의 높이
        scrollTimeout: 1,
        shrinkToFit: true,
        forceFit: false,
        scrollOffset: 0,
        beforeSelectRow: function(rowid, e) {
          var rowData = grid.jqGrid('getRowData', rowid);
          // 빈 행은 선택 불가능
          if (rowData.isEmpty === 'true' || !rowData.vehicleNumber) {
            return false;
          }
          return true;
        },
        loadComplete: function(data) {
          // 그리드 높이 재계산 (레이아웃 완료 후)
          setTimeout(function() {
            // var recalculatedHeight = calculateJqGridHeight({
            //   containerSelector: '#div_list',
            //   headerSelector: '.data-list-table-header',
            //   footerSelector: '.data-list-table-footer',
            //   padding: 56,
            // });
            var recalculatedHeight = 204; // 행 6개의 높이
            grid.jqGrid('setGridHeight', recalculatedHeight);
          }, 0);
          // 빈 행 처리
          var ids = grid.jqGrid('getDataIDs');
          for (var i = 0; i < ids.length; i++) {
            var rowData = grid.jqGrid('getRowData', ids[i]);
            if (rowData.isEmpty === 'true' || !rowData.vehicleNumber) {
              // 빈 행의 체크박스 비활성화 및 숨김
              var checkbox = grid.find('tr#' + ids[i] + ' input[type="checkbox"]');
              checkbox.prop('disabled', true).hide();
              // 빈 행에 클래스 추가
              grid.find('tr#' + ids[i]).addClass('empty-row');
              // 빈 행의 모든 셀 내용 제거
              grid
                .find('tr#' + ids[i] + ' td')
                .not(':first')
                .html('');
            }
          }
          // 스크롤 여부 확인 후 .ui-jqgrid-bdiv 너비 조정
          setTimeout(function() {
            adjustBdivWidth(grid);
          }, 0);
        },
      });
    }

    function dispatchBtnFormatter(cellvalue, options, rowObject) {
      if (rowObject.dispatchBtn === '배차') {
        return `<button type="button" class="btn btn-white btn-small" onclick="">
              <span>배차</span>
            </button>`;
      }
      if (rowObject.dispatchBtn === '배차중') {
        return `<button type="button" class="btn btn-white btn-small" onclick="" disabled>
              <span>배차중</span>
            </button>`;
      }
      return '';
    }

    function initDispatchHistoryGrid() {
      // jqGrid 리스트 초기화, 생성
      const $wrap = $('#div_list2');
      var grid = jQuery('#list2');
      if (grid.length === 0) return;
      // 그리드가 이미 초기화되어 있으면 재초기화하지 않음 (중복 방지)
      if (grid[0] && grid[0].grid) {
        // 이미 초기화되어 있으면 너비만 조정
        setTimeout(function() {
          grid.setGridWidth($('#div_list2').width(), true);
          adjustBdivWidth(grid);
        }, 0);
        return;
      }
      // 그리드가 초기화되지 않았을 때만 언로드 시도
      try {
        if (grid[0] && grid[0].grid) {
          grid.jqGrid('GridUnload');
        }
      } catch (e) {
        // 그리드가 이미 언로드되었거나 존재하지 않는 경우 무시
      }
      // 데이터 준비
      var displayData = _JQ_GRID_DATA_DISPATCH_HISTORY ? [..._JQ_GRID_DATA_DISPATCH_HISTORY] : [];
      grid.jqGrid({
        datatype: 'local',
        data: displayData,
        colNames: ['차량번호', '운행시간', '노선명', '운행구분'],
        colModel: [{
            name: 'vehicleNumber',
            index: 'vehicleNumber',
            width: 120,
            align: 'center',
            sortable: false
          },
          {
            name: 'operationTime',
            index: 'operationTime',
            width: 120,
            align: 'center',
            sortable: false
          },
          {
            name: 'routeName',
            index: 'routeName',
            width: 375,
            align: 'left',
            sortable: false
          },
          {
            name: 'operationType',
            index: 'operationType',
            width: 100,
            align: 'center',
            sortable: false
          },
        ],
        sortable: false,
        rowNum: 10000, // 모든 행 표시
        autowidth: true,
        scrollRows: false,
        scroll: true,
        loadonce: true,
        viewrecords: false,
        height: 136,
        scrollTimeout: 1,
        shrinkToFit: true,
        forceFit: true,
        scrollOffset: 0,
        loadComplete: function(data) {
          // 그리드 너비 설정
          setTimeout(function() {
            grid.setGridWidth($('#div_list2').width(), true);
          }, 0);
          // 불필요한 wrapper div 제거
          var $bdiv = grid.closest('.ui-jqgrid-bdiv');
          if ($bdiv.length) {
            var $wrapper = $bdiv.find('> div[style*="position:relative"]');
            if ($wrapper.length) {
              var $emptyDiv = $wrapper.find('> div:empty');
              if ($emptyDiv.length) {
                $emptyDiv.remove();
              }
              // table을 직접 bdiv의 자식으로 이동
              var $table = $wrapper.find('table');
              if ($table.length) {
                $table.detach();
                $wrapper.replaceWith($table);
              }
            }
          }
          // 스크롤 여부 확인 후 .ui-jqgrid-bdiv 너비 조정
          setTimeout(function() {
            adjustBdivWidth(grid);
          }, 0);
          // 빈 행 처리
          var ids = grid.jqGrid('getDataIDs');
          for (var i = 0; i < ids.length; i++) {
            var rowData = grid.jqGrid('getRowData', ids[i]);
            if (rowData.isEmpty === 'true' || (!rowData.vehicleNumber && !rowData.operationTime && !rowData.routeName && !rowData.operationType)) {
              // 빈 행에 클래스 추가
              grid.find('tr#' + ids[i]).addClass('empty-row');
              // 빈 행의 모든 셀 내용 제거
              grid.find('tr#' + ids[i] + ' td').html('');
            }
          }
        },
      });
    }
  </script>
