      calculateJqGridHeight({
        initialHeight: 262,
        maxHeight: 262,
        minHeight: 262,
      });
      // 모달이 열릴 때 jqGrid 다시 그리기
      var modalEl = $('#modal-reservation-status');
      if (modalEl.length) {
        // MutationObserver로 모달의 display 속성 변경 감지
        var observer = new MutationObserver(function(mutations) {
          mutations.forEach(function(mutation) {
            if (mutation.type === 'attributes' && mutation.attributeName === 'style') {
              var display = modalEl.css('display');
              if (display === 'block') {
                // 모달이 열렸을 때 그리드 다시 그리기
                setTimeout(function() {
                  listLoad(false, 1);
                }, 50);
              }
            }
          });
        });
        observer.observe(modalEl[0], {
          attributes: true,
          attributeFilter: ['style']
        });
      }
    });

    function setPageDefault() {
      listLoad(false, 1);
    }

    function listLoad(firstNoLoad, page) {
      // jqGrid 리스트 초기화, 생성
      $('#list').jqGrid('GridUnload');
      var grid = jQuery('#list');
      // 데이터가 없거나 부족할 때 빈 행 추가
      var displayData = _JQ_GRID_DATA ? [..._JQ_GRID_DATA] : [];

      var initialHeight = calculateJqGridHeight ?

          initialHeight: 262,
          maxHeight: 262,
          minHeight: 262,
        }) :
        'auto';
      grid.jqGrid({
        datatype: 'local',
        data: displayData,
        colNames: ['순번', '수신번호', '발신번호', '내용', '전송날짜', '전송시간', '결과'],

            name: 'rownum',
            index: 'rownum',
            width: 60,
            align: 'center',
            sortable: false
          },

            name: 'recipientNumber',
            index: 'recipientNumber',
            width: 112,
            align: 'center',
            sortable: false
          },
          {
            name: 'senderNumber',
            index: 'senderNumber',
            width: 110,
            align: 'center',
            sortable: false
          },

            name: 'content',
            index: 'content',
            width: 252,
            align: 'center',

              var content = cellvalue.replace(/\n/g, '<br>');
              return '<div class="scroll-content">' + content + '</div>';
            },
          },
          {
            name: 'sendDate',
            index: 'sendDate',
            width: 72,
            align: 'center',
            sortable: false
          },
          {
            name: 'sendTime',
            index: 'sendTime',
            width: 72,
            align: 'center',
            sortable: false
          },
          {
            name: 'result',
            index: 'result',
            width: 64,
            align: 'center',
            sortable: false
          },

        sortable: false,
        // rowNum: 'auto',
        autowidth: true,
        scrollRows: false,
        scroll: false,
        loadonce: true,
        viewrecords: true,
        multiboxonly: false,
        height: initialHeight,
        scrollTimeout: 1,
        shrinkToFit: true,
        forceFit: true,
        scrollOffset: 0,
        beforeSelectRow: function(rowid, e) {
          var rowData = grid.jqGrid('getRowData', rowid);
          // 빈 행은 선택 불가능
          if (rowData.isEmpty === 'true' || (!rowData.rownum && !rowData.recipientNumber && !rowData.senderNumber && !rowData.content && !rowData.sendDate && !rowData.sendTime && !rowData.result)) {
            return false;
          }
          return true;
        },
        loadComplete: function(data) {
          // 빈 행 처리
          var ids = grid.jqGrid('getDataIDs');
          for (var i = 0; i < ids.length; i++) {
            var rowData = grid.jqGrid('getRowData', ids[i]);
            if (
              rowData.isEmpty === 'true' ||
              (!rowData.rownum && !rowData.recipientNumber && !rowData.senderNumber && !rowData.content && !rowData.sendDate && !rowData.sendTime && !rowData.result)
            ) {
              // 빈 행의 체크박스 비활성화 및 숨김
              var checkbox = grid.find('tr#' + ids[i] + ' input[type="checkbox"]');
              checkbox.prop('disabled', true).hide();
              // 빈 행에 클래스 추가
              grid.find('tr#' + ids[i]).addClass('empty-row');
              // 빈 행의 모든 셀 내용 제거
              grid
                .find('tr#' + ids[i] + ' td')
                .not(':first')
                .html('');
            }
          }
          // 스크롤 여부 확인 후 .ui-jqgrid-bdiv 너비 조정
          setTimeout(function() {
            adjustBdivWidth(grid);
          }, 0);
        },
      });
    }
