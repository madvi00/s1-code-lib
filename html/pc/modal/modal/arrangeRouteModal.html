  <script type="text/javascript">
    // jqGride Local Data
    const _JQ_GRID_DATA = [{
        rownum: '10',
        applicant: '이수일',
        adultReservations: '1',
        childReservations: '0',
        affiliation: 'DS부문',
      },
      {
        rownum: '9',
        applicant: '박광제',
        adultReservations: '1',
        childReservations: '1',
        affiliation: 'DS부문',
      },
      {
        rownum: '8',
        applicant: '김종섭',
        adultReservations: '3',
        childReservations: '1',
        affiliation: 'DS부문',
      },
      {
        rownum: '7',
        applicant: '박재명',
        adultReservations: '1',
        childReservations: '3',
        affiliation: '삼성SDI',
      },
      {
        rownum: '6',
        applicant: '박재명',
        adultReservations: '1',
        childReservations: '3',
        affiliation: '삼성SDI',
      },
      {
        rownum: '5',
        applicant: '박재명',
        adultReservations: '1',
        childReservations: '3',
        affiliation: '삼성SDI',
      },
    ];
    $(document).ready(function() {
      setPageDefault();
      initCalendarDatePicker();
      // jqGrid 높이 계산 및 리사이즈 설정 (공통 함수 사용)
      setupJqGridResize({
        containerSelector: '#div_list',
        gridSelector: '#list',
      });
      // 초기 로딩 시 그리드 너비 설정
      $(window).resize(function() {
        $('#list').setGridWidth($('#div_list').width(), true);
        // resize 시 높이 고정 (행 4개의 높이)
        $('#list').jqGrid('setGridHeight', 136);
      });
      // 초기 로딩 시 한 번 실행
      setTimeout(function() {
        $('#list').setGridWidth($('#div_list').width(), true);
      }, 100);
      // 모달이 열릴 때 jqGrid 다시 그리기
      var modalEl = $('#modal-arrange');
      if (modalEl.length) {
        // MutationObserver로 모달의 display 속성 변경 감지
        var observer = new MutationObserver(function(mutations) {
          mutations.forEach(function(mutation) {
            if (mutation.type === 'attributes' && mutation.attributeName === 'style') {
              var display = modalEl.css('display');
              if (display === 'block') {
                // 모달이 열렸을 때 그리드 다시 그리기
                setTimeout(function() {
                  listLoad(false, 1);
                  // 모달이 열릴 때 높이 재설정
                  $('#list').jqGrid('setGridHeight', 136);
                }, 50);
              }
            }
          });
        });
        observer.observe(modalEl[0], {
          attributes: true,
          attributeFilter: ['style']
        });
      }
    });

    function setPageDefault() {
      listLoad(false, 1);
    }
    // 달력 datepicker 초기화
    function initCalendarDatePicker() {
      if (typeof $.fn.datepicker !== 'undefined') {
        var $datepicker = $('#calendarDatePicker');
        if ($datepicker.length && !$datepicker.data('datepicker')) {
          $datepicker.datepicker({
            language: 'ko',
            format: 'yyyy.mm.dd',
            todayBtn: false,
            todayHighlight: true,
            clearBtn: false,
            autoclose: false,
            maxViewMode: 2,
            templates: {
              leftArrow: '<i class="icon icon-arrow-left"></i>',
              rightArrow: '<i class="icon icon-arrow-right"></i>',
            },
            beforeShowDay: function(date) {
              // 주말 및 공휴일 처리
              var day = date.getDay();
              var isWeekend = day === 0 || day === 6; // 일요일(0) 또는 토요일(6)
              return {
                classes: isWeekend ? 'weekend' : '',
                tooltip: '',
                enabled: true,
              };
            },
          });
          // 날짜 선택 이벤트
          $datepicker.on('changeDate', function(e) {
            var selectedDate = e.date;
            // 선택된 날짜로 데이터 필터링 및 새로고침
            // listLoad(false, 1);
          });
        }
      } else {
        setTimeout(initCalendarDatePicker, 100);
      }
    }

    function listLoad(firstNoLoad, page) {
      // jqGrid 리스트 초기화, 생성
      $('#list').jqGrid('GridUnload');
      var grid = jQuery('#list');
      // 데이터가 없거나 부족할 때 빈 행 추가
      var displayData = _JQ_GRID_DATA || [];
      var emptyRow = {
        rownum: '',
        applicant: '',
        adultReservations: '',
        childReservations: '',
        affiliation: '',
        isEmpty: true,
      };
      while (displayData.length < 4) {
        // 보여질 최대 행 수
        displayData.push(Object.assign({}, emptyRow));
      }
      // 초기 높이 계산 (공통 함수 사용)
      var initialHeight = calculateJqGridHeight({
        containerSelector: '#div_list',
        headerSelector: '.data-list-table-header',
        footerSelector: '.data-list-table-footer',
        padding: 56,
      });
      grid.jqGrid({
        datatype: 'local',
        data: displayData,
        colNames: ['순번', '신청자', '총', '소인', '대인', '소속'],
        colModel: [{
            name: 'rownum',
            index: 'rownum',
            width: 40,
            align: 'center',
            sortable: false
          },
          {
            name: 'applicant',
            index: 'applicant',
            width: 72,
            align: 'center',
            sortable: false
          },
          {
            name: 'totalReservations',
            index: 'totalReservations',
            width: 40,
            align: 'center',
            sortable: false,
            formatter: function(cellvalue, options, rowObject) {
              if (rowObject.adultReservations !== undefined && rowObject.childReservations !== undefined) {
                var adult = parseInt(rowObject.adultReservations) || 0;
                var child = parseInt(rowObject.childReservations) || 0;
                return adult + child;
              }
              return '';
            },
          },
          {
            name: 'childReservations',
            index: 'childReservations',
            width: 40,
            align: 'center',
            sortable: false,
            formatter: function(cellvalue) {
              return cellvalue || '';
            },
          },
          {
            name: 'adultReservations',
            index: 'adultReservations',
            width: 40,
            align: 'center',
            sortable: false,
            formatter: function(cellvalue) {
              return cellvalue || '';
            },
          },
          {
            name: 'affiliation',
            index: 'affiliation',
            width: 100,
            align: 'center',
            sortable: false
          },
        ],
        sortable: false,
        rowNum: 999, // 최대 행 수
        autowidth: true,
        scrollRows: true,
        scroll: true,
        loadonce: true,
        viewrecords: true,
        // multiselect: true,
        // multiselectWidth: 43,
        // multiboxonly: false,
        // height: initialHeight,
        height: 136, //행 4개의 높이
        scrollTimeout: 1,
        shrinkToFit: true,
        forceFit: false,
        scrollOffset: 0,
        beforeSelectRow: function(rowid, e) {
          var rowData = grid.jqGrid('getRowData', rowid);
          // 빈 행은 선택 불가능
          if (rowData.isEmpty === 'true' || !rowData.rownum) {
            return false;
          }
          return true;
        },
        loadComplete: function(data) {
          // 그리드 높이 재계산 (레이아웃 완료 후)
          setTimeout(function() {
            // var recalculatedHeight = calculateJqGridHeight({
            //   containerSelector: '#div_list',
            //   headerSelector: '.data-list-table-header',
            //   footerSelector: '.data-list-table-footer',
            //   padding: 56,
            // });
            var recalculatedHeight = 136; // 행 4개의 높이
            grid.jqGrid('setGridHeight', recalculatedHeight);
          }, 0);
          // 그룹 헤더 설정
          grid.jqGrid('setGroupHeaders', {
            useColSpanStyle: true,
            groupHeaders: [{
              startColumnName: 'totalReservations',
              numberOfColumns: 3,
              titleText: '신청매수',
            }, ],
          });
          // 빈 행 처리
          var ids = grid.jqGrid('getDataIDs');
          for (var i = 0; i < ids.length; i++) {
            var rowData = grid.jqGrid('getRowData', ids[i]);
            if (rowData.isEmpty === 'true' || !rowData.rownum) {
              // 빈 행의 체크박스 비활성화 및 숨김
              var checkbox = grid.find('tr#' + ids[i] + ' input[type="checkbox"]');
              checkbox.prop('disabled', true).hide();
              // 빈 행에 클래스 추가
              grid.find('tr#' + ids[i]).addClass('empty-row');
              // 빈 행의 모든 셀 내용 제거
              grid
                .find('tr#' + ids[i] + ' td')
                .not(':first')
                .html('');
            }
          }
          // 스크롤 여부 확인 후 .ui-jqgrid-bdiv 너비 조정
          setTimeout(function() {
            adjustBdivWidth(grid);
          }, 0);
        },
      });
    }
  </script>
