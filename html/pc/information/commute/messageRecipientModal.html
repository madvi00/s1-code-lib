    $(document).ready(function() {
      // jqGrid 높이 계산 및 리사이즈 설정
      setupJqGridResize();
      // 모달이 열릴 때 jqGrid 다시 그리기
      var modalEl = $('#modal-message-recipient');
      if (modalEl.length) {
        // MutationObserver로 모달의 display 속성 변경 감지
        var observer = new MutationObserver(function(mutations) {
          mutations.forEach(function(mutation) {
            if (mutation.type === 'attributes' && mutation.attributeName === 'style') {
              var display = modalEl.css('display');
              if (display === 'block') {
                // 모달이 열렸을 때 그리드 resizing
                setTimeout(function() {
                  resizeGrid();
                }, 0);
              }
            }
          });
        });
        observer.observe(modalEl[0], {
          attributes: true,
          attributeFilter: ['style']
        });
      }
      listLoad();
    });
    // 스크롤 여부 확인 후 .ui-jqgrid-bdiv 너비 조정
    function adjustBdivWidth(grid) {
      var $bdiv = grid.closest('.ui-jqgrid-bdiv');
      if ($bdiv.length && $bdiv[0]) {
        var hasScroll = $bdiv[0].scrollHeight > $bdiv[0].clientHeight;
        if (hasScroll) {
          $bdiv.css('width', 'calc(100% + 12px)');
        } else {
          $bdiv.css('width', '');
        }
      }
    }

    function resizeGrid() {
      const $wrap = $('#div_list');
      $('#list').jqGrid('setGridWidth', $wrap.width());
      adjustBdivWidth($('#list'));
    }

    function setPageDefault() {
      listLoad(false, 1);
    }

    function listLoad(firstNoLoad, page) {
      // jqGrid 리스트 초기화, 생성
      $('#list').jqGrid('GridUnload');
      var grid = jQuery('#list');
      // 데이터가 없거나 부족할 때 빈 행 추가
      var displayData = _JQ_GRID_DATA ? [..._JQ_GRID_DATA] : [];
      var emptyRow = {
        rownum: '',
        userId: '',
        name: '',
        note: '',
        isEmpty: true,
      };
      while (displayData.length < 10) {
        // 보여질 행의 갯수 10
        displayData.push(Object.assign({}, emptyRow));
      }
      // 초기 높이 계산
      var initialHeight = calculateJqGridHeight ? calculateJqGridHeight() : 'auto';
      grid.jqGrid({
        datatype: 'local',
        data: displayData,
        colNames: ['순번', '사용자 ID', '이름', '비고'],
        colModel: [{
            name: 'rownum',
            index: 'rownum',
            width: 50,
            align: 'center',
            sortable: false
          },
          {
            name: 'userId',
            index: 'userId',
            width: 170,
            align: 'center',
            sortable: false
          },
          {
            name: 'name',
            index: 'name',
            width: 170,
            align: 'center',
            sortable: false
          },
          {
            name: 'note',
            index: 'note',
            width: 170,
            align: 'center',
            sortable: false
          },
        ],
        sortable: false,
        autowidth: true,
        scrollRows: false,
        scroll: false,
        loadonce: true,
        viewrecords: true,
        multiboxonly: false,
        height: 340,
        scrollTimeout: 1,
        shrinkToFit: true,
        forceFit: true,
        scrollOffset: 0,
        beforeSelectRow: function(rowid, e) {
          var rowData = grid.jqGrid('getRowData', rowid);
          // 빈 행은 선택 불가능
          if (rowData.isEmpty === 'true' || (!rowData.rownum && !rowData.name && !rowData.companyName)) {
            return false;
          }
          return true;
        },
        loadComplete: function(data) {
          // 빈 행 처리
          var ids = grid.jqGrid('getDataIDs');
          for (var i = 0; i < ids.length; i++) {
            var rowData = grid.jqGrid('getRowData', ids[i]);
            if (rowData.isEmpty === 'true' || (!rowData.rownum && !rowData.name && !rowData.companyName)) {
              // 빈 행의 체크박스 비활성화 및 숨김
              var checkbox = grid.find('tr#' + ids[i] + ' input[type="checkbox"]');
              checkbox.prop('disabled', true).hide();
              // 빈 행에 클래스 추가
              grid.find('tr#' + ids[i]).addClass('empty-row');
              // 빈 행의 모든 셀 내용 제거
              grid
                .find('tr#' + ids[i] + ' td')
                .not(':first')
                .html('');
            }
          }
          // 스크롤 여부 확인 후 .ui-jqgrid-bdiv 너비 조정
          setTimeout(function() {
            adjustBdivWidth(grid);
          }, 0);
        },
      });
