<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <link rel="icon" href="./favicon.ico" />

  <title>팝업 공지 | 삼성통근버스</title>
  <!-- CSS resource load -->
  <link href="../../../assets/css/lib/bootstrap-datepicker.standalone.css" rel="stylesheet" />
  <link href="../../../assets/css/style.css" rel="stylesheet" />
  <script src="../../../assets/js/lib/jquery-3.6.0.min.js"></script>
  <script src="../../../assets/js/lib/swiper-bundle.min.js"></script>
  <script>
    // bootstrap-datepicker.js에서 사용하는 메시지 변수 정의 (bootstrap-datepicker.js보다 먼저 실행되어야 함)
    if (typeof cldMsg_prevMonth === 'undefined') {
      window.cldMsg_prevMonth = '이전달';
      window.cldMsg_nextMonth = '다음달';
      window.cldMsg_prevYear = '이전년';
      window.cldMsg_nextYear = '다음년';
      window.cldMsg_prev = '이전';
      window.cldMsg_next = '다음';
    }
  </script>
  <script src="../../../assets/js/lib/bootstrap-datepicker.js"></script>
  <script src="../../../assets/js/common.js"></script>
  <script src="../../../assets/js/datepicker.js"></script>
  <script src="../../../assets/js/dropdown.js"></script>
  <script src="../../../assets/js/file.js"></script>
  <script src="../../../assets/js/input.js"></script>
  <script src="../../../assets/js/modal.js"></script>
  <script src="../../../assets/js/multiDropdown.js"></script>
  <script src="../../../assets/js/rangeTimePicker.js"></script>
  <script src="../../../assets/js/routeAccordion.js"></script>
  <script src="../../../assets/js/tab.js"></script>
  <script src="../../../assets/js/timePicker.js"></script>
</head>

<body>
  <!-- .notice-detail : 팝업 공지 상세정보 페이지 전용 class -->
  <div class="wrapper notice-detail">
    <!-- header -->
    <header class="header">
      <button type="button" class="btn-left"></button>
      <h1 class="title-box">팝업 공지 상세정보</h1>
      <button type="button" class="btn-close"></button>
    </header>
    <!-- // header -->
    <main class="main-container">
      <section class="account-container">
        <div class="account-area">
          <div class="account-top">
            <div class="account-heading-box">
              <div class="link-data-box">
                <div class="title-box">
                  <span class="title">차량 신청 동의 확보 후 심사 </span>
                </div>
                <div class="status-box">
                  <span class="status">사용</span>
                  <span class="category">사용포털, 관제, 앱</span>
                </div>
                <div class="status-box">
                  <span class="date">2026.01.30 05:00 ~ 2026.01.30 19:00</span>
                </div>
              </div>
            </div>
          </div>
          <div class="account-middle">
            <div class="editor-container">
              <p>
                <img src="../../../assets/images/notice_dummy.png" alt="대체 텍스트" style="width: 320px; height: 180px" />
              </p>
              <p>
                화성 사업장 16라인 정류장 미운영합니다. 확인해주세요. 화성 사업장 16라인 정류장 미운영합니다. 확인해주세요.화성 사업장 16라인 정류장 미운영합니다. 확인해주세요.화성 사업장 16라인
                정류장 미운영합니다. 확인해주세요.화성 사업장 16라인 정류장 미운영합니다. 확인해주세요.
              </p>
            </div>
          </div>
          <div class="account-bottom">
            <div class="button-box">
              <button type="button" class="btn btn-white">
                <span>삭제</span>
              </button>
              <button type="button" class="btn btn-blue">
                <span>수정</span>
              </button>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>
  <!-- Toast Popup -->
  <div class="toast-popup-container" id="confirm-popup-notice">
    <div class="toast-popup-area">
      <div class="toast-popup-box">
        <span class="text">팝업 공지사항이 등록되었어요.</span>
      </div>
    </div>
  </div>
  <script>
    $(function() {
      $('.toast-popup-container').addClass('active');
    });
  </script>
</body>

</html>
