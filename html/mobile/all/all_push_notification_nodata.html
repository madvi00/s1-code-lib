<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <link rel="icon" href="./favicon.ico" />
  <link rel="shortcut icon" type="image/x-icon" href="./favicon.ico" />
  <title>푸시 알림 | 삼성통근버스</title>
  <!-- CSS resource load -->
  <link href="../../../assets/css/lib/bootstrap-datepicker.standalone.css" rel="stylesheet" />
  <link href="../../../assets/css/mobile-style.css" rel="stylesheet" />
  <script src="../../../assets/js/lib/jquery-3.6.0.min.js"></script>
  <script src="../../../assets/js/lib/swiper-bundle.min.js"></script>
  <script>
    // bootstrap-datepicker.js에서 사용하는 메시지 변수 정의 (bootstrap-datepicker.js보다 먼저 실행되어야 함)
    if (typeof cldMsg_prevMonth === 'undefined') {
      window.cldMsg_prevMonth = '이전달';
      window.cldMsg_nextMonth = '다음달';
      window.cldMsg_prevYear = '이전년';
      window.cldMsg_nextYear = '다음년';
      window.cldMsg_prev = '이전';
      window.cldMsg_next = '다음';
    }
  </script>
  <script src="../../../assets/js/lib/bootstrap-datepicker.js"></script>
  <script src="../../../assets/js/common.js"></script>
  <script src="../../../assets/js/datepicker.js"></script>
  <script src="../../../assets/js/dropdown.js"></script>
  <script src="../../../assets/js/file.js"></script>
  <script src="../../../assets/js/input.js"></script>
  <script src="../../../assets/js/modal.js"></script>
  <script src="../../../assets/js/multi-dropdown.js"></script>
  <script src="../../../assets/js/range-time-picker.js"></script>
  <script src="../../../assets/js/route-accordion.js"></script>
  <script src="../../../assets/js/tab.js"></script>
  <script src="../../../assets/js/time-picker.js"></script>
</head>

<body>
  <!-- .push-notification : 푸시 알림 관리 페이지 전용 class -->
  <div class="wrapper push-notification">
    <!-- header -->
    <header class="header">
      <button type="button" class="btn-left"></button>
      <h1 class="title-box">푸시 알림</h1>
      <button type="button" class="btn-close"></button>
    </header>
    <!-- // header -->
    <main class="main-container">
      <section class="account-container">
        <div class="account-area">
          <div class="account-top">
            <div class="account-heading-box">
              <div class="account-heading-left">
                <div class="field-container">
                  <div class="field field-dropdown">
                    <div class="field-form">
                      <!-- 숨겨진 select 태그 -->
                      <select class="dropdown-select" style="display: none">
                        <option value="" selected disabled>알림 구분</option>
                        <option value="전체">전체</option>
                        <option value="결행" active>결행</option>
                        <option value="노선 알림">노선 알림</option>
                      </select>
                      <button type="button" class="btn-dropdown">
                        <span class="text" style="display: none"></span>
                        <span class="placeholder">알림 구분</span>
                      </button>
                      <div class="dropdown-list-box">
                        <div class="dim"></div>
                        <div class="dropdown-list-wrap">
                          <div class="dropdown-list-header">
                            <div class="title-box">알림 구분 선택</div>
                            <button type="button" class="btn-close"></button>
                          </div>
                          <div class="dropdown-list-body">
                            <div class="dropdown-list">
                              <button type="button" class="btn-dropdown-list" data-value="전체">
                                <span>전체</span>
                              </button>
                            </div>
                            <div class="dropdown-list active">
                              <button type="button" class="btn-dropdown-list" data-value="결행">
                                <span>결행</span>
                              </button>
                            </div>
                            <div class="dropdown-list">
                              <button type="button" class="btn-dropdown-list" data-value="노선 알림">
                                <span>노선 알림</span>
                              </button>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <div class="account-heading-right">
                <div class="button-box">
                  <button type="button" class="btn-blue-line">푸시 알림 전송</button>
                </div>
              </div>
            </div>
          </div>
          <div class="account-middle">
            <div class="nodata-box">
              <p class="nodata-text">등록된 푸시 알림이 없어요.</p>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>
</body>

</html>
