  <script src="../../../assets/js/lib/jquery-3.6.0.min.js"></script>
  <script src="../../../assets/js/lib/swiper-bundle.min.js"></script>
  <script>
    // bootstrap-datepicker.js에서 사용하는 메시지 변수 정의 (bootstrap-datepicker.js보다 먼저 실행되어야 함)
    if (typeof cldMsg_prevMonth === 'undefined') {
      window.cldMsg_prevMonth = '이전달';
      window.cldMsg_nextMonth = '다음달';
      window.cldMsg_prevYear = '이전년';
      window.cldMsg_nextYear = '다음년';
      window.cldMsg_prev = '이전';
      window.cldMsg_next = '다음';
    }
  </script>
  <script src="../../../assets/js/lib/bootstrap-datepicker.js"></script>
  <script src="../../../assets/js/common.js"></script>
  <script src="../../../assets/js/datepicker.js"></script>

<body>
  <div class="wrapper setting">
    <!-- header -->
    <header class="header">
      <button type="button" class="btn-left"></button>
      <h1 class="title-box">설정</h1>
    </header>
    <!-- // header -->
    <!-- 메인 영역 -->
    <main class="main-container">
      <section class="setting-container">
        <div class="setting-area">
          <!-- 메뉴 콘텐츠 -->
          <div class="setting-middle">
            <section class="menu-box">
              <ul class="menu-list">
                <li class="menu-item">
                  <div class="label-box">
                    <span class="label">지도 선택</span>
                  </div>
                  <button type="button" class="menu-button">
                    <span class="label">Kakao Map</span>
                  </button>
                </li>
                <li class="menu-item">
                  <div class="label-box">
                    <span class="label">언어 선택</span>
                  </div>
                  <button type="button" class="menu-button">
                    <span class="label">한국어</span>
                  </button>
                </li>
                <li class="menu-item">
                  <div class="label-box">
                    <span class="label">버전정보 v 1.0.0</span>
                  </div>
                </li>
              </ul>
            </section>
          </div>
        </div>
      </section>
    </main>
    <!-- footer -->
    <footer class="footer-container">
      <div class="menu-box">
        <ul class="menu-lists">
          <li class="menu-list">
            <a href="../../pages/setting/all_terms.html" class="btn-external terms" onclick="
            openWindow(this.href);
            return false;
          " title="새 창으로 열기">
              <span>이용약관</span>
            </a>
          </li>
          <li class="menu-list">
            <a href="../../pages/setting/all_privacy_policy.html" class="btn-external privacy" onclick="
            openWindow(this.href);
            return false;
          " title="새 창으로 열기"><span>개인정보처리방침</span></a>
          </li>
          <li class="menu-list">
            <a href="../../pages/setting/all_location_terms.html" class="btn-external" onclick="
            openWindow(this.href);
            return false;
          " title="새 창으로 열기"><span>위치기반 서비스 이용약관</span></a>
          </li>
        </ul>
      </div>
    </footer>
    <!-- // footer -->
    <script>
      function openWindow(url) {
        // 새 창의 크기 설정
        var width = 500;
        var height = 700;
        // 현재 화면 크기
        var screenWidth = window.screen.width;
        var screenHeight = window.screen.height;
        // 새 창을 화면 중앙으로 위치시키기 위해 top과 left 값 계산
        var top = (screenHeight - height) / 2;
        var left = (screenWidth - width) / 2;
        // 새 창 열기
        window.open(url, '_blank', `width=${width},height=${height},top=${top},left=${left}`);
      }
    </script>
  </div>
</body>

</html>
