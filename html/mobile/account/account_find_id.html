<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <link rel="icon" href="./favicon.ico" />
  <link rel="shortcut icon" type="image/x-icon" href="./favicon.ico" />
  <title>아이디 찾기 | 삼성통근버스</title>
  <!-- CSS resource load -->
  <link href="../../../assets/css/lib/bootstrap-datepicker.standalone.css" rel="stylesheet" />
  <link href="../../../assets/css/mobile-style.css" rel="stylesheet" />
  <script src="../../../assets/js/lib/jquery-3.6.0.min.js"></script>
  <script src="../../../assets/js/lib/swiper-bundle.min.js"></script>
  <script>
    // bootstrap-datepicker.js에서 사용하는 메시지 변수 정의 (bootstrap-datepicker.js보다 먼저 실행되어야 함)
    if (typeof cldMsg_prevMonth === 'undefined') {
      window.cldMsg_prevMonth = '이전달';
      window.cldMsg_nextMonth = '다음달';
      window.cldMsg_prevYear = '이전년';
      window.cldMsg_nextYear = '다음년';
      window.cldMsg_prev = '이전';
      window.cldMsg_next = '다음';
    }
  </script>
  <script src="../../../assets/js/lib/bootstrap-datepicker.js"></script>
  <script src="../../../assets/js/common.js"></script>
  <script src="../../../assets/js/datepicker.js"></script>
  <script src="../../../assets/js/dropdown.js"></script>
  <script src="../../../assets/js/file.js"></script>
  <script src="../../../assets/js/input.js"></script>
  <script src="../../../assets/js/modal.js"></script>
  <script src="../../../assets/js/multiDropdown.js"></script>
  <script src="../../../assets/js/rangeTimePicker.js"></script>
  <script src="../../../assets/js/routeAccordion.js"></script>
  <script src="../../../assets/js/tab.js"></script>
  <script src="../../../assets/js/timePicker.js"></script>
</head>

<body>
  <div class="wrapper">
    <!-- header -->
    <header class="header">
      <button type="button" class="btn-left"></button>
      <h1 class="title-box">아이디 찾기</h1>
      <button type="button" class="btn-close"></button>
    </header>
    <!-- // header -->
    <main class="main-container">
      <section class="account-container">
        <div class="account-area">
          <div class="account-middle">
            <div class="field-container">
              <div class="field field-input">
                <div class="field-form">
                  <div class="field-label-box">
                    <label for="input_name" class="field-label">이름</label>
                  </div>
                  <div class="input-group">
                    <div class="input-wrap">
                      <div class="input-box">
                        <input id="input_name" name="input_name" placeholder="입력해 주세요." type="text" value="" />
                        <i class="icon-clear"></i>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <div class="field field-input">
                <div class="field-form">
                  <div class="field-label-box">
                    <label for="input_phone_number" class="field-label">휴대전화번호</label>
                  </div>
                  <div class="input-group">
                    <div class="input-wrap">
                      <div class="input-box">
                        <input id="input_phone_number" name="input_phone_number" placeholder="입력해 주세요." type="text" value="" />
                        <i class="icon-clear"></i>
                      </div>
                    </div>
                    <div class="input-desc-box">
                      <p class="input-desc">휴대전화번호 ‘-’제외하고 입력해 주세요.</p>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="account-bottom">
            <div class="button-box">
              <button type="button" class="btn btn-blue" disabled>
                <span>인증 요청</span>
              </button>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>
</body>

</html>
