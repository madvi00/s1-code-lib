<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <link rel="icon" href="./favicon.ico" />
  <link rel="shortcut icon" type="image/x-icon" href="./favicon.ico" />
  <title>내 정보 | 삼성통근버스</title>
  <!-- CSS resource load -->
  <link href="../../../assets/css/lib/bootstrap-datepicker.standalone.css" rel="stylesheet" />
  <link href="../../../assets/css/mobile-style.css" rel="stylesheet" />
  <script src="../../../assets/js/lib/jquery-3.6.0.min.js"></script>
  <script src="../../../assets/js/lib/swiper-bundle.min.js"></script>
  <script>
    // bootstrap-datepicker.js에서 사용하는 메시지 변수 정의 (bootstrap-datepicker.js보다 먼저 실행되어야 함)
    if (typeof cldMsg_prevMonth === 'undefined') {
      window.cldMsg_prevMonth = '이전달';
      window.cldMsg_nextMonth = '다음달';
      window.cldMsg_prevYear = '이전년';
      window.cldMsg_nextYear = '다음년';
      window.cldMsg_prev = '이전';
      window.cldMsg_next = '다음';
    }
  </script>
  <script src="../../../assets/js/lib/bootstrap-datepicker.js"></script>
  <script src="../../../assets/js/common.js"></script>
  <script src="../../../assets/js/datepicker.js"></script>
  <script src="../../../assets/js/dropdown.js"></script>
  <script src="../../../assets/js/file.js"></script>
  <script src="../../../assets/js/input.js"></script>
  <script src="../../../assets/js/modal.js"></script>
  <script src="../../../assets/js/multiDropdown.js"></script>
  <script src="../../../assets/js/rangeTimePicker.js"></script>
  <script src="../../../assets/js/routeAccordion.js"></script>
  <script src="../../../assets/js/tab.js"></script>
  <script src="../../../assets/js/timePicker.js"></script>
</head>

<body>
  <!-- .dashboard : 대시보드 페이지 전용 class -->
  <div class="wrapper dashboard">
    <!-- 1/28 update -->
    <nav class="navigation-box">
      <ul class="navigation">
        <li class="navigation-list">
          <button type="button" class="nav home active">홈</button>
        </li>
        <li class="navigation-list">
          <button type="button" class="nav dispatch">배차관리</button>
        </li>
        <li class="navigation-list">
          <button type="button" class="nav tracking">차량위치</button>
        </li>
        <li class="navigation-list">
          <button type="button" class="nav all">전체</button>
        </li>
      </ul>
    </nav>
    <main class="main-container">
      <div class="dashboard-selector">
        <div class="field field-dropdown type-text">
          <div class="field-form">
            <!-- 숨겨진 select 태그 -->
            <select class="dropdown-select" style="display: none">
              <option value="삼성전자(기흥/화성)" active>삼성전자(기흥/화성)</option>
              <option value="OPTION2">OPTION2</option>
              <option value="OPTION3">OPTION3</option>
              <option value="OPTION4">OPTION4</option>
            </select>
            <button type="button" class="btn-dropdown" type-text>
              <span class="text">삼성전자(기흥/화성)</span>
              <span class="placeholder" style="display: none">Placeholder</span>
            </button>
            <div class="dropdown-list-box">
              <div class="dim"></div>
              <div class="dropdown-list-wrap">
                <div class="dropdown-list-header">
                  <div class="title-box">삼성전자(기흥/화성)</div>
                  <button type="button" class="btn-close"></button>
                </div>
                <div class="dropdown-list-body">
                  <div class="dropdown-list active">
                    <button type="button" class="btn-dropdown-list" data-value="삼성전자(기흥/화성)">
                      <span>삼성전자(기흥/화성)</span>
                    </button>
                  </div>
                  <div class="dropdown-list">
                    <button type="button" class="btn-dropdown-list" data-value="OPTION2">
                      <span>OPTION2</span>
                    </button>
                  </div>
                  <div class="dropdown-list">
                    <button type="button" class="btn-dropdown-list" data-value="OPTION3">
                      <span>OPTION3</span>
                    </button>
                  </div>
                  <div class="dropdown-list">
                    <button type="button" class="btn-dropdown-list" data-value="OPTION4">
                      <span>OPTION4</span>
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="subtitle">OO관광, OO관광</div>
      </div>
      <div class="dashboard-container">
        <div class="dashboard-area">
          <div class="dashboard-header">
            <div class="header-left">
              <div class="title-box">전체 운행 현황</div>
            </div>
            <div class="header-right">
              <span class="time">2025.12.24 17:34:09</span>
              <button class="btn-reset">
                <i class="icon icon-reset"></i>
              </button>
            </div>
          </div>
          <div class="dashboard-body">
            <div class="dashboard-status-overview">
              <div class="dashboard-status-overview-top">
                <div class="dashboard-status-total">
                  <div class="chart-progress-wrap">
                    <div class="chart-progress">
                      <!-- chart 영역 -->
                      <img src="../../../assets/images/dummy/img_dashboard_dummy.png" alt="운행완료 차트 더미" style="width: 100%; height: 100%; object-fit: cover" />
                    </div>
                    <div class="total-status-title">
                      <!-- 2/2 update -->
                      <div class="title-text"><strong>전체</strong>운행 계획</div>
                      <div class="title-count">2,902건</div>
                    </div>
                  </div>
                  <div class="progress-info">
                    <div class="label">운행 완료</div>
                    <div class="percent"><span>52.5</span>%</div>
                    <div class="number">(3,751건)</div>
                  </div>
                </div>
                <div class="dashboard-status-divider"></div>
                <div class="dashboard-status-list">
                  <!-- 배차전 -->
                  <div class="status-item before">
                    <div class="status-title">배차전</div>
                    <div class="status-bar-box">
                      <div class="status-bar">
                        <div class="bar" style="width: 10%"></div>
                      </div>
                      <div class="bar-text">
                        <span class="percent">10%</span>
                        <span class="count">714건</span>
                      </div>
                    </div>
                  </div>
                  <!-- 배차 완료 -->
                  <div class="status-item complete">
                    <div class="status-title">배차 완료</div>
                    <div class="status-bar-box">
                      <div class="status-bar">
                        <div class="bar" style="width: 12.5%"></div>
                      </div>
                      <div class="bar-text">
                        <span class="percent">12.5%</span>
                        <span class="count">893건</span>
                      </div>
                    </div>
                  </div>
                  <!-- 운행중 -->
                  <div class="status-item running">
                    <div class="status-title">운행중</div>
                    <div class="status-bar-box">
                      <div class="status-bar">
                        <div class="bar" style="width: 20%"></div>
                      </div>
                      <div class="bar-text">
                        <span class="percent">20%</span>
                        <span class="count">1,429건</span>
                      </div>
                    </div>
                  </div>
                  <!-- 미운행 -->
                  <div class="status-item not-running">
                    <div class="status-title">미운행</div>
                    <div class="status-bar-box">
                      <div class="status-bar">
                        <div class="bar" style="width: 1.4%"></div>
                      </div>
                      <div class="bar-text">
                        <span class="percent">1.4%</span>
                        <span class="count">100건</span>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <div class="dashboard-status-overview-bottom">
                <div class="status-alert-list">
                  <div class="status-alert-item">
                    <div class="alert-title">노선불일치</div>
                    <div class="alert-count">150건</div>
                  </div>
                  <div class="status-alert-item">
                    <div class="alert-title">결행</div>
                    <div class="alert-count">2건</div>
                  </div>
                  <div class="status-alert-item">
                    <div class="alert-title">신호없음</div>
                    <div class="alert-count">10건</div>
                  </div>
                  <div class="status-alert-item">
                    <div class="alert-title">미장착배차</div>
                    <div class="alert-count">9건</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</body>

</html>
