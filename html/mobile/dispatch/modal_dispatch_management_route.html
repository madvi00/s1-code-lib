<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <link rel="icon" href="./favicon.ico" />
  <link rel="shortcut icon" type="image/x-icon" href="./favicon.ico" />
  <title>팝업 | 삼성통근버스</title>
  <!-- CSS resource load -->
  <link href="../../../assets/css/lib/bootstrap-datepicker.standalone.css" rel="stylesheet" />
  <link href="../../../assets/css/mobile-style.css" rel="stylesheet" />
  <script src="../../../assets/js/lib/jquery-3.6.0.min.js"></script>
  <script src="../../../assets/js/lib/swiper-bundle.min.js"></script>
  <script>
    // bootstrap-datepicker.js에서 사용하는 메시지 변수 정의 (bootstrap-datepicker.js보다 먼저 실행되어야 함)
    if (typeof cldMsg_prevMonth === 'undefined') {
      window.cldMsg_prevMonth = '이전달';
      window.cldMsg_nextMonth = '다음달';
      window.cldMsg_prevYear = '이전년';
      window.cldMsg_nextYear = '다음년';
      window.cldMsg_prev = '이전';
      window.cldMsg_next = '다음';
    }
  </script>
  <script src="../../../assets/js/lib/bootstrap-datepicker.js"></script>
  <script src="../../../assets/js/common.js"></script>
  <script src="../../../assets/js/datepicker.js"></script>
  <script src="../../../assets/js/dropdown.js"></script>
  <script src="../../../assets/js/file.js"></script>
  <script src="../../../assets/js/input.js"></script>
  <script src="../../../assets/js/modal.js"></script>
  <script src="../../../assets/js/multiDropdown.js"></script>
  <script src="../../../assets/js/rangeTimePicker.js"></script>
  <script src="../../../assets/js/routeAccordion.js"></script>
  <script src="../../../assets/js/tab.js"></script>
  <script src="../../../assets/js/timePicker.js"></script>
</head>

<body>
  <div class="wrapper">
    <button type="button" class="btn btn-blue btn-modal" data-modal='modal-route-search-list'>
      <span>Open</span>
    </button>
    <!-- modal -->
    <div id="modal-route-search-list" class="modal modal-route-search-list bottom-sheet">
      <div class="dim"></div>
      <div class="modal-container">
        <div class="modal-area">
          <div class="modal-top">
            <div class="modal-title-box">
              <span class="title">애오개역_화성캠퍼스H1</span>
            </div>
          </div>
          <div class="modal-middle">
            <div class="modal-content-box">
              <div class="route-search-list-box">
                <div class="radio-group">
                  <label for="route-search-list-1">
                    <input type="radio" id="route-search-list-1" name="route-search-list" value="value1" checked />
                    <span>출발 : 04:40 ~ 도착 : 05:18(여산관광)</span>
                  </label>
                  <label for="route-search-list-2">
                    <input type="radio" id="route-search-list-2" name="route-search-list" value="value2" />
                    <span>출발 : 04:40 ~ 도착 : 05:18(여산관광)</span>
                  </label>
                  <label for="route-search-list-3">
                    <input type="radio" id="route-search-list-3" name="route-search-list" value="value3" />
                    <span>출발 : 05:50 ~ 도착 : 07:30(여산관광)</span>
                  </label>
                  <label for="route-search-list-4">
                    <input type="radio" id="route-search-list-4" name="route-search-list" value="value4" />
                    <span>출발 : 05:50 ~ 도착 : 07:30(여산관광)</span>
                  </label>
                </div>
              </div>
            </div>
          </div>
          <div class="modal-bottom">
            <div class="modal-button-box">
              <button type="button" class="btn btn-white">
                <span>취소</span>
              </button>
              <button type="button" class="btn btn-blue">
                <span>선택</span>
              </button>
            </div>
          </div>
          <button type="button" class="btn-close" title="팝업창 닫기 버튼"></button>
        </div>
      </div>
    </div>
    <!-- // modal -->
  </div>
</body>

</html>
