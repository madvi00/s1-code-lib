<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <link rel="icon" href="./favicon.ico" />
  <link rel="shortcut icon" type="image/x-icon" href="./favicon.ico" />
  <title>배차 관리 | 삼성통근버스</title>
  <!-- CSS resource load -->
  <link href="../../../assets/css/lib/bootstrap-datepicker.standalone.css" rel="stylesheet" />
  <link href="../../../assets/css/style.css" rel="stylesheet" />
  <script src="../../../assets/js/lib/jquery-3.6.0.min.js"></script>
  <script src="../../../assets/js/lib/swiper-bundle.min.js"></script>
  <script>
    // bootstrap-datepicker.js에서 사용하는 메시지 변수 정의 (bootstrap-datepicker.js보다 먼저 실행되어야 함)
    if (typeof cldMsg_prevMonth === 'undefined') {
      window.cldMsg_prevMonth = '이전달';
      window.cldMsg_nextMonth = '다음달';
      window.cldMsg_prevYear = '이전년';
      window.cldMsg_nextYear = '다음년';
      window.cldMsg_prev = '이전';
      window.cldMsg_next = '다음';
    }
  </script>
  <script src="../../../assets/js/lib/bootstrap-datepicker.js"></script>
  <script src="../../../assets/js/common.js"></script>
  <script src="../../../assets/js/datepicker.js"></script>
  <script src="../../../assets/js/dropdown.js"></script>
  <script src="../../../assets/js/file.js"></script>
  <script src="../../../assets/js/input.js"></script>
  <script src="../../../assets/js/modal.js"></script>
  <script src="../../../assets/js/multiDropdown.js"></script>
  <script src="../../../assets/js/rangeTimePicker.js"></script>
  <script src="../../../assets/js/routeAccordion.js"></script>
  <script src="../../../assets/js/tab.js"></script>
  <script src="../../../assets/js/timePicker.js"></script>
</head>

<body>
  <!-- .dispatch-create : 배차 등록 페이지 전용 class -->
  <div class="wrapper dispatch-create">
    <!-- header -->
    <header class="header">
      <button type="button" class="btn-left"></button>
      <h1 class="title-box">배차 수정</h1>
      <button type="button" class="btn-close"></button>
    </header>
    <!-- // header -->
    <main class="main-container">
      <section class="dispatch-create-container">
        <div class="dispatch-create-area">
          <div class="dispatch-create-middle">
            <div class="field-container">
              <div class="field-title-box">
                <span class="field-title">배차 정보를 확인 후 <br />등록 버튼을 눌러주세요.</span>
              </div>
              <div class="field field-text">
                <div class="field-form">
                  <div class="field-label-box">
                    <span class="field-label">운행 운수사</span>
                  </div>
                  <div class="field-text-box">
                    <div class="field-text">
                      <span class="desc">여산관광</span>
                    </div>
                  </div>
                </div>
              </div>
              <div class="field field-text">
                <div class="field-form">
                  <div class="field-label-box">
                    <span class="field-label">차량번호</span>
                  </div>
                  <div class="field-text-box">
                    <div class="field-text">
                      <span class="desc">경기 72아 7327</span>
                    </div>
                  </div>
                </div>
              </div>
              <div class="field field-text">
                <div class="field-form">
                  <div class="field-label-box">
                    <span class="field-label">운전자명</span>
                  </div>
                  <div class="field-text-box">
                    <div class="field-text">
                      <span class="desc">홍길동</span>
                    </div>
                  </div>
                </div>
              </div>
              <div class="field field-text">
                <div class="field-form">
                  <div class="field-label-box">
                    <span class="field-label">연락처</span>
                  </div>
                  <div class="field-text-box">
                    <div class="field-text">
                      <span class="desc">010-1234-5678</span>
                    </div>
                  </div>
                </div>
              </div>
              <div class="field field-text">
                <div class="field-form">
                  <div class="field-label-box">
                    <span class="field-label">운행일시</span>
                  </div>
                  <div class="field-text-box">
                    <div class="field-text">
                      <span class="desc">2026.01.30 05:00 ~ 2026.01.30 19:00</span>
                    </div>
                  </div>
                </div>
              </div>
              <div class="field field-text">
                <div class="field-form">
                  <div class="field-label-box">
                    <span class="field-label">결행여부</span>
                  </div>
                  <div class="field-text-box">
                    <div class="field-text">
                      <span class="desc">정상운행</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="dispatch-create-bottom">
            <div class="button-box">
              <button type="button" class="btn btn-white">
                <span>수정</span>
              </button>
              <button type="button" class="btn btn-blue">
                <span>등록</span>
              </button>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>
</body>

</html>
