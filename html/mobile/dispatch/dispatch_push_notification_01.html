    // bootstrap-datepicker.js에서 사용하는 메시지 변수 정의 (bootstrap-datepicker.js보다 먼저 실행되어야 함)
    if (typeof cldMsg_prevMonth === 'undefined') {
      window.cldMsg_prevMonth = '이전달';
      window.cldMsg_nextMonth = '다음달';
      window.cldMsg_prevYear = '이전년';
      window.cldMsg_nextYear = '다음년';
      window.cldMsg_prev = '이전';
      window.cldMsg_next = '다음';
    }
  </script>
  <script src="../../../assets/js/lib/bootstrap-datepicker.js"></script>
  <script src="../../../assets/js/common.js"></script>
  <script src="../../../assets/js/datepicker.js"></script>
  <script src="../../../assets/js/dropdown.js"></script>
  <script src="../../../assets/js/file.js"></script>
  <script src="../../../assets/js/input.js"></script>
  <script src="../../../assets/js/modal.js"></script>
  <script src="../../../assets/js/multiDropdown.js"></script>
  <script src="../../../assets/js/rangeTimePicker.js"></script>

<body>
  <!-- .dispatch-push : 푸시 알림 전송 페이지 전용 class -->
  <div class="wrapper dispatch-push">
    <!-- header -->
    <header class="header">
      <button type="button" class="btn-left"></button>
      <h1 class="title-box">푸시 알림 전송</h1>
      <button type="button" class="btn-close"></button>
    </header>
    <!-- // header -->
    <main class="main-container">
      <div class="dispatch-list-container">

          <div class="dispatch-list-middle">
            <div class="dispatch-detail-box">
              <div class="detail-content-box">

                    <div class="title-box">

                    </div>
                  </div>
                </div>
                <div class="detail-content-bottom">
                  <div class="detail-list-box">
                    <ul class="detail-lists">
                      <li class="detail-list">
                        <span class="list-label">노선명</span>
                        <span class="list-data">애오개A_K2-H2-H1(교대조)</span>

                      <li class="detail-list">
                        <span class="list-label">노선번호</span>

                      </li>
                      <li class="detail-list">
                        <span class="list-label">운행구분</span>

                      </li>
                      <li class="detail-list">
                        <span class="list-label">운행요일</span>
                        <span class="list-data">패밀리데이</span>
                      </li>
                      <li class="detail-list">
                        <span class="list-label">운행현황</span>
                        <span class="list-data">미운행</span>
                      </li>
                      <li class="detail-list">
                        <span class="list-label">출발/도착 정보</span>
                        <!-- 1/28 update -->
                        <span class="list-data">2025.02.14 05:50<br />~2025.02.14 07:30</span>
                      </li>
                      <li class="detail-list">
                        <span class="list-label">운행운수사</span>
                        <span class="list-data">여산관광</span>
                      </li>
                      <li class="detail-list">
                        <span class="list-label">차량번호</span>
                        <span class="list-data">경기 72아 7327</span>
                      </li>
                      <li class="detail-list">
                        <span class="list-label">운전자명</span>
                        <span class="list-data">홍길동</span>
                      </li>
                      <li class="detail-list">
                        <span class="list-label">즐겨찾기 인원</span>
                        <span class="list-data">30명</span>
                      </li>
                    </ul>
                  </div>
                </div>
              </div>
              <div class="detail-content-box">
                <div class="detail-content-top">
                  <div class="content-top-left">
                    <div class="title-box">
                      <span class="title">알림 내용</span>
                    </div>
                  </div>
                </div>
                <div class="detail-content-bottom">
                  <div class="field-container">
                    <div class="textarea-box">
                      <label for="input_textarea_1" class="label ir"></label>
                      <textarea name="input_textarea_1" id="input_textarea_1" class="textarea" placeholder="입력해 주세요." maxlength="500"></textarea>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="dispatch-list-bottom">
            <div class="button-box">
              <button type="button" class="btn btn-white">
                <span>취소</span>
              </button>
              <button type="button" class="btn btn-blue">
                <span>알림 전송</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>

</html>
