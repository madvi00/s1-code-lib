<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <link rel="icon" href="./favicon.ico" />
  <link rel="shortcut icon" type="image/x-icon" href="./favicon.ico" />
  <title>내 정보 | 삼성통근버스</title>
  <!-- CSS resource load -->
  <link href="../../../assets/css/lib/bootstrap-datepicker.standalone.css" rel="stylesheet" />
  <link href="../../../assets/css/mobile-style.css" rel="stylesheet" />
  <script src="../../../assets/js/lib/jquery-3.6.0.min.js"></script>
  <script src="../../../assets/js/lib/swiper-bundle.min.js"></script>
  <script>
    // bootstrap-datepicker.js에서 사용하는 메시지 변수 정의 (bootstrap-datepicker.js보다 먼저 실행되어야 함)
    if (typeof cldMsg_prevMonth === 'undefined') {
      window.cldMsg_prevMonth = '이전달';
      window.cldMsg_nextMonth = '다음달';
      window.cldMsg_prevYear = '이전년';
      window.cldMsg_nextYear = '다음년';
      window.cldMsg_prev = '이전';
      window.cldMsg_next = '다음';
    }
  </script>
  <script src="../../../assets/js/lib/bootstrap-datepicker.js"></script>
  <script src="../../../assets/js/common.js"></script>
  <script src="../../../assets/js/datepicker.js"></script>
  <script src="../../../assets/js/dropdown.js"></script>
  <script src="../../../assets/js/file.js"></script>
  <script src="../../../assets/js/input.js"></script>
  <script src="../../../assets/js/modal.js"></script>
  <script src="../../../assets/js/multiDropdown.js"></script>
  <script src="../../../assets/js/rangeTimePicker.js"></script>
  <script src="../../../assets/js/routeAccordion.js"></script>
  <script src="../../../assets/js/tab.js"></script>
  <script src="../../../assets/js/timePicker.js"></script>
</head>

<body>
  <!-- .vehicle-location : 차량위치 페이지 전용 class -->
  <div class="wrapper vehicle-location">
    <!-- 1/28 update -->
    <nav class="navigation-box">
      <ul class="navigation">
        <li class="navigation-list">
          <button type="button" class="nav home">홈</button>
        </li>
        <li class="navigation-list">
          <button type="button" class="nav dispatch">배차관리</button>
        </li>
        <li class="navigation-list">
          <button type="button" class="nav tracking active">차량위치</button>
        </li>
        <li class="navigation-list">
          <button type="button" class="nav all">전체</button>
        </li>
      </ul>
    </nav>
    <main class="main-container">
      <div class="map-list-container">
        <div class="map-list-area">
          <div class="map-list-top">
            <div class="search-box">
              <div class="input-group">
                <div class="input-wrap">
                  <div class="input-box">
                    <input id="input_search" name="input_search" class="clearable" placeholder="차량번호, 운전자, 단말기번호, 운수사 입력" type="search" value="111" />
                    <i class="icon-clear"></i>
                    <div class="search-button-box">
                      <button type="button" class="btn-search"></button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <div class="map-list-tabs">
              <ul class="tabs">
                <li class="tab">
                  <a class="on" href="#">
                    전체
                    <span class="font-blue">0</span>
                  </a>
                </li>
                <li class="tab">
                  <a href="#">
                    ON
                    <span class="font-blue">0</span>
                  </a>
                </li>
                <li class="tab">
                  <a href="#">
                    OFF
                    <span class="font-blue">0</span>
                  </a>
                </li>
              </ul>
            </div>
            <div class="map-filter-box swiper">
              <ul class="chip-box swiper-wrapper">
                <li class="chip swiper-slide">
                  <button type="button" class="btn-chip active">
                    <span class="label">전체</span>
                    <span></span>
                  </button>
                </li>
                <li class="chip swiper-slide">
                  <button type="button" class="btn-chip">
                    <span class="label">운행중</span>
                    <span>0</span>
                  </button>
                </li>
                <li class="chip swiper-slide">
                  <button type="button" class="btn-chip">
                    <span class="label">운행예정</span>
                    <span>0</span>
                  </button>
                </li>
                <li class="chip swiper-slide">
                  <button type="button" class="btn-chip">
                    <span class="label">운행종료</span>
                    <span>0</span>
                  </button>
                </li>
                <li class="chip swiper-slide">
                  <button type="button" class="btn-chip">
                    <span class="label">운행없음</span>
                    <span>0</span>
                  </button>
                </li>
                <li class="chip swiper-slide">
                  <button type="button" class="btn-chip">
                    <span class="label">이상상태</span>
                    <span>0</span>
                  </button>
                </li>
              </ul>
            </div>
          </div>
          <div class="map-list-bottom">
            <div class="search-result-box">
              <div class="search-result-bottom">
                <div class="empty-box">
                  <p>검색 결과가 없어요.</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</body>

</html>
